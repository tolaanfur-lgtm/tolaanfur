<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#060818"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Tolaanfur"/>
<link rel="apple-touch-icon" href="icon.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="icon.png"/>
<link rel="manifest" href="manifest.json"/>
<title>Tolaanfur</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@400;500;600;700&family=Tajawal:wght@400;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060818;--bg2:#0D1240;--bg3:#111850;
  --blue:#1E90FF;--b2:#2563EB;--b3:#00BFFF;
  --pu:#6B3FFF;--pu2:#9B6FFF;
  --gold:#F59E0B;--gr:#10B981;--rd:#F43F5E;
  --sl:#4A5568;--sl2:#718096;--wh:#EEF2FF;
  --card:rgba(20,30,100,.4);--bdr:rgba(100,140,255,.18);
}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg);color:var(--wh);-webkit-tap-highlight-color:transparent;user-select:none}
#app{height:100vh;position:relative;overflow:hidden}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse at 20% 15%,rgba(37,99,235,.22) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 80%,rgba(107,63,255,.18) 0%,transparent 50%),#060818}

/* SCREEN */
.screen{position:absolute;inset:0;z-index:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  display:flex;flex-direction:column;align-items:center;
  padding:max(env(safe-area-inset-top),1.2rem) 1rem calc(5.5rem + env(safe-area-inset-bottom))}
.screen.no-tab{padding-bottom:2rem}

/* AUTH SCREEN */
.auth-screen{position:absolute;inset:0;z-index:2;overflow-y:auto;-webkit-overflow-scrolling:touch;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem 1.5rem;background:var(--bg)}

/* TABS */
.tabs{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(6,8,24,.97);
  backdrop-filter:blur(20px);border-top:1px solid var(--bdr);display:flex;
  padding:.5rem .3rem calc(.5rem + env(safe-area-inset-bottom))}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:.18rem;background:none;
  border:none;color:var(--sl2);cursor:pointer;padding:.35rem .1rem;border-radius:.5rem;min-width:0;transition:color .2s}
.tab.on{color:var(--b3)}
.ti{font-size:1.25rem;line-height:1}
.tl{font-size:.56rem;font-weight:600;letter-spacing:.02em;white-space:nowrap}

/* BUTTONS */
.btn{border:none;border-radius:.85rem;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;
  -webkit-tap-highlight-color:transparent;transition:transform .12s,opacity .2s;display:block;text-align:center}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.bp{background:linear-gradient(135deg,var(--b2),var(--b3));color:#fff;padding:.9rem 1.5rem;font-size:.95rem;width:100%;box-shadow:0 4px 20px rgba(37,99,235,.35)}
.bpu{background:linear-gradient(135deg,#4B0FDF,var(--pu));color:#fff;padding:.9rem 1.5rem;font-size:.95rem;width:100%}
.bs{background:var(--card);border:1px solid var(--bdr);color:var(--wh);padding:.75rem 1.2rem;font-size:.88rem;width:100%}
.bg2{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:var(--gr);padding:.65rem 1rem;font-size:.85rem;font-weight:600}
.br{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.25);color:var(--rd);padding:.65rem 1rem;font-size:.85rem;font-weight:600}
.bsm{padding:.45rem .85rem;font-size:.78rem}
.btn-link{background:none;border:none;color:var(--b3);font-size:.88rem;cursor:pointer;padding:.5rem;font-family:'Inter',sans-serif;font-weight:600}

/* INPUTS */
.inp{width:100%;background:rgba(255,255,255,.07);border:1.5px solid var(--bdr);border-radius:.85rem;
  padding:.85rem 1rem;color:var(--wh);font-size:.95rem;outline:none;font-family:'Inter',sans-serif;
  -webkit-appearance:none;transition:border-color .2s}
.inp:focus{border-color:var(--b3);background:rgba(255,255,255,.09)}
.inp::placeholder{color:var(--sl)}
.inp.err{border-color:var(--rd)}
.lbl{display:block;font-size:.75rem;color:var(--sl2);font-weight:600;margin-bottom:.35rem;letter-spacing:.04em;text-transform:uppercase}
.fld{margin-bottom:.85rem}
.err-msg{color:var(--rd);font-size:.78rem;margin-top:.3rem;padding-left:.25rem}

/* CARDS / SECTIONS */
.sec{background:var(--card);border:1px solid var(--bdr);border-radius:1.1rem;padding:1.1rem;
  width:100%;max-width:560px;margin-bottom:.85rem;backdrop-filter:blur(12px)}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem}
.st{font-family:'Fredoka One',cursive;color:var(--b3);font-size:1rem}

/* NAV */
.nav{width:100%;max-width:560px;display:flex;align-items:center;gap:.75rem;padding:.25rem 0 1rem;flex-shrink:0}
.bk{background:var(--card);border:1px solid var(--bdr);border-radius:.65rem;color:var(--wh);
  padding:.5rem .8rem;cursor:pointer;font-size:.88rem;display:flex;align-items:center;gap:.3rem;white-space:nowrap}
.nt{font-family:'Fredoka One',cursive;font-size:1.15rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  background:linear-gradient(90deg,var(--b3),var(--pu2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* LOGO */
.lw{display:flex;flex-direction:column;align-items:center;padding:.8rem 0 .6rem}
.tfl{width:72px;height:72px;border-radius:16px;overflow:hidden;
  box-shadow:0 6px 24px rgba(0,191,255,.4),0 0 40px rgba(107,63,255,.25);animation:bob 3s ease-in-out infinite}
.tfl img{width:100%;height:100%;object-fit:cover}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.l-ar{font-family:'Tajawal',sans-serif;font-size:.85rem;direction:rtl;text-align:center;opacity:.85;margin-bottom:.2rem;margin-top:.5rem}
.l-nm{font-family:'Fredoka One',cursive;font-size:1.9rem;letter-spacing:.06em;text-align:center;
  background:linear-gradient(135deg,var(--b3),var(--pu2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.l-sb{color:var(--sl2);font-size:.74rem;margin-top:.2rem}

/* AVATAR */
.avatar{border-radius:50%;object-fit:cover;background:linear-gradient(135deg,var(--b2),var(--pu))}
.avatar-ring{border-radius:50%;padding:2px;background:linear-gradient(135deg,var(--b3),var(--pu2))}

/* PROFILE */
.prof-header{display:flex;flex-direction:column;align-items:center;padding:1.5rem;
  background:var(--card);border:1px solid var(--bdr);border-radius:1.2rem;width:100%;max-width:560px;margin-bottom:.85rem}
.prof-avatar{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:2.5rem;background:linear-gradient(135deg,var(--b2),var(--pu));margin-bottom:.75rem;
  border:3px solid rgba(0,191,255,.3);box-shadow:0 0 20px rgba(0,191,255,.2)}
.prof-name{font-family:'Fredoka One',cursive;font-size:1.4rem;margin-bottom:.2rem}
.prof-email{font-size:.8rem;color:var(--sl2);margin-bottom:.5rem}
.prof-stats{display:flex;gap:1.5rem;margin-top:.75rem}
.prof-stat{text-align:center}
.prof-stat-val{font-family:'Fredoka One',cursive;font-size:1.3rem;color:var(--b3)}
.prof-stat-lbl{font-size:.65rem;color:var(--sl2);margin-top:.1rem}

/* MENU GRID */
.mg{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;width:100%;max-width:560px}
.mc{background:var(--card);border:1.5px solid var(--bdr);border-radius:1.2rem;padding:1.1rem;
  cursor:pointer;transition:transform .15s;position:relative;overflow:hidden;backdrop-filter:blur(12px);
  display:flex;flex-direction:column;gap:.4rem}
.mc:active{transform:scale(.96)}
.mcg{position:absolute;inset:0;opacity:0;pointer-events:none;border-radius:inherit;transition:opacity .2s}
.mc:active .mcg{opacity:.2}
.mi{font-size:1.85rem;line-height:1}
.mn{font-family:'Fredoka One',cursive;font-size:.92rem}
.md{color:var(--sl2);font-size:.67rem;line-height:1.3}
.mb{position:absolute;top:.6rem;right:.6rem;background:var(--pu);border-radius:2rem;padding:.15rem .5rem;font-size:.58rem;font-weight:700;color:#fff}

/* AUTH FORM */
.auth-card{background:var(--card);border:1px solid var(--bdr);border-radius:1.3rem;padding:1.75rem;
  width:100%;max-width:420px;backdrop-filter:blur(12px)}
.auth-title{font-family:'Fredoka One',cursive;font-size:1.6rem;text-align:center;margin-bottom:.25rem;
  background:linear-gradient(135deg,var(--b3),var(--pu2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.auth-sub{color:var(--sl2);font-size:.82rem;text-align:center;margin-bottom:1.5rem}
.auth-divider{display:flex;align-items:center;gap:.75rem;margin:.75rem 0;color:var(--sl2);font-size:.78rem}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--bdr)}

/* BADGE */
.badge{display:inline-block;border-radius:2rem;padding:.2rem .65rem;font-size:.65rem;font-weight:700}
.badge-live{background:rgba(16,185,129,.15);color:var(--gr)}
.badge-draft{background:rgba(245,158,11,.15);color:var(--gold)}
.badge-new{background:linear-gradient(135deg,var(--b2),var(--pu));color:#fff}

/* LIST */
.li{display:flex;align-items:center;gap:.75rem;padding:.7rem 0;border-bottom:1px solid rgba(100,140,255,.07)}
.li:last-child{border-bottom:none;padding-bottom:0}
.lic{font-size:1.3rem;flex-shrink:0;width:2rem;text-align:center}
.lii{flex:1;min-width:0}
.lin{font-weight:600;font-size:.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lis{font-size:.72rem;color:var(--sl2);margin-top:.1rem}
.lia{display:flex;gap:.4rem;flex-shrink:0}

/* COMING SOON */
.coming-soon{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1.5rem;text-align:center}
.cs-icon{font-size:3rem;margin-bottom:.75rem;animation:bob 2s ease-in-out infinite}
.cs-title{font-family:'Fredoka One',cursive;font-size:1.3rem;color:var(--b3);margin-bottom:.5rem}
.cs-text{color:var(--sl2);font-size:.85rem;line-height:1.6}
.cs-badge{display:inline-block;background:linear-gradient(135deg,var(--b2),var(--pu));color:#fff;
  border-radius:2rem;padding:.3rem 1rem;font-size:.78rem;font-weight:600;margin-top:.75rem}

/* TOAST */
.tw{position:fixed;top:max(1rem,env(safe-area-inset-top));right:1rem;z-index:200;
  display:flex;flex-direction:column;gap:.5rem;pointer-events:none}
.ts{background:var(--bg2);border:1px solid var(--b3);border-radius:.9rem;padding:.7rem 1rem;
  display:flex;align-items:center;gap:.6rem;box-shadow:0 6px 24px rgba(0,0,0,.6);max-width:260px;
  animation:ti .4s cubic-bezier(.34,1.56,.64,1);pointer-events:auto}
@keyframes ti{from{transform:translateX(130%);opacity:0}to{transform:translateX(0);opacity:1}}
.ts.out{animation:to2 .3s ease forwards}
@keyframes to2{to{transform:translateX(130%);opacity:0}}
.tsi{font-size:1.3rem}
.tst3{font-family:'Fredoka One',cursive;color:var(--b3);font-size:.85rem}
.tss{font-size:.68rem;color:var(--sl2);margin-top:.05rem}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:1rem}
.spinner{width:2.5rem;height:2.5rem;border:3px solid rgba(0,191,255,.2);border-top-color:var(--b3);
  border-radius:50%;animation:spin2 .8s linear infinite}
@keyframes spin2{to{transform:rotate(360deg)}}

/* MISC */
.dv2{width:100%;text-align:center;color:var(--sl);font-size:.72rem;margin:.3rem 0;display:flex;align-items:center;gap:.5rem;max-width:560px}
.dv2::before,.dv2::after{content:'';flex:1;height:1px;background:var(--bdr)}
.rdo{display:flex;align-items:center;gap:.65rem;background:rgba(255,255,255,.04);border:1.5px solid var(--bdr);border-radius:.65rem;padding:.6rem .85rem;cursor:pointer;margin-bottom:.4rem}
.rdo.sl{border-color:var(--b3);background:rgba(0,191,255,.08)}
.rd{width:1.1rem;height:1.1rem;border-radius:50%;border:2px solid var(--sl);flex-shrink:0;display:grid;place-items:center}
.rdo.sl .rd{border-color:var(--b3);background:var(--b3)}
.rd::after{content:'';width:.45rem;height:.45rem;border-radius:50%;background:#fff;display:none}
.rdo.sl .rd::after{display:block}
.rdtx{font-size:.85rem}
.ig{display:grid;grid-template-columns:repeat(7,1fr);gap:.35rem;margin-top:.35rem}
.io{background:var(--card);border:2px solid var(--bdr);border-radius:.5rem;font-size:1.2rem;padding:.3rem .1rem;cursor:pointer;text-align:center}
.io.sl{border-color:var(--b3);background:rgba(0,191,255,.15)}
.cr2{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.35rem}
.cs2{width:2.1rem;height:2.1rem;border-radius:.45rem;border:2.5px solid transparent;cursor:pointer}
.cs2.sl{border-color:#fff}
.em{text-align:center;padding:2rem 1rem;color:var(--sl2)}
.emi{font-size:2.5rem;margin-bottom:.5rem}
.emt{font-size:.88rem;margin-bottom:1rem;line-height:1.5}
.pr2{display:flex;gap:.5rem;align-items:center;margin-bottom:.6rem}
.pav{width:2.2rem;height:2.2rem;border-radius:50%;display:grid;place-items:center;font-size:1rem;flex-shrink:0}
.rmb{background:none;border:none;color:var(--sl);font-size:1rem;cursor:pointer;padding:.2rem .4rem}
.inp2{width:100%;background:rgba(255,255,255,.06);border:1.5px solid var(--bdr);border-radius:.7rem;padding:.7rem .9rem;color:var(--wh);font-size:.9rem;outline:none;font-family:'Inter',sans-serif;-webkit-appearance:none}
.inp2:focus{border-color:var(--b3)}
.inp2::placeholder{color:var(--sl)}
textarea.inp2{resize:none;line-height:1.5}
select.inp2{cursor:pointer}
select.inp2 option{background:var(--bg2)}
.lbl2{display:block;font-size:.72rem;color:var(--sl2);font-weight:600;margin-bottom:.3rem;letter-spacing:.04em;text-transform:uppercase}
.fld2{margin-bottom:.85rem}
.pb{height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.pf{height:100%;border-radius:2px}

.friend-card{background:var(--card);border:1px solid var(--bdr);border-radius:1rem;padding:.85rem 1rem;display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem}
.friend-av{width:3rem;height:3rem;border-radius:50%;display:grid;place-items:center;font-size:1.4rem;flex-shrink:0;border:2px solid rgba(0,191,255,.25)}
.friend-nm{font-weight:700;font-size:.95rem}
.friend-sb{font-size:.72rem;color:var(--sl2);margin-top:.08rem}
.online-dot{width:.55rem;height:.55rem;border-radius:50%;background:var(--gr);display:inline-block;margin-right:.3rem;box-shadow:0 0 6px var(--gr)}
.offline-dot{width:.55rem;height:.55rem;border-radius:50%;background:var(--sl2);display:inline-block;margin-right:.3rem}
.req-card{background:linear-gradient(135deg,rgba(37,99,235,.15),rgba(107,63,255,.1));border:1px solid rgba(100,140,255,.25);border-radius:1rem;padding:.85rem 1rem;display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem}
.sinp{width:100%;background:rgba(255,255,255,.07);border:1.5px solid var(--bdr);border-radius:.85rem;padding:.8rem 1rem .8rem 2.8rem;color:var(--wh);font-size:.92rem;outline:none;font-family:'Inter',sans-serif;-webkit-appearance:none}
.sinp:focus{border-color:var(--b3)}
.sinp::placeholder{color:var(--sl)}
.sres{background:var(--bg2);border:1px solid var(--bdr);border-radius:.85rem;margin-top:.35rem;overflow:hidden}
.sitem{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-bottom:1px solid rgba(100,140,255,.07);cursor:pointer}
.sitem:last-child{border-bottom:none}
.sitem:active{background:rgba(37,99,235,.1)}
.chat-item{background:var(--card);border:1px solid var(--bdr);border-radius:1rem;padding:.85rem 1rem;display:flex;align-items:center;gap:.75rem;cursor:pointer;margin-bottom:.5rem}
.chat-item:active{background:rgba(37,99,235,.1)}
.cav{width:2.8rem;height:2.8rem;border-radius:50%;display:grid;place-items:center;font-size:1.3rem;flex-shrink:0;position:relative}
.cunread{position:absolute;top:-.2rem;right:-.2rem;background:var(--rd);border-radius:50%;width:1.1rem;height:1.1rem;display:grid;place-items:center;font-size:.6rem;font-weight:700;color:#fff;border:2px solid var(--bg)}
.cscreen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;background:#060A18;overflow:hidden}
.chdr{background:rgba(6,8,24,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);padding:max(env(safe-area-inset-top),.75rem) 1rem .75rem;display:flex;align-items:center;gap:.75rem;flex-shrink:0}
.cmsgs{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;padding:.6rem .75rem;min-height:0}
.mw{display:flex;flex-direction:column;max-width:78%}
.mw.me{align-self:flex-end;align-items:flex-end}
.mw.them{align-self:flex-start;align-items:flex-start}
.mb2{padding:.65rem .9rem;border-radius:1.1rem;font-size:.9rem;line-height:1.45;word-break:break-word}
.mw.me .mb2{background:linear-gradient(135deg,var(--b2),var(--b3));color:#fff;border-bottom-right-radius:.3rem}
.mw.them .mb2{background:var(--card);border:1px solid var(--bdr);color:var(--wh);border-bottom-left-radius:.3rem}
.mt{font-size:.62rem;color:var(--sl2);margin-top:.2rem;padding:0 .2rem}
.cinpw{background:rgba(6,8,24,.97);backdrop-filter:blur(20px);border-top:1px solid var(--bdr);padding:.6rem 1rem calc(.6rem + env(safe-area-inset-bottom));display:flex;align-items:flex-end;gap:.5rem;flex-shrink:0}
.cinp{flex:1;background:rgba(255,255,255,.07);border:1.5px solid var(--bdr);border-radius:1.3rem;padding:.65rem 1rem;color:var(--wh);font-size:.9rem;outline:none;font-family:'Inter',sans-serif;resize:none;max-height:100px;line-height:1.4;-webkit-appearance:none}
.cinp:focus{border-color:var(--b3)}
.cinp::placeholder{color:var(--sl)}
.sbtn{width:2.6rem;height:2.6rem;border-radius:50%;background:linear-gradient(135deg,var(--b2),var(--b3));border:none;color:#fff;font-size:1.1rem;cursor:pointer;display:grid;place-items:center;flex-shrink:0}
.sbtn:active{transform:scale(.92)}
.ddiv{text-align:center;font-size:.7rem;color:var(--sl2);margin:.4rem 0;display:flex;align-items:center;gap:.5rem}
.ddiv::before,.ddiv::after{content:'';flex:1;height:1px;background:var(--bdr)}
@keyframes spin2{to{transform:rotate(360deg)}}

/* ═══ STORIES ═══ */
.stories-bar{display:flex;gap:.75rem;overflow-x:auto;padding:.5rem 0 .75rem;scrollbar-width:none;width:100%;max-width:560px}
.stories-bar::-webkit-scrollbar{display:none}
.story-bubble{display:flex;flex-direction:column;align-items:center;gap:.35rem;cursor:pointer;flex-shrink:0}
.story-ring{width:3.8rem;height:3.8rem;border-radius:50%;padding:3px;background:linear-gradient(135deg,#F59E0B,#EF4444,#8B5CF6);flex-shrink:0}
.story-ring.seen{background:rgba(100,116,139,.4)}
.story-ring.own{background:linear-gradient(135deg,var(--b2),var(--b3))}
.story-av{width:100%;height:100%;border-radius:50%;background:var(--bg2);display:grid;place-items:center;font-size:1.5rem;border:2.5px solid var(--bg)}
.story-nm{font-size:.62rem;color:var(--sl2);max-width:3.8rem;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.story-add{width:3.8rem;height:3.8rem;border-radius:50%;background:var(--card);border:2px dashed var(--bdr);display:grid;place-items:center;font-size:1.4rem;cursor:pointer;flex-shrink:0}

/* Story viewer (fullscreen) */
.story-viewer{position:fixed;inset:0;z-index:100;background:#000;display:flex;flex-direction:column}
.sv-header{position:absolute;top:0;left:0;right:0;z-index:10;padding:max(env(safe-area-inset-top),1rem) 1rem .75rem}
.sv-progress{display:flex;gap:.25rem;margin-bottom:.75rem}
.sv-prog-bar{flex:1;height:3px;background:rgba(255,255,255,.3);border-radius:2px;overflow:hidden}
.sv-prog-fill{height:100%;background:#fff;border-radius:2px;transition:width linear}
.sv-top{display:flex;align-items:center;gap:.75rem}

<script>
'use strict';

// ══════════════════════════════════════════════
// FIREBASE CONFIG
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyD4o7SprtOMn7F4iFjVmPB37C1Tf7mICDk",
  authDomain: "tolaanfur-5b5f5.firebaseapp.com",
  databaseURL: "https://tolaanfur-5b5f5-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tolaanfur-5b5f5",
  storageBucket: "tolaanfur-5b5f5.firebasestorage.app",
  messagingSenderId: "188890145767",
  appId: "1:188890145767:web:6ec8fe6fae4ddd90891342"
};

// Init Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const rtdb = firebase.database(); // Realtime Database
try { db.enableNetwork(); } catch(e) {}
const storage = null;

// ══════════════════════════════════════════════
// CONSTANTEN
// ══════════════════════════════════════════════
const AV=['🚀','🌟','⚡','🔥','🎯','💎','🦅','🐉','🎪','🌈','🌺','🦋','🎭','🏆','💫'];
const AC=['#2563EB','#1E90FF','#6B3FFF','#059669','#D97706','#0891B2','#BE185D','#15803D','#9333EA','#0369A1','#DC2626','#7C3AED','#0284C7','#B45309','#047857'];
const IC=['🔬','🏛️','🌍','📐','🎵','⚽','🍕','🐾','💻','🎭','📚','✈️','🚗','🎮','🎨','🧪','🌿','🏆','💡','🔭','🎯','🦁','🌊','❄️','🌸','🧠','⚡','🎸','🍎','🏠','🕌','📿','☪️','🌙','⭐'];
const CL=['#2563EB','#1E90FF','#6B3FFF','#8B5FFF','#059669','#D97706','#DC2626','#0891B2','#BE185D','#15803D','#9333EA','#0369A1','#B45309','#7C3AED','#0284C7'];

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let SC = 'loading';
let CX = {};
let currentUser = null;
let profile = null;
let JU = null;
let QS = null;
let QT = null;
let SS2 = {};

// ══════════════════════════════════════════════
// FASE 2 — VRIENDEN & CHAT (Firebase)
// ══════════════════════════════════════════════
let myFriends=[];
let friendRequests=[];
let activeChat=null;
let chatMessages=[];
let unreadCounts={};
let _chatUnsubscribe=null;
let searchResults=[];

function getChatId(a,b){return[a,b].sort().join('_');}

function startFriendListeners(){
  if(!currentUser||currentUser.isAnonymous)return;
  const uid=currentUser.uid;
  // Inkomende vriendschapsverzoeken
  db.collection('friend_requests').where('to','==',uid).where('status','==','pending')
    .onSnapshot(snap=>{friendRequests=snap.docs.map(d=>({id:d.id,...d.data()}));updateBadge();if(SC==='friends')render();});
  // Vrienden
  db.collection('friendships').where('users','array-contains',uid)
    .onSnapshot(async snap=>{
      const fids=snap.docs.map(d=>d.data().users.find(u=>u!==uid)).filter(Boolean);
      if(!fids.length){myFriends=[];if(SC==='friends'||SC==='chats')render();return;}
      const ps=await Promise.all(fids.map(fuid=>db.collection('users').doc(fuid).get().then(d=>d.exists?{uid:fuid,...d.data()}:null)));
      myFriends=ps.filter(Boolean);
      if(typeof reloadStoriesForFriends==='function')reloadStoriesForFriends();
      myFriends.forEach(f=>{
        rtdb.ref('online/'+f.uid).on('value',s=>{
          const fr=myFriends.find(x=>x.uid===f.uid);
          if(fr){fr.online=s.val()?.online||false;fr.lastSeen=s.val()?.lastSeen||0;}
          if(SC==='friends'||SC==='chats')render();
        });
        listenUnread(f.uid);
      });
      if(SC==='friends'||SC==='chats')render();
    });
  setOnline(true);
}

function setOnline(on){
  if(!currentUser||currentUser.isAnonymous)return;
  rtdb.ref('online/'+currentUser.uid).set({online:on,lastSeen:Date.now()});
}

function updateBadge(){
  const tot=Object.values(unreadCounts).reduce((a,b)=>a+b,0)+friendRequests.length;
  const b=document.getElementById('chatBadge');if(b)b.textContent=tot>0?tot:'';
}

function listenUnread(fuid){
  if(!currentUser)return;
  const cid=getChatId(currentUser.uid,fuid);
  rtdb.ref('chats/'+cid+'/unread/'+currentUser.uid).on('value',s=>{
    unreadCounts[fuid]=s.val()||0;updateBadge();if(SC==='chats')render();
  });
}

async function searchUsers(q){
  if(!q||q.length<2){searchResults=[];render();return;}
  q=q.trim();
  const snap=await db.collection('users').where('displayName','>=',q).where('displayName','<=',q+'').limit(8).get();
  searchResults=snap.docs.map(d=>({uid:d.id,...d.data()})).filter(u=>u.uid!==currentUser?.uid);
  render();
}

async function sendFriendReq(toUid,toName){
  if(!currentUser||currentUser.isAnonymous){toast({i:'🔐',t:'Login required'});return;}
  if(myFriends.find(f=>f.uid===toUid)){toast({i:'✅',t:'Already friends!',s:toName});return;}
  const ex=await db.collection('friend_requests').where('from','==',currentUser.uid).where('to','==',toUid).get();
  if(!ex.empty){toast({i:'ℹ️',t:'Already sent!'});return;}
  await db.collection('friend_requests').add({from:currentUser.uid,fromName:profile?.displayName||'User',fromAvatar:profile?.avatar||0,fromAvatarColor:profile?.avatarColor||0,to:toUid,status:'pending',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
  toast({i:'✅',t:'Request sent!',s:'to '+toName});
  searchResults=[];render();
}

async function acceptReq(reqId,fromUid){
  if(!currentUser)return;
  try{
  const batch=db.batch();
  batch.update(db.collection('friend_requests').doc(reqId),{status:'accepted'});
  batch.set(db.collection('friendships').doc(getChatId(currentUser.uid,fromUid)),{users:[currentUser.uid,fromUid],from:currentUser.uid,to:fromUid,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
  await batch.commit();
  toast({i:'🤝',t:'Friends!',s:'Request accepted'});
  }catch(e){toast({i:'❌',t:'Failed: '+e.message});}
}

async function declineReq(reqId){
  await db.collection('friend_requests').doc(reqId).update({status:'declined'});
  toast({i:'✓',t:'Declined'});
}

async function removeFriend(fuid,fnm){
  if(!confirm('Remove '+fnm+' as friend?'))return;
  await db.collection('friendships').doc(getChatId(currentUser.uid,fuid)).delete();
  toast({i:'✓',t:'Removed'});
}

function openChat(friend){
  activeChat = friend;
  chatMessages = [];
  if(_chatUnsubscribe){_chatUnsubscribe();_chatUnsubscribe=null;}
  SC = 'chat';
  render();

  const cid = getChatId(currentUser.uid, friend.uid);
  const ref = rtdb.ref('chats/'+cid+'/messages').orderByChild('ts').limitToLast(60);

  // Gebruik on('value') - werkt op alle browsers inclusief Safari iOS
  ref.on('value', snap=>{
    const msgs = [];
    snap.forEach(child=>{
      const v = child.val();
      if(v && v.text) msgs.push({id:child.key, ...v});
    });
    chatMessages = msgs;
    const c = document.getElementById('cmsgs');
    if(c) renderChatMsgs(c);
  }, err=>{
    console.log('Chat error:', err);
    const c = document.getElementById('cmsgs');
    if(c) c.innerHTML = '<div style="text-align:center;color:var(--rd);padding:2rem">Fout bij laden. Probeer opnieuw.</div>';
  });

  _chatUnsubscribe = ()=> ref.off('value');
  rtdb.ref('chats/'+cid+'/unread/'+currentUser.uid).set(0);
  unreadCounts[friend.uid] = 0;
  updateBadge();
}

function renderChatMsgs(container){
  if(!container||!currentUser)return;
  const msgs = Array.isArray(chatMessages)?chatMessages:[];
  if(msgs.length===0){
    container.innerHTML='<div style="text-align:center;color:rgba(255,255,255,.35);font-size:.82rem;padding:2rem 1rem">Send a message to start 👋</div>';
    return;
  }
  let out=''; let lastDate='';
  msgs.forEach(msg=>{
    if(!msg||!msg.text)return;
    const isMe=msg.from===currentUser.uid;
    const d=new Date(typeof msg.ts==='number'?msg.ts:Date.now());
    const ds=d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
    const ts=d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    if(ds!==lastDate){
      out+=`<div style="text-align:center;margin:.5rem 0;font-size:.68rem;color:rgba(255,255,255,.35);display:flex;align-items:center;gap:.4rem"><div style="flex:1;height:1px;background:rgba(255,255,255,.07)"></div>${ds}<div style="flex:1;height:1px;background:rgba(255,255,255,.07)"></div></div>`;
      lastDate=ds;
    }
    const txt=String(msg.text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if(isMe){
      out+=`<div style="display:flex;justify-content:flex-end;margin-bottom:.3rem"><div style="max-width:75%;background:linear-gradient(135deg,#1D4ED8,#3B82F6);border-radius:.9rem .9rem .15rem .9rem;padding:.5rem .75rem"><div style="color:#fff;font-size:.87rem;line-height:1.4;word-break:break-word">${txt}</div><div style="color:rgba(255,255,255,.55);font-size:.6rem;text-align:right;margin-top:.2rem">${ts} ✓</div></div></div>`;
    } else {
      out+=`<div style="display:flex;justify-content:flex-start;margin-bottom:.3rem"><div style="max-width:75%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:.9rem .9rem .9rem .15rem;padding:.5rem .75rem"><div style="color:#E8EEFF;font-size:.87rem;line-height:1.4;word-break:break-word">${txt}</div><div style="color:rgba(255,255,255,.35);font-size:.6rem;margin-top:.2rem">${ts}</div></div></div>`;
    }
  });
  container.innerHTML=out;
  container.scrollTop=container.scrollHeight;
}

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function fmtTs(ts){
  if(!ts)return'';const d=new Date(ts),now=new Date();
  return d.toDateString()===now.toDateString()?d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}):d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}

async function sendMsg(){
  if(!currentUser||!activeChat)return;
  const inp = document.getElementById('cInp');
  if(!inp)return;
  const text = inp.value.trim();
  if(!text)return;
  inp.value = '';
  
  const cid = getChatId(currentUser.uid, activeChat.uid);
  const msgData = {
    text: text,
    from: currentUser.uid,
    fromName: profile?.displayName || 'Me',
    ts: Date.now()
  };
  
  // Stuur naar Firebase RTDB
  rtdb.ref('chats/'+cid+'/messages').push(msgData)
    .then(()=> console.log('Message sent'))
    .catch(e=> {console.log('Error:',e); toast({i:'❌',t:'Message failed — check connection',s:e.message});});
  
  // Ongelezen teller + melding
  rtdb.ref('chats/'+cid+'/unread/'+activeChat.uid).transaction(v=>(v||0)+1);
  addNotification(activeChat.uid, {
    type:'message',
    fromUid:currentUser.uid,
    fromName:profile?.displayName||'Someone',
    fromAvatar:profile?.avatar||0,
    fromAvatarColor:profile?.avatarColor||0,
    message:_om('sent you a message'),
    ts:Date.now()
  });
}


// ══════════════════════════════════════════════
// FASE 3 — STORIES & MELDINGEN
// ══════════════════════════════════════════════
let allStories = [];       // Alle actieve stories
let myStories = [];        // Eigen stories
let storyViewer = null;    // {stories:[], idx:0, storyIdx:0}
let storyTimer = null;
let notifications = [];    // Meldingen lijst
let unreadNotifs = 0;
let storyCreatorType = 'text'; // 'text' of 'photo'
let storyBgColor = 'linear-gradient(135deg,#1E3A8A,#6B3FFF)';
let storyText = '';
let storyPhotoFile = null;
let storyPhotoPreview = null;

const STORY_BG_COLORS = [
  'linear-gradient(135deg,#1E3A8A,#6B3FFF)',
  'linear-gradient(135deg,#065F46,#10B981)',
  'linear-gradient(135deg,#7C2D12,#F59E0B)',
  'linear-gradient(135deg,#1E1B4B,#EC4899)',
  'linear-gradient(135deg,#0C4A6E,#0EA5E9)',
  'linear-gradient(135deg,#4A1942,#F43F5E)',
  'linear-gradient(135deg,#064E3B,#34D399)',
  'linear-gradient(135deg,#27272A,#71717A)',
];

// Laad alle stories van vrienden + eigen
function loadStories() {
  if(!currentUser || !rtdb) return;
  const cutoffMs = Date.now() - 24*60*60*1000;

  // Laad ALLE stories - filter client-side op vrienden
  // Dit werkt ook als vrienden nog niet geladen zijn
  rtdb.ref('stories').on('value', snap=>{
    const grouped = {};
    
    // Bouw vrienden lijst op het moment van verwerking
    const allUids = [currentUser.uid, ...myFriends.map(f=>f.uid)];
    
    snap.forEach(userSnap=>{
      const uid = userSnap.key;
      // Toon eigen stories + vrienden stories
      if(!allUids.includes(uid)) return;
      
      userSnap.forEach(storySnap=>{
        const s = {id:storySnap.key, ...storySnap.val()};
        if(!s.ts || s.ts < cutoffMs) return; // ouder dan 24u
        if(!grouped[uid]) grouped[uid] = [];
        grouped[uid].push(s);
      });
    });

    allStories = Object.entries(grouped).map(([uid, stories])=>{
      const fr = myFriends.find(f=>f.uid===uid);
      const isOwn = uid === currentUser.uid;
      return {
        uid,
        isOwn,
        displayName: isOwn ? (profile?.displayName||'Ik') : (fr?.displayName||'User'),
        avatar: isOwn ? (profile?.avatar||0) : (fr?.avatar||0),
        avatarColor: isOwn ? (profile?.avatarColor||0) : (fr?.avatarColor||0),
        stories: stories.sort((a,b)=>(a.ts||0)-(b.ts||0))
      };
    });
    
    // Eigen story altijd bovenaan
    allStories.sort((a,b)=> b.isOwn - a.isOwn);
    
    if(SC==='home') render();
  });
}

// Herlaad stories zodra vrienden zijn geladen
function reloadStoriesForFriends() {
  // Stop oude listener
  rtdb.ref('stories').off('value');
  // Start opnieuw met up-to-date vrienden lijst
  loadStories();
}

// Maak een story aan
async function createStory() {
  if (!currentUser || currentUser.isAnonymous) {
    toast({ i: '🔐', t: 'Login required' });
    return;
  }

  const btn = document.getElementById('publishStoryBtn');
  if (btn) { btn.textContent = 'Publiceren...'; btn.disabled = true; }

  try {
    if (!storyText.trim()) { 
      toast({ i: '⚠️', t: 'Voer tekst in voor je story' }); 
      if (btn) { btn.textContent = 'Publiceren ✓'; btn.disabled = false; }
      return; 
    }
    
    const storyData = {
      uid: currentUser.uid,
      displayName: profile?.displayName || 'User',
      avatar: profile?.avatar || 0,
      avatarColor: profile?.avatarColor || 0,
      type: 'text',
      text: storyText.trim(),
      bg: storyBgColor,

async function addNotification(toUid, data) {

// Laad meldingen
function loadNotifications() {
  if (!currentUser || currentUser.isAnonymous) return;
  db.collection('notifications')
    .where('to', '==', currentUser.uid)
    .limit(30)
    .onSnapshot(snap => {
      notifications = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      unreadNotifs = notifications.filter(n => !n.read).length;
      updateNotifBadge();
      if (SC === 'notifications') render();
    });
}

function updateNotifBadge() {
  const b = document.getElementById('notifBadge');
  if (b) b.textContent = unreadNotifs > 0 ? unreadNotifs : '';
  const b2 = document.getElementById('notifBadge2');
  if (b2) b2.style.display = unreadNotifs > 0 ? 'flex' : 'none';
}

async function markAllNotifsRead() {
  if (!currentUser) return;
  const batch = db.batch();
  notifications.filter(n => !n.read).forEach(n => {
    batch.update(db.collection('notifications').doc(n.id), { read: true });
  });
  await batch.commit();
}

// Story viewer openen
function openStoryGroup(groupIdx) {
  storyViewer = { groupIdx, storyIdx: 0 };
  clearInterval(storyTimer);
  SC = 'story-view';
  render();
  startStoryTimer();
  // Markeer als gezien
  const group = allStories[groupIdx];
  if (group && group.stories[0]) {
    markStorySeen(group.stories[0].id, group.uid);
  }
}

function startStoryTimer() {
  clearInterval(storyTimer);
  const duration = 5000;
  let elapsed = 0;
  const interval = 50;
  storyTimer = setInterval(() => {
    elapsed += interval;
    const pct = (elapsed / duration) * 100;
    const fill = document.getElementById('sv-fill');
    if (fill) fill.style.width = pct + '%';
    if (elapsed >= duration) nextStory();
  }, interval);
}

function nextStory() {
  if (!storyViewer) return;
  const group = allStories[storyViewer.groupIdx];
  if (!group) return;
  if (storyViewer.storyIdx < group.stories.length - 1) {
    storyViewer.storyIdx++;
    render();
    startStoryTimer();
    markStorySeen(group.stories[storyViewer.storyIdx].id, group.uid);
  } else if (storyViewer.groupIdx < allStories.length - 1) {
    storyViewer.groupIdx++;
    storyViewer.storyIdx = 0;
    render();
    startStoryTimer();
  } else {
    closeStoryViewer();
  }
}

function prevStory() {
  if (!storyViewer) return;
  if (storyViewer.storyIdx > 0) {
    storyViewer.storyIdx--;
    render();
    startStoryTimer();
  }
}

function closeStoryViewer() {
  clearInterval(storyTimer);
  storyViewer = null;
  SC = 'home';
  render();
}

async function markStorySeen(storyId, uid) {
  if (!currentUser || !uid) return;
  rtdb.ref('stories/'+uid+'/'+storyId+'/views/'+currentUser.uid).set(true).catch(()=>{});
}

// Achtergrond chat listener - altijd actief voor nieuwe berichten
function startBackgroundChatListener() {
  if (!currentUser || currentUser.isAnonymous) return;
  // Luister naar nieuwe berichten voor ALLE vrienden
  myFriends.forEach(friend => {
    const cid = getChatId(currentUser.uid, friend.uid);
    rtdb.ref('chats/'+cid+'/unread/'+currentUser.uid).on('value', snap=>{
      const count = snap.val() || 0;
      unreadCounts[friend.uid] = count;
      updateBadge();
      // Als chat open is met deze vriend, markeer als gelezen
      if(activeChat && activeChat.uid === friend.uid && count > 0) {
        rtdb.ref('chats/'+cid+'/unread/'+currentUser.uid).set(0);
        unreadCounts[friend.uid] = 0;
      }
      if(SC === 'chats') render();
    });
  });
}

// Berekening afstand tot Mekka (Haversine formule)
function getDistanceToMecca(lat, lng) {
  const R = 6371; // km
  const mLat = 21.4225, mLng = 39.8262;
  const dLat = (mLat-lat)*Math.PI/180;
  const dLng = (mLng-lng)*Math.PI/180;
  const a = Math.sin(dLat/2)*Math.sin(dLat/2) +
    Math.cos(lat*Math.PI/180)*Math.cos(mLat*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function ha2(opt){
  if(!QS||QS.an)return;clearInterval(QT);
  const q=QS.qs[QS.qi],ok=opt===q.ans,tb=ok?Math.round(QS.tl*2):0,pts=ok?(100+tb)*(QS.lv.df||1):0;

  if(QS.sk===3)toast({i:'🔥',t:'Op dreef!'});render();
}
function adv(){
  const nq=QS.qi+1;

}

  clearInterval(QT);

  const nQ=QS.qs.length,cr=QS.cr,pct=Math.round((cr/nQ)*100),ok=pct>=(lv.ps||70);

function handleNotifClick(id, type, fromUid) {
  db.collection('notifications').doc(id).update({ read: true }).catch(() => {});
  if (type === 'story') go('home');
  else if (type === 'friend_request') go('friends');
  else if (type === 'message' && fromUid) {
    const friend = myFriends.find(f => f.uid === fromUid);
    if (friend) openChat(friend);
  }
}


// ═══ LOCATIE + GEBEDSTIJDEN ═══
function getLoc(){
  if(!navigator.geolocation){toast({i:'❌',t:'GPS niet beschikbaar'});return;}
  toast({i:'📍',t:'Locatie ophalen...'});
  navigator.geolocation.getCurrentPosition(async pos=>{
    const lt=pos.coords.latitude, lg=pos.coords.longitude;
    PS.loc={lat:lt,lng:lg};
    
    // Qiblah
    const kl=21.4225,kl2=39.8262,dL=(kl2-lg)*Math.PI/180;
    PS.qiblah=((Math.atan2(Math.sin(dL)*Math.cos(kl*Math.PI/180),Math.cos(lt*Math.PI/180)*Math.sin(kl*Math.PI/180)-Math.sin(lt*Math.PI/180)*Math.cos(kl*Math.PI/180)*Math.cos(dL)))*180/Math.PI+360)%360;
    
    // Stad + land
    let cc='NL';
    try{
      const r=await fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lt+'&lon='+lg+'&accept-language=nl');
      const d=await r.json();
      PS.city=d.address?.city||d.address?.town||d.address?.village||d.address?.municipality||'Jouw locatie';
      cc=(d.address?.country_code||'nl').toUpperCase();
      PS.country=cc;
    }catch(e){PS.city='Jouw locatie';}
    
    svp();render();
    toast({i:'⏳',t:'Prayer Times ophalen...'});
    
    // AlAdhan API
    const result = await fetchPrayerTimes(lt, lg, cc);
    if(result){
      PS.times=result.times;
      PS.lastCalc=new Date().toDateString();
      svp();render();
      toast({i:'✅',t:'Bijgewerkt!',s:PS.city+' · '+result.methodName});
    } else {
      svp();render();
      toast({i:'⚠️',t:'API niet beschikbaar',s:'Probeer opnieuw'});
    }
  }, e=>toast({i:'❌',t:'Locatie mislukt',s:e.message}));
}

function tAz(id){
  if(!PS.azan)PS.azan={};
  PS.azan[id]=PS.azan[id]===false?true:false;
  svp();render();
  toast({i:PS.azan[id]?'🔔':'🔕',t:id+' '+(PS.azan[id]?'aan':'uit')});
}

// Gratis Azan MP3 links (CDN hosted)
const AZAN_URLS = [
  'https://www.islamcan.com/audio/adhan/azan1.mp3',  // Mekka stijl
  'https://www.islamcan.com/audio/adhan/azan2.mp3',  // Madina stijl  
  'https://www.islamcan.com/audio/adhan/azan3.mp3',  // Egypte stijl
];

let azanAudio = null;
let azanCheckInterval = null;
let azanPlayed = {}; // bijhouden welke gebeden al gespeeld zijn vandaag

function startAzanChecker() {
  if(azanCheckInterval) clearInterval(azanCheckInterval);
  azanCheckInterval = setInterval(checkAzanTime, 30000); // check elke 30 sec
  checkAzanTime(); // direct checken
}

function checkAzanTime() {
  if(!currentUser || currentUser.isAnonymous) return;
  if(!PS.times || !PS.azan) return;
  
  const now = new Date();
  const hm = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  const today = now.toDateString();
  
  // Reset gespeeld lijst elke dag
  if(azanPlayed.date !== today) azanPlayed = {date: today};
  
  const gebeden = ['fajr','dhuhr','asr','maghrib','isha'];
  gebeden.forEach(g => {
    const tijd = PS.times[g];
    if(!tijd) return;
    if(PS.azan[g] === false) return; // azan uit voor dit gebed
    if(azanPlayed[g]) return; // al gespeeld vandaag
    
    // Check of het nu gebedstijd is (binnen 1 minuut)
    if(tijd === hm) {
      azanPlayed[g] = true;
      speelAzan(g);
    }
  });
}

function speelAzan(gebed) {
  // Stop eventuele lopende azan
  if(azanAudio) {
    azanAudio.pause();
    azanAudio = null;
  }
  
  // Kies azan geluid op basis van instelling
  const azanKeuze = PS.azanSound || 0;
  const url = AZAN_URLS[azanKeuze % AZAN_URLS.length];
  
  azanAudio = new Audio(url);
  azanAudio.volume = 1.0;
  azanAudio.play()
    .then(() => {
      toast({i:'🕌',t:'Azan tijd!',s:gebed.charAt(0).toUpperCase()+gebed.slice(1)});
    })
    .catch(e => {
      console.log('Azan audio error:', e);
      toast({i:'🔔',t:'Azan tijd!',s:gebed.charAt(0).toUpperCase()+gebed.slice(1)});
    });
}

function stopAzan() {
  if(azanAudio) {
    azanAudio.pause();
    azanAudio.currentTime = 0;
    azanAudio = null;
  }
}

function testAzan() {
  speelAzan('test');
  toast({i:'🔊',t:'Test Azan',s:'Hoor je het geluid?'});
}

function updateQiblahGlow(correct) {
  const outer = document.getElementById('qiblah-ring-outer');
  const inner = document.getElementById('qiblah-ring-inner');
  const glow  = document.getElementById('qiblah-glow-ring');
  const bgDiv = document.querySelector('.qiblah-bg-glow');

  if(correct) {
    // Groen gloeien
    if(outer) outer.style.cssText = 'position:absolute;inset:0;border-radius:50%;border:2px solid rgba(52,211,153,.8);transition:all .5s;box-shadow:0 0 20px rgba(52,211,153,.5)';
    if(inner) inner.style.cssText = 'position:absolute;inset:8px;border-radius:50%;border:1px solid rgba(52,211,153,.4);transition:all .5s';
    if(glow)  glow.style.cssText  = 'position:absolute;inset:-4px;border-radius:50%;border:3px solid rgba(52,211,153,.7);transition:all .6s;pointer-events:none;box-shadow:0 0 25px rgba(52,211,153,.6),0 0 50px rgba(52,211,153,.3),inset 0 0 25px rgba(52,211,153,.1);animation:qiblahGlow 1.5s ease-in-out infinite';
    // Toast alleen 1x tonen
    if(!window._qiblahAligned) {
      window._qiblahAligned = true;
      toast({i:'🕋',t:'Qiblah gevonden!',s:'Je kijkt richting Ka\'bah'});
    }
  } else {
    // Terug naar paars
    if(outer) outer.style.cssText = 'position:absolute;inset:0;border-radius:50%;border:2px solid rgba(139,92,246,.2);transition:all .5s';
    if(inner) inner.style.cssText = 'position:absolute;inset:8px;border-radius:50%;border:1px solid rgba(139,92,246,.1);transition:all .5s';
    if(glow)  glow.style.cssText  = 'position:absolute;inset:-4px;border-radius:50%;border:3px solid rgba(52,211,153,0);transition:all .6s;pointer-events:none';
    window._qiblahAligned = false;
  }
}

let _cmpH = null;

function startCompass(){
  if(_cmpH) window.removeEventListener('deviceorientation', _cmpH, true);
  
  _cmpH = function(e){
    let h = 0;
    if(typeof e.webkitCompassHeading === 'number') h = e.webkitCompassHeading;
    else if(e.alpha !== null) h = (360 - e.alpha) % 360;
    else return;
    
    const rot = (PS.qiblah||0) - h;
    const n = document.getElementById('cmp-needle');
    if(n) n.style.transform = `rotate(${rot}deg)`;
    
    // Groen gloeien als correct gericht (binnen 10 graden)
    const normRot = ((rot % 360) + 360) % 360;
    const correct = normRot < 10 || normRot > 350;
    updateQiblahGlow(correct);
    
    // Update graden teller
    const degEl = document.getElementById('qib-deg');
    if(degEl) degEl.textContent = Math.round((PS.qiblah||0)) + '°';
  };
  
  if(typeof DeviceOrientationEvent !== 'undefined' && 
     typeof DeviceOrientationEvent.requestPermission === 'function'){
    DeviceOrientationEvent.requestPermission()
      .then(p => {
        if(p === 'granted'){
          window.addEventListener('deviceorientation', _cmpH, true);
          toast({i:'🧭', t:'Kompas actief'});
        }
      }).catch(()=>{});
  } else {
    window.addEventListener('deviceorientation', _cmpH, true);
  }
}

async function fetchPrayerTimes(lat, lng, countryCode) {
  const METHODS = {'NL':3,'BE':3,'DE':3,'FR':3,'GB':3,'SE':3,'NO':3,'DK':3,'FI':3,'IT':3,'ES':3,'PT':3,'AT':3,'CH':3,'US':2,'CA':2,'SA':4,'AE':4,'KW':4,'BH':4,'QA':4,'PK':5,'IN':5,'BD':5,'EG':1};
  const method = PS.method || METHODS[countryCode] || 3;
  PS.method = method;
  const d = new Date();
  const ds = d.getDate()+'-'+(d.getMonth()+1)+'-'+d.getFullYear();
  const url = 'https://api.aladhan.com/v1/timings/'+ds+'?latitude='+lat+'&longitude='+lng+'&method='+method+'&school=0';
  const methodNames = {1:'Egypte',2:'ISNA',3:'MWL — Europa',4:'Mekka',5:'Karachi',8:'Golf'};
  try {
    const ctrl = new AbortController();
    const tid = setTimeout(()=>ctrl.abort(), 10000);
    const r = await fetch(url, {signal: ctrl.signal});
    clearTimeout(tid);
    const json = await r.json();
    if(json.code===200 && json.data && json.data.timings) {
      const raw = json.data.timings;
      const t = {
        fajr:    (raw.Fajr    ||'--:--').substring(0,5),
        sunrise: (raw.Sunrise ||'--:--').substring(0,5),
        dhuhr:   (raw.Dhuhr   ||'--:--').substring(0,5),
        asr:     (raw.Asr     ||'--:--').substring(0,5),
        maghrib: (raw.Maghrib ||'--:--').substring(0,5),
        isha:    (raw.Isha    ||'--:--').substring(0,5),
        imsak:   (raw.Imsak   ||'--:--').substring(0,5),
      };
      return {times: t, method, methodName: methodNames[method]||'MWL'};
    }
  } catch(e) {
    console.log('AlAdhan fout:', e.message);
  }
  return null;
}

function loadLeaderboard() {
  db.collection('users')

// Laad groepen
function loadGroups() {
  if(!currentUser) return;
  
  // Mijn groepen
  db.collection('groups')
    .where('members', 'array-contains', currentUser.uid)
    .onSnapshot(snap => {
      myGroups = snap.docs.map(d => ({id: d.id, ...d.data()}));
      if(SC === 'community') render();

  db.collection('groups')

// Create group
async function createGroup(naam, beschrijving, icoon, isPublic) {
  if(!currentUser || currentUser.isAnonymous) {
    toast({i:'🔐', t:'Login required'}); return;
  }
  if(!naam.trim()) { toast({i:'⚠️', t:'Name is required'}); return; }
  
  const group = {
    naam: naam.trim(),
    name: naam.trim(),
    beschrijving: beschrijving.trim(),
    description: beschrijving.trim(),
    icoon: icoon || '🕌',
    public: isPublic,
    members: [currentUser.uid],
    admins: [currentUser.uid],
    oprichter: currentUser.uid,
    createdBy: currentUser.uid,
    oprichterNaam: profile?.displayName || 'User',
    aangemaakt: firebase.firestore.FieldValue.serverTimestamp(),
    berichtenCount: 0
  };
  
  const ref = await db.collection('groups').add(group);
  toast({i:'✅', t:'Group created!', s: naam});
  openGroup({id: ref.id, ...group});
}

async function joinGroup(groupId, groupNaam) {

    members: firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
  });

// Groep openen
function openGroup(group) {
  activeGroup = group;
  groupMessages = [];
  if(_groupUnsubscribe) { _groupUnsubscribe(); _groupUnsubscribe = null; }
  SC = 'group-chat';
  render();
  
  const ref = rtdb.ref('group_chats/' + group.id + '/messages').orderByChild('ts').limitToLast(80);
  ref.on('value', snap => {
    groupMessages = [];
    snap.forEach(c => {
      const v = c.val();
      if(v && v.text) groupMessages.push({id: c.key, ...v});
    });
    const c = document.getElementById('gcmsgs');
    if(c) renderGroupMsgs(c);
  });
  _groupUnsubscribe = () => ref.off('value');
}

function renderGroupMsgs(container) {
  if(!container || !currentUser) return;
  const msgs = groupMessages;
  if(!msgs.length) {
    container.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,.35);font-size:.85rem;padding:3rem 1rem">Wees de eerste die een bericht stuurt! 🕌</div>';
    return;
  }
  let out = ''; let lastDate = '';
  msgs.forEach(msg => {
    if(!msg || !msg.text) return;
    const isMe = msg.from === currentUser.uid;
    const d = new Date(msg.ts || Date.now());
    const ds = d.toLocaleDateString('en-GB', {day:'numeric', month:'short'});
    const ts = d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
    if(ds !== lastDate) {
      out += `<div style="text-align:center;margin:.5rem 0;font-size:.68rem;color:rgba(255,255,255,.35);display:flex;align-items:center;gap:.4rem"><div style="flex:1;height:1px;background:rgba(255,255,255,.07)"></div>${ds}<div style="flex:1;height:1px;background:rgba(255,255,255,.07)"></div></div>`;
      lastDate = ds;
    }
    const txt = String(msg.text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if(isMe) {
      out += `<div style="display:flex;justify-content:flex-end;margin-bottom:.3rem"><div style="max-width:75%;background:linear-gradient(135deg,#1D4ED8,#3B82F6);border-radius:.9rem .9rem .15rem .9rem;padding:.5rem .75rem"><div style="color:#fff;font-size:.87rem;line-height:1.4;word-break:break-word">${txt}</div><div style="color:rgba(255,255,255,.55);font-size:.6rem;text-align:right;margin-top:.2rem">${ts} ✓</div></div></div>`;
    } else {
      out += `<div style="display:flex;justify-content:flex-start;margin-bottom:.3rem;gap:.4rem"><div style="width:1.6rem;height:1.6rem;border-radius:50%;background:${AC[(msg.fromAvatar||0)%AC.length]};display:grid;place-items:center;font-size:.7rem;flex-shrink:0;align-self:flex-end">${AV[(msg.fromAvatar||0)%AV.length]}</div><div style="max-width:72%"><div style="font-size:.62rem;color:rgba(255,255,255,.4);margin-bottom:.15rem">${msg.fromName||'?'}</div><div style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:.9rem .9rem .9rem .15rem;padding:.5rem .75rem"><div style="color:#E8EEFF;font-size:.87rem;line-height:1.4;word-break:break-word">${txt}</div><div style="color:rgba(255,255,255,.35);font-size:.6rem;margin-top:.2rem">${ts}</div></div></div></div>`;
    }
  });
  container.innerHTML = out;
  container.scrollTop = container.scrollHeight;
}

      <button class="btn bt" id="createGroupBtn" style="margin-top:.5rem">Create group ✓</button>

        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,90)+'px'"

// ══════════════════════════════════════════════
// EVENT BINDING
// ══════════════════════════════════════════════
function bind() {
  const $ = id => document.getElementById(id);
  const on = (el, ev, fn) => { if(el) el.addEventListener(ev, fn); };
  const all = (s, ev, fn) => document.querySelectorAll(s).forEach(e => e.addEventListener(ev, fn));

  // Tabs & navigation
  all('[data-go]', 'click', e => {
    const g = e.currentTarget.dataset.go;
    if(g === 'play-map' && e.currentTarget.dataset.cat) CX.catId = e.currentTarget.dataset.cat;
    go(g, CX);
  });
  all('[data-cat]', 'click', e => { CX = {catId: e.currentTarget.dataset.cat}; go('play-map', CX); });
  all('[data-lvl]', 'click', e => sq(CX.catId, +e.currentTarget.dataset.lvl));
  all('[data-gc]', 'click', e => go('admin-cat', {cid: e.currentTarget.dataset.gc}));
  all('[data-gq]', 'click', e => go('admin-q', {cid: CX.cid, lid: +e.currentTarget.dataset.gq}));
  all('[data-bq]', 'click', () => go('admin-q', {cid: CX.cid, lid: CX.lid}));
  all('.bk[data-go]', 'click', e => { e.stopPropagation(); go(e.currentTarget.dataset.go); });

  // Auth
  on($('loginBtn'), 'click', async () => {
    const email = ($('loginEmail')||{}).value?.trim();
    const pw = ($('loginPw')||{}).value;
    const err = $('loginErr');
    if(!email || !pw) { if(err){err.textContent='Vul alle velden in.';err.style.display='block';} return; }
    const btn = $('loginBtn');
    if(btn){btn.textContent='Loading...';btn.disabled=true;}
    try {
      await auth.signInWithEmailAndPassword(email, pw);
      toast({i:'✅', t:'Welkom terug!'});
    } catch(e) {
      const msgs = {'auth/user-not-found':'No account found with this email.','auth/wrong-password':'Incorrect password.','auth/invalid-email':'Invalid email address.','auth/too-many-requests':'Too many attempts. Try again later.','auth/invalid-credential':'Incorrect email or password.'};
      if(err){err.textContent=msgs[e.code]||'Inloggen mislukt.';err.style.display='block';}
      if(btn){btn.textContent='Login →';btn.disabled=false;}
    }
  });

  on($('googleBtn'), 'click', async () => {
    const btn = $('googleBtn');
    if(btn){btn.style.opacity='.7';btn.disabled=true;}
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({prompt: 'select_account'});
      try {
        const result = await auth.signInWithPopup(provider);
        toast({i:'🎉', t:'Welcome ' + (result.user.displayName||'') + '!'});
      } catch(popupErr) {
        // Popup geblokkeerd - probeer redirect
        if(popupErr.code === 'auth/popup-blocked' || popupErr.code === 'auth/popup-closed-by-user') {
          await auth.signInWithRedirect(provider);
        } else {
          throw popupErr;
        }
      }
    } catch(e) {
      toast({i:'❌', t:'Google sign in failed'});
      if(btn){btn.style.opacity='1';btn.disabled=false;}
    }
  });

  on($('guestBtn'), 'click', async () => {
    const btn = $('guestBtn');
    if(btn){btn.textContent='Loading...';btn.disabled=true;}
    try {
      await auth.signInAnonymously();
      toast({i:'👤', t:'Continue as guest'});
    } catch(e) {
      toast({i:'❌', t:'Enable Anonymous Auth in Firebase Console'});
      if(btn){btn.textContent='👤 Continue as guest';btn.disabled=false;}
    }
  });

  on($('toRegister'), 'click', () => go('register'));
  on($('toRegisterHome'), 'click', () => go('register'));
  on($('toRegisterProf'), 'click', () => go('register'));
  on($('toLoginProf'), 'click', () => go('login'));
  on($('toForgot'), 'click', () => go('forgot-pw'));
  on($('toLogin'), 'click', () => go('login'));

  on($('regBtn'), 'click', async () => {
    const name = ($('regName')||{}).value?.trim();
    const email = ($('regEmail')||{}).value?.trim();
    const pw = ($('regPw')||{}).value;
    const pw2 = ($('regPw2')||{}).value;
    const err = $('regErr');
    if(!name||!email||!pw||!pw2){if(err){err.textContent='Vul alle velden in.';err.style.display='block';} return;}
    if(pw!==pw2){if(err){err.textContent='Passworden komen niet overeen.';err.style.display='block';} return;}
    if(pw.length<6){if(err){err.textContent='Password moet minimaal 6 tekens zijn.';err.style.display='block';} return;}
    const btn = $('regBtn');
    if(btn){btn.textContent='Account aanmaken...';btn.disabled=true;}
    try {
      const cred = await auth.createUserWithEmailAndPassword(email, pw);
      await cred.user.updateProfile({displayName: name});
      profile = {uid:cred.user.uid,email,displayName:name,avatar:0,avatarColor:0,bio:'',pts:0,xp:0,badges:[],joinedAt:firebase.firestore.FieldValue.serverTimestamp(),lastActive:firebase.firestore.FieldValue.serverTimestamp()};
      await db.collection('users').doc(cred.user.uid).set(profile);
      toast({i:'🎉', t:'Account created!', s:`Welcome ${name}!`});
    } catch(e) {
      const msgs = {'auth/email-already-in-use':'Dit e-mailadres is al in gebruik.','auth/invalid-email':'Ongeldig e-mailadres.','auth/weak-password':'Password is te zwak.'};
      if(err){err.textContent=msgs[e.code]||'Registratie mislukt.';err.style.display='block';}
      if(btn){btn.textContent='Create Account →';btn.disabled=false;}
    }
  });

  on($('fwBtn'), 'click', async () => {
    const email = ($('fwEmail')||{}).value?.trim();
    const msg = $('fwMsg');
    if(!email){if(msg){msg.textContent='Vul je e-mailadres in.';msg.style.display='block';} return;}
    try {
      await auth.sendPasswordResetEmail(email);
      if(msg){msg.textContent='✅ Herstelmail verstuurd! Controleer je inbox.';msg.style.color='var(--gr)';msg.style.display='block';}
    } catch(e) {
      if(msg){msg.textContent='Email address niet gevonden.';msg.style.display='block';}
    }
  });

  // Profiel
  on($('logoutBtn'), 'click', async () => {
    if(confirm('Wil je uitloggen?')) {
      await auth.signOut();
      toast({i:'👋', t:'Tot ziens!'});
    }
  });

  // Edit profiel
  all('[data-av]', 'click', e => {
    CX.dr = CX.dr || {};
    CX.dr.avatar = +e.currentTarget.dataset.av;
    const prev = document.getElementById('avatarPreview');
    if(prev){prev.textContent=AV[CX.dr.avatar];prev.style.background=AC[(CX.dr.avatarColor||0)%AC.length];}
    document.querySelectorAll('[data-av]').forEach(el=>el.classList.toggle('sl',+el.dataset.av===CX.dr.avatar));
  });
  all('[data-avc]', 'click', e => {
    CX.dr = CX.dr || {};
    CX.dr.avatarColor = +e.currentTarget.dataset.avc;
    const prev = document.getElementById('avatarPreview');
    if(prev)prev.style.background=AC[CX.dr.avatarColor%AC.length];
    document.querySelectorAll('[data-avc]').forEach(el=>el.classList.toggle('sl',+el.dataset.avc===CX.dr.avatarColor));
  });
  on($('saveProfileBtn'), 'click', async () => {
    const name = ($('epName')||{}).value?.trim();
    const bio = ($('epBio')||{}).value?.trim()||'';
    if(!name){toast({i:'❌',t:'Naam mag niet leeg zijn'});return;}
    const btn = $('saveProfileBtn');
    if(btn){btn.textContent='Save...';btn.disabled=true;}
    const updates = {displayName:name,bio,avatar:CX.dr?.avatar??profile?.avatar??0,avatarColor:CX.dr?.avatarColor??profile?.avatarColor??0};
    try {
      if(currentUser&&!currentUser.isAnonymous){
        await currentUser.updateProfile({displayName:name});
        await db.collection('users').doc(currentUser.uid).update(updates);
      }
      if(profile)Object.assign(profile,updates);
      toast({i:'✅',t:'Profiel opgeslagen!'});
      go('profile');
    } catch(e) {
      toast({i:'❌',t:'Save mislukt'});
      if(btn){btn.textContent='Save ✓';btn.disabled=false;}
    }
  });

  // Tasbih
  on($('tbBtn'), 'click', tapTB);
  on($('tbTap'), 'click', tapTB);
  on($('tbRst'), 'click', () => { if(confirm('Teller resetten?')){TB.count=0;svt();render();} });
  all('[data-dk]', 'click', e => { TB.dhikr=e.currentTarget.dataset.dk;TB.count=0;svt();render(); });

  // Locatie
  on($('glBtn'), 'click', getLoc);
  // Create group
  on($('createGroupBtn'), 'click', ()=>{
    const d = window._newGroup || {};
    const naam = (document.getElementById('gNaam')||{}).value?.trim() || d.naam || '';
    const desc = (document.getElementById('gDesc')||{}).value?.trim() || d.beschrijving || '';
    createGroup(naam, desc, d.icoon||'🕌', d.public!==false);
    window._newGroup = null;
  });
  on($('glBtn2'), 'click', getLoc);
  all('[data-method]','click',async e=>{
    PS.method=+e.currentTarget.dataset.method;
    PS.times={};PS.lastCalc='';svp();render();
    if(PS.loc){
      toast({i:'⏳',t:'Berekenen...'});
      const result=await fetchPrayerTimes(PS.loc.lat,PS.loc.lng,PS.country||'NL');
      if(result){PS.times=result.times;PS.lastCalc=new Date().toDateString();svp();render();toast({i:'✅',t:'Bijgewerkt!'});}
    }
  });
  // Vrienden zoeken
  const fsEl = document.getElementById('friendSearch');
  if(fsEl){
    let stimer;
    fsEl.addEventListener('input',e=>{
      clearTimeout(stimer);
      stimer=setTimeout(()=>searchUsers(e.target.value),400);
    });
  }
  on($('glBtn2'), 'click', getLoc);

  // Quiz
  all('[data-opt]', 'click', e => { if(!e.currentTarget.disabled) ha2(e.currentTarget.dataset.opt); });
  on($('hntBtn'), 'click', () => { if(QS&&QS.hl>0&&!QS.sh){QS.sh=true;QS.hl--;render();stmr();} });
  on($('nxtBtn'), 'click', adv);
  on($('retryBtn'), 'click', () => { if(QS)sq(QS.catId,QS.lvId); });
  on($('ytBtn'), 'click', () => { if(QS?.lv?.yt)window.open(QS.lv.yt,'_blank'); });

  // Admin
  on($('ncBtn'), 'click', () => go('admin-cat', {dr:{nm:'',ico:'🕌',cl:'#2563EB',ds:'',pub:false}}));
  all('[data-ec]', 'click', e => go('admin-cat', {cid:e.currentTarget.dataset.ec}));
  on($('expBtn'), 'click', () => {
    const b=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='tolaanfur.json';a.click();
    toast({i:'📤',t:'Geëxporteerd'});
  });
  on($('impFile'), 'change', e => {
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!d.categories)throw new Error();DATA=d;ep();sva();toast({i:'📥',t:'Geïmporteerd'});go('admin');}catch{alert('Ongeldig bestand.');}};
    r.readAsText(f);
  });
  on($('rstBtn'), 'click', () => { if(confirm('Voortgang wissen?')){PROG={};ep();sv('tf6_p',PROG);toast({i:'✅',t:'Gewist'});render();} });

  // Admin cat
  all('[data-pi]', 'click', e => { CX.dr=CX.dr||{};CX.dr.ico=e.currentTarget.dataset.pi;render(); });
  all('[data-pc]', 'click', e => { CX.dr=CX.dr||{};CX.dr.cl=e.currentTarget.dataset.pc;render(); });
  all('[data-pu]', 'click', e => { CX.dr=CX.dr||{};CX.dr.pub=e.currentTarget.dataset.pu==='true';render(); });
  on($('svCat'), 'click', () => {
    const nm=($('cnm')||{}).value?.trim();if(!nm){alert('Vul naam in.');return;}
    const d={nm,ico:CX.dr?.ico||'🕌',cl:CX.dr?.cl||'#2563EB',ds:($('cds')||{}).value?.trim()||'',pub:CX.dr?.pub||false};
    if(!DATA.categories)DATA.categories=[];
    if(CX.cid){const c=DATA.categories.find(c=>c.id===CX.cid);if(c)Object.assign(c,d);}
    else{const id='c'+Date.now();DATA.categories.push({id,...d,levels:[]});PROG[id]={ul:[],cp:{},bs:{}};CX.cid=id;}
    sva();toast({i:'✅',t:d.pub?'Gepubliceerd!':'Concept opgeslagen',s:nm});go('admin-cat',{cid:CX.cid});
  });
  on($('dlCat'), 'click', () => {
    const c=DATA.categories.find(c=>c.id===CX.cid);
    if(c&&confirm(`"${c.nm}" verwijderen?`)){DATA.categories=DATA.categories.filter(x=>x.id!==CX.cid);delete PROG[CX.cid];sva();go('admin');}
  });
  on($('nlBtn'), 'click', () => {
    const c=DATA.categories.find(c=>c.id===CX.cid);if(!c||(c.levels||[]).length>=10)return;
    go('admin-lvl',{cid:CX.cid,dr:{ttl:'',ps:70,tpq:20,hn:2,df:1,yt:'',pub:false}});
  });
  all('[data-el]', 'click', e => go('admin-lvl',{cid:CX.cid,lid:+e.currentTarget.dataset.el}));
  all('[data-dl]', 'click', e => {
    const lid=+e.currentTarget.dataset.dl,c=DATA.categories.find(c=>c.id===CX.cid);
    if(c&&confirm('Level verwijderen?')){c.levels=(c.levels||[]).filter(l=>l.id!==lid);sva();render();}
  });
  all('[data-df]', 'click', e => { CX.dr=CX.dr||{};CX.dr.df=+e.currentTarget.dataset.df;render(); });
  on($('svLvl'), 'click', () => {
    const ttl=($('lttl')||{}).value?.trim();if(!ttl){alert('Vul naam in.');return;}
    const c=DATA.categories.find(c=>c.id===CX.cid);if(!c)return;
    if(!c.levels)c.levels=[];
    const d={ttl,ps:Math.max(10,Math.min(100,+($('lps')||{}).value||70)),tpq:Math.max(5,Math.min(120,+($('ltpq')||{}).value||20)),hn:Math.max(0,+($('lhn')||{}).value||2),df:CX.dr?.df||1,yt:($('lyt')||{}).value?.trim()||'',pub:CX.dr?.pub||false};
    if(CX.lid){const l=c.levels.find(l=>l.id===CX.lid);if(l)Object.assign(l,d);}
    else{const ni=c.levels.length>0?Math.max(...c.levels.map(l=>l.id))+1:1;const pg=PROG[CX.cid]||(PROG[CX.cid]={ul:[],cp:{},bs:{}});if(ni===1)pg.ul=[1];c.levels.push({id:ni,...d,qs:[]});CX.lid=ni;}
    sva();toast({i:'✅',t:d.pub?'Gepubliceerd!':'Concept opgeslagen',s:ttl});go('admin-lvl',{cid:CX.cid,lid:CX.lid});
  });
  on($('dlLvl'), 'click', () => {
    const c=DATA.categories.find(c=>c.id===CX.cid);
    if(c&&confirm('Level verwijderen?')){c.levels=(c.levels||[]).filter(l=>l.id!==CX.lid);sva();go('admin-cat',{cid:CX.cid});}
  });
  on($('aqBtn'), 'click', () => {
    const c=DATA.categories.find(c=>c.id===CX.cid),l=c&&(c.levels||[]).find(l=>l.id===CX.lid);
    if(l&&(l.qs||[]).length>=10){alert('Max 10 vragen.');return;}
    go('admin-addq',{cid:CX.cid,lid:CX.lid,dr:{txt:'',opts:['','','',''],ans:'',ht:'',ex2:''}});
  });
  all('[data-eq]', 'click', e => { const i=+e.currentTarget.dataset.eq;go('admin-editq',{cid:CX.cid,lid:CX.lid,qi:i}); });
  all('[data-dq]', 'click', e => {
    const i=+e.currentTarget.dataset.dq,c=DATA.categories.find(c=>c.id===CX.cid),l=c&&(c.levels||[]).find(l=>l.id===CX.lid);
    if(l&&confirm('Vraag verwijderen?')){l.qs.splice(i,1);sva();render();}
  });
  const qtxt = $('qtxt');
  if(qtxt){
    qtxt.addEventListener('input',e=>{CX.dr=CX.dr||{};CX.dr.txt=e.target.value;});
    all('[data-opt]','input',e=>{
      CX.dr=CX.dr||{};CX.dr.opts=CX.dr.opts||['','','',''];
      CX.dr.opts[+e.currentTarget.dataset.opt]=e.currentTarget.value;
      const sl=$('qans');if(sl){const cv=sl.value;const op=(CX.dr.opts||[]).filter(o=>o.trim());
        sl.innerHTML='<option value="">— Selecteer —</option>'+op.map((o,i)=>`<option value="${esc(o)}"${o===cv?' selected':''}>${'ABCD'[i]}. ${esc(o)}</option>`).join('');}
    });
    on($('qans'),'change',e=>{CX.dr=CX.dr||{};CX.dr.ans=e.target.value;});
    on($('qht'),'input',e=>{CX.dr=CX.dr||{};CX.dr.ht=e.target.value;});
    on($('qex'),'input',e=>{CX.dr=CX.dr||{};CX.dr.ex2=e.target.value;});
    on($('svQ'),'click',()=>{
      const txt=($('qtxt')||{}).value?.trim(),ans=($('qans')||{}).value?.trim();
      const opts=(CX.dr?.opts||[]).map(o=>o.trim()).filter(Boolean);
      const ht=($('qht')||{}).value?.trim()||'',ex=($('qex')||{}).value?.trim()||'';
      if(!txt){alert('Vul vraag in.');return;}if(opts.length<2){alert('Min. 2 opties.');return;}
      if(!ans||!opts.includes(ans)){alert('Selecteer correct antwoord.');return;}
      const c=DATA.categories.find(c=>c.id===CX.cid),l=c&&(c.levels||[]).find(l=>l.id===CX.lid);
      if(!l)return;if(SC==='admin-addq'&&(l.qs||[]).length>=10){alert('Max 10.');return;}
      if(!l.qs)l.qs=[];
      const q={id:'q'+Date.now(),txt,opts,ans,ht,ex};
      if(SC==='admin-editq'&&CX.qi!==undefined)l.qs[CX.qi]=q;else l.qs.push(q);
      const pg=PROG[CX.cid]||(PROG[CX.cid]={ul:[],cp:{},bs:{}});
      const pl2=(c.levels||[]).filter(l=>l.pub&&l.qs&&l.qs.length>0);
      if(pl2.length>0&&!(pg.ul||[]).includes(pl2[0].id))pg.ul=[pl2[0].id,...(pg.ul||[])];
      sva();toast({i:'✅',t:'Vraag opgeslagen!'});go('admin-q',{cid:CX.cid,lid:CX.lid});
    });
  }
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ha(hex,a){try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}catch{return hex;}}
function toast(t){
  const w=document.getElementById('toasts');if(!w)return;
  const el=document.createElement('div');el.className='ts';
  el.innerHTML=`<div class="tsi">${t.i}</div><div><div class="tst3">${t.t}</div>${t.s?`<div class="tss">${t.s}</div>`:''}</div>`;
  w.appendChild(el);setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),350);},3200);
}

function g9Get(){return JSON.parse(localStorage.getItem('tf_g9')||JSON.stringify({xp:0,lvl:1,streak:0,last:'',days:0,badges:[]}));}
function g9Save(d){localStorage.setItem('tf_g9',JSON.stringify(d));}

function g9XP(amt,reason){
  const d=g9Get();d.xp+=amt;
  const newLvl=Math.floor(d.xp/100)+1;
  if(newLvl>d.lvl){d.lvl=newLvl;g9ShowLevelUp(newLvl);}
  g9Save(d);g9Toast('+'+amt+' XP — '+reason,'#6B3FFF');
}

function g9Badge(id){
  const d=g9Get();if(d.badges.includes(id))return;
  const b=G9_BADGES.find(x=>x.id===id);if(!b)return;
  d.badges.push(id);d.xp+=b.xp;g9Save(d);
  g9Toast(b.icon+' Badge: '+b.name+' (+'+b.xp+' XP)','#C9982A');
}

function g9Streak(){
  const d=g9Get();
  const today=new Date().toDateString();
  if(d.last===today)return;
  const yest=new Date(Date.now()-86400000).toDateString();
  d.streak=d.last===yest?d.streak+1:1;
  d.last=today;d.days++;g9Save(d);
  if(d.streak>=3)g9Badge('streak_3');
  if(d.streak>=7)g9Badge('streak_7');
  if(d.streak>=30)g9Badge('streak_30');
  if(new Date().getDay()===5){g9XP(25,'Friday bonus 🌙');g9Badge('friday_bonus');}
  g9Badge('first_login');
}

function g9Toast(msg,clr){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:'+clr+';color:#fff;padding:.45rem 1.1rem;border-radius:2rem;font-size:.78rem;font-weight:700;z-index:9999;white-space:nowrap;pointer-events:none;box-shadow:0 4px 15px rgba(0,0,0,.3)';
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>t.style.opacity='0',2000);setTimeout(()=>t.remove(),2500);
}

function g9ShowLevelUp(lvl){
  const el=document.createElement('div');
  el.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,#1C0F00,#3B1F00);border:2px solid #C9982A;border-radius:1.5rem;padding:1.5rem 2rem;text-align:center;z-index:9999;box-shadow:0 0 60px rgba(201,152,42,.5)';
  el.innerHTML='<div style="font-size:2.5rem">🏆</div><div style="font-size:1.3rem;color:#E8C97A;font-weight:700;margin:.3rem 0">Level Up!</div><div style="color:rgba(255,255,255,.6);font-size:.85rem">You reached Level '+lvl+'</div>';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

// Hijri datum berekening
function gregorianToHijri(date) {
  const d = date.getDate();
  const m = date.getMonth() + 1;
  const y = date.getFullYear();

  let jd = Math.floor((1461 * (y + 4800 + Math.floor((m - 14) / 12))) / 4) +
    Math.floor((367 * (m - 2 - 12 * Math.floor((m - 14) / 12))) / 12) -
    Math.floor((3 * Math.floor((y + 4900 + Math.floor((m - 14) / 12)) / 100)) / 4) +
    d - 32075;

  const l = jd - 1948440 + 10632;
  const n = Math.floor((l - 1) / 10631);
  const l2 = l - 10631 * n + 354;
  const j = Math.floor((10985 - l2) / 5316) * Math.floor((50 * l2) / 17719) +
    Math.floor(l2 / 5670) * Math.floor((43 * l2) / 15238);
  const l3 = l2 - Math.floor((30 - j) / 15) * Math.floor((17719 * j) / 50) -
    Math.floor(j / 16) * Math.floor((15238 * j) / 43) + 29;
  const hMonth = Math.floor((24 * l3) / 709);
  const hDay = l3 - Math.floor((709 * hMonth) / 24);
  const hYear = 30 * n + j - 30;

  return { day: hDay, month: hMonth, year: hYear };
}

const HIJRI_MONTHS = [
  'Muharram', 'Safar', "Rabi' al-Awwal", "Rabi' al-Thani",
  "Jumada al-Awwal", "Jumada al-Thani", 'Rajab', "Sha'ban",
  'Ramadan', 'Shawwal', "Dhul Qi'dah", 'Dhul Hijjah'
];

const HIJRI_MONTHS_AR = [
  'مُحَرَّم', 'صَفَر', 'رَبِيعُ الأَوَّل', 'رَبِيعُ الثَّانِي',
  'جُمَادَى الأُولَى', 'جُمَادَى الثَّانِيَة', 'رَجَب', 'شَعْبَان',
  'رَمَضَان', 'شَوَّال', 'ذُو القَعْدَة', 'ذُو الحِجَّة'
];

const ISLAMIC_EVENTS = {
  '1-1':  'Islamic New Year 🌙',
  '10-1': 'Ashura 🤲',
  '12-3': "Mawlid an-Nabi ﷺ",
  '27-7': "Isra wal Mi'raj ✨",
  '15-8': "Laylat al-Bara'ah 🌟",
  '1-9':  'Ramadan begins 🌙',
  '27-9': "Laylat al-Qadr ✨",
  '1-10': 'Eid al-Fitr 🎉',
  '10-12': 'Eid al-Adha 🐑',
};

function getIslamicEvent(hDay, hMonth) {
  return ISLAMIC_EVENTS[hDay + '-' + hMonth] || null;
}

function getRamadanInfo() {
  const today = new Date();
  const hijri = gregorianToHijri(today);
  
  // Als we in Ramadan zijn (maand 9)
  if (hijri.month === 9) {
    const daysLeft = 30 - hijri.day;
    return { inRamadan: true, day: hijri.day, daysLeft };
  }
  
  // Bereken dagen tot Ramadan
  // Schat: Ramadan 2025 = 1 maart, 2026 = 18 feb (benadering)
  const ramadanDates = [
    new Date(2025, 2, 1),   // 1 maart 2025
    new Date(2026, 1, 18),  // 18 feb 2026
    new Date(2027, 1, 7),   // 7 feb 2027
  ];
  
  let nextRamadan = ramadanDates.find(d => d > today);
  if (!nextRamadan) nextRamadan = ramadanDates[ramadanDates.length - 1];
  
  const diff = Math.ceil((nextRamadan - today) / (1000 * 60 * 60 * 24));
  return { inRamadan: false, daysUntil: diff, nextDate: nextRamadan };
}

function renderIslamicCalendar(containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  
  const today = new Date();
  const hijri = gregorianToHijri(today);
  const monthName = HIJRI_MONTHS[hijri.month - 1] || '';
  const monthNameAr = HIJRI_MONTHS_AR[hijri.month - 1] || '';
  const event = getIslamicEvent(hijri.day, hijri.month);
  const ramadan = getRamadanInfo();
  
  let html = '<div style="width:100%;max-width:560px;margin-bottom:.6rem">';
  
  // Hijri datum card
  html += '<div class="sec" style="background:linear-gradient(135deg,rgba(107,63,255,.15),rgba(29,78,216,.1));border-color:rgba(107,63,255,.3)">';
  html += '<div style="display:flex;align-items:center;justify-content:space-between">';
  html += '<div>';
  html += '<div style="font-family:Amiri,serif;font-size:1.6rem;color:#E8C97A;line-height:1">' + hijri.day + ' ' + monthNameAr + '</div>';
  html += '<div style="font-size:.78rem;color:var(--sl2);margin-top:.2rem">' + hijri.day + ' ' + monthName + ' ' + hijri.year + ' AH</div>';
  html += '</div>';
  html += '<div style="text-align:right">';
  html += '<div style="font-size:2rem">🌙</div>';
  html += '<div style="font-size:.65rem;color:var(--sl2)">Hijri Date</div>';
  html += '</div>';
  html += '</div>';
  
  // Islamitische event vandaag?
  if (event) {
    html += '<div style="margin-top:.65rem;background:rgba(201,152,42,.12);border:1px solid rgba(201,152,42,.3);border-radius:.75rem;padding:.5rem .85rem;font-size:.82rem;color:#E8C97A">🌟 Today: ' + event + '</div>';
  }
  html += '</div>';
  
  // Ramadan teller
  html += '<div class="sec">';
  if (ramadan.inRamadan) {
    html += '<div class="sh"><div class="st">🌙 Ramadan</div></div>';
    html += '<div style="text-align:center;padding:.5rem 0">';
    html += '<div style="font-family:Fredoka One,cursive;font-size:2.5rem;color:#A78BFA">Day ' + ramadan.day + '</div>';
    html += '<div style="font-size:.82rem;color:var(--sl2);margin-top:.2rem">' + ramadan.daysLeft + ' days remaining</div>';
    html += '<div style="font-family:Amiri,serif;font-size:1.1rem;color:#E8C97A;margin-top:.5rem">رَمَضَان مُبَارَك</div>';
    html += '</div>';
  } else {
    html += '<div class="sh"><div class="st">🌙 Ramadan Countdown</div></div>';
    html += '<div style="text-align:center;padding:.5rem 0">';
    html += '<div style="font-family:Fredoka One,cursive;font-size:2.8rem;color:#A78BFA">' + ramadan.daysUntil + '</div>';
    html += '<div style="font-size:.82rem;color:var(--sl2)">days until Ramadan</div>';
    if (ramadan.nextDate) {
      html += '<div style="font-size:.72rem;color:var(--sl2);margin-top:.3rem">Expected: ' + ramadan.nextDate.toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}) + '</div>';
    }
    html += '</div>';
  }
  html += '</div>';
  
  html += '</div>';
  el.innerHTML = html;
}
