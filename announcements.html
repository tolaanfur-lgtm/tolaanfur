<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Announcements — Tolaanfur</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#060818;--text:#EEF2FF;--muted:rgba(238,242,255,.45);--border:rgba(100,140,255,.18);--card:rgba(20,30,100,.4);--gold:#F59E0B}
body{background:var(--bg);color:var(--text);font-family:Inter,sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.nav{background:rgba(6,8,24,.98);border-bottom:1px solid var(--border);padding:max(env(safe-area-inset-top),.75rem) 1rem .65rem;display:flex;align-items:center;gap:.65rem;flex-shrink:0}
.back{width:2.2rem;height:2.2rem;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.ttl{font-family:'Fredoka One',cursive;font-size:1rem}
.sub{font-size:.62rem;color:var(--muted)}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 1rem 2rem}
.btn{border:none;border-radius:.75rem;padding:.65rem 1rem;font-family:'Fredoka One',cursive;font-size:.85rem;cursor:pointer}
.btn:active{opacity:.8}
.btn:disabled{opacity:.5}
.bg2{background:linear-gradient(135deg,#B45309,var(--gold));color:#1a0a00}

/* Composer (alleen beheerder) */
.composer{background:var(--card);border:1px solid var(--border);border-radius:1.1rem;padding:.9rem;margin:.85rem 0}
.composer input,.composer textarea{width:100%;background:rgba(255,255,255,.06);border:1.5px solid var(--border);border-radius:.75rem;padding:.65rem .9rem;font-size:.9rem;color:var(--text);font-family:Inter,sans-serif;outline:none}
.composer input:focus,.composer textarea:focus{border-color:var(--gold)}
.composer textarea{resize:none;height:6rem;line-height:1.5;margin-top:.55rem}
.char-count{font-size:.65rem;color:var(--muted);text-align:right;margin:.25rem 0 .5rem}

/* Aankondiging-kaart */
.ann{background:linear-gradient(160deg,rgba(245,158,11,.12),var(--card));border:1px solid rgba(245,158,11,.3);border-radius:1.1rem;padding:1rem;margin-bottom:.75rem}
.a-top{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem}
.a-badge{font-size:1.1rem}
.a-titel{font-family:'Fredoka One',cursive;font-size:.95rem;color:#FBBF24;flex:1}
.a-tekst{font-size:.88rem;line-height:1.6;word-break:break-word;white-space:pre-wrap}
.a-footer{display:flex;align-items:center;justify-content:space-between;margin-top:.6rem}
.a-tijd{font-size:.62rem;color:var(--muted)}
.a-del{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.25);border-radius:.6rem;color:#F43F5E;font-size:.7rem;padding:.3rem .6rem;cursor:pointer}

.leeg{text-align:center;padding:3rem 1rem;color:var(--muted)}
#toast{position:fixed;bottom:2.5rem;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff;padding:.45rem 1.1rem;border-radius:2rem;font-size:.82rem;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
</style>
</head>
<body>

<div class="nav">
  <div class="back" onclick="terug()">←</div>
  <div style="flex:1">
    <div class="ttl">📢 Announcements</div>
    <div class="sub">Official updates from the Tolaanfur team</div>
  </div>
</div>

<div class="scroll">
  <div id="composerWrap"></div>
  <div id="feed"><div class="leeg">Loading...</div></div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
var CFG={
  apiKey:'AIzaSyD4o7SprtOMn7F4iFjVmPB37C1Tf7mICDk',
  authDomain:'tolaanfur-5b5f5.firebaseapp.com',
  projectId:'tolaanfur-5b5f5',
  storageBucket:'tolaanfur-5b5f5.firebasestorage.app',
  messagingSenderId:'188890145767',
  appId:'1:188890145767:web:6ec8fe6fae4ddd90891342'
};

var fbApp = firebase.apps.length > 0 ? firebase.apps[0] : firebase.initializeApp(CFG);
var db = fbApp.firestore();
var auth = fbApp.auth();

var me = null;
var myP = null;
var items = [];

var MAX_TITEL = 80;
var MAX_TEKST = 2000;

// Beveiliging: alle gebruikersinvoer escapen voordat het in innerHTML gaat (XSS)
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function terug(){
  try{
    if(window.parent&&window.parent!==window){
      window.parent.postMessage({type:'navigate',screen:'media'},'*');
    }
  }catch(e){}
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(window._tt);window._tt=setTimeout(function(){t.classList.remove('show');},2500);
}

function getTs(v){
  if(v&&v.ts&&v.ts.seconds) return v.ts.seconds*1000;
  if(v&&typeof v.ts==='number') return v.ts;
  return 0;
}

function tijd(ms){
  var diff=Date.now()-ms;
  var min=Math.floor(diff/60000), uur=Math.floor(diff/3600000), dag=Math.floor(diff/86400000);
  if(min<1) return 'Just now';
  if(min<60) return min+'m ago';
  if(uur<24) return uur+'h ago';
  if(dag<7) return dag+'d ago';
  return new Date(ms).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

// ══ COMPOSER (alleen zichtbaar voor de beheerder) ══
function renderComposer(){
  var w=document.getElementById('composerWrap');
  if(!(me&&myP&&myP.isAdmin===true)){
    w.innerHTML='';
    return;
  }
  w.innerHTML='<div class="composer">'
    +'<input type="text" id="aTitel" maxlength="'+MAX_TITEL+'" placeholder="Title..."/>'
    +'<textarea id="aTekst" maxlength="'+MAX_TEKST+'" placeholder="Write the announcement..."></textarea>'
    +'<div class="char-count" id="charCount">0 / '+MAX_TEKST+'</div>'
    +'<button class="btn bg2" id="plaatsBtn" style="width:100%">📢 Publish announcement</button>'
    +'</div>';
  var ta=document.getElementById('aTekst');
  ta.addEventListener('input',function(){
    document.getElementById('charCount').textContent=ta.value.length+' / '+MAX_TEKST;
  });
  document.getElementById('plaatsBtn').addEventListener('click',plaats);
}

function plaats(){
  if(!(me&&myP&&myP.isAdmin===true)){showToast('🔒 Admin only');return;}
  var titel=(document.getElementById('aTitel').value||'').trim().substring(0,MAX_TITEL);
  var tekst=(document.getElementById('aTekst').value||'').trim();
  if(!tekst){showToast('⚠️ Write something first');return;}
  if(tekst.length>MAX_TEKST){showToast('⚠️ Maximum '+MAX_TEKST+' characters');return;}
  var btn=document.getElementById('plaatsBtn');
  btn.disabled=true;
  db.collection('announcements').add({
    uid:me.uid,
    displayName:(myP&&(myP.displayName||myP.username))||'Tolaanfur',
    title:titel,
    text:tekst,
    ts:firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){
    document.getElementById('aTitel').value='';
    document.getElementById('aTekst').value='';
    document.getElementById('charCount').textContent='0 / '+MAX_TEKST;
    btn.disabled=false;
    showToast('✅ Published!');
  }).catch(function(err){
    btn.disabled=false;
    showToast('❌ Publishing failed');
    console.log('Announcement error:',err&&err.code);
  });
}

// ══ FEED ══
function renderFeed(){
  var f=document.getElementById('feed');
  if(!items.length){
    f.innerHTML='<div class="leeg"><img src="img/illus/leeg-news.jpg" alt="" style="width:150px;height:auto;border-radius:1rem;margin:0 auto .6rem;display:block;opacity:.95"/><div style="font-family:Fredoka One,cursive;font-size:1rem;color:var(--text);margin-top:.5rem">No announcements yet</div></div>';
    return;
  }
  var mijnAdmin=me&&myP&&myP.isAdmin===true;
  var html='';
  items.forEach(function(v){
    html+='<div class="ann">';
    html+='<div class="a-top"><div class="a-badge">📢</div>';
    html+='<div class="a-titel">'+(v.title?esc(v.title):'Announcement')+'</div></div>';
    html+='<div class="a-tekst">'+esc(v.text||'')+'</div>';
    html+='<div class="a-footer">';
    html+='<div class="a-tijd">'+esc(v.displayName||'Tolaanfur')+' · '+tijd(getTs(v))+'</div>';
    if(mijnAdmin) html+='<button class="a-del" data-del="'+esc(v.id)+'">🗑 Delete</button>';
    html+='</div></div>';
  });
  f.innerHTML=html;
  f.querySelectorAll('[data-del]').forEach(function(b){
    b.addEventListener('click',function(){
      if(confirm('Delete this announcement?')) verwijder(b.getAttribute('data-del'));
    });
  });
}

function verwijder(id){
  db.collection('announcements').doc(id).delete()
    .then(function(){showToast('🗑 Deleted');})
    .catch(function(){showToast('❌ Delete failed');});
}

// ══ DATA ══
var feedUnsub=null;
function luisterFeed(){
  if(feedUnsub){try{feedUnsub();}catch(e){}feedUnsub=null;}
  feedUnsub=db.collection('announcements')
    .orderBy('ts','desc')
    .limit(50)
    .onSnapshot(function(snap){
      items=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
      renderFeed();
    },function(err){
      document.getElementById('feed').innerHTML='<div class="leeg">❌ Could not load announcements</div>';
      console.log('Feed error:',err&&err.code);
    });
}

auth.onAuthStateChanged(function(user){
  me=user;
  if(user&&!user.isAnonymous){
    db.collection('users').doc(user.uid).get().then(function(doc){
      if(doc.exists)myP=doc.data();
      renderComposer();
      renderFeed();
    }).catch(function(){renderComposer();});
  } else {
    renderComposer();
  }
  luisterFeed();
});
</script>
</body>
</html>
