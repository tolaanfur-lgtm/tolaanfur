<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Posts — Tolaanfur</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#060818;--text:#EEF2FF;--muted:rgba(238,242,255,.45);--border:rgba(100,140,255,.18);--card:rgba(20,30,100,.4)}
body{background:var(--bg);color:var(--text);font-family:Inter,sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.nav{background:rgba(6,8,24,.98);border-bottom:1px solid var(--border);padding:max(env(safe-area-inset-top),.75rem) 1rem .65rem;display:flex;align-items:center;gap:.65rem;flex-shrink:0}
.back{width:2.2rem;height:2.2rem;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.ttl{font-family:'Fredoka One',cursive;font-size:1rem}
.sub{font-size:.62rem;color:var(--muted)}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 1rem 2rem}
.btn{border:none;border-radius:.75rem;padding:.65rem 1rem;font-family:'Fredoka One',cursive;font-size:.85rem;cursor:pointer}
.btn:active{opacity:.8}
.bp{background:linear-gradient(135deg,#6B3FFF,#9B6FFF);color:#fff}

/* Composer */
.composer{background:var(--card);border:1px solid var(--border);border-radius:1.1rem;padding:.9rem;margin:.85rem 0}
.composer textarea{width:100%;background:rgba(255,255,255,.06);border:1.5px solid var(--border);border-radius:.75rem;padding:.7rem .9rem;font-size:.9rem;color:var(--text);font-family:Inter,sans-serif;outline:none;resize:none;height:7.5rem;line-height:1.5}
.composer textarea:focus{border-color:#6B3FFF}
.kleuren{display:flex;gap:.5rem;margin:.65rem 0}
.kleur{width:2.1rem;height:2.1rem;border-radius:.5rem;cursor:pointer;border:2.5px solid transparent}
.kleur.on{border-color:#fff}
.char-count{font-size:.65rem;color:var(--muted);text-align:right;margin-top:.25rem}

/* Verhaal-kaart */
.verhaal{border-radius:1.1rem;padding:1rem;margin-bottom:.75rem;border:1px solid rgba(255,255,255,.12);position:relative;overflow:hidden}
.v-top{display:flex;align-items:center;gap:.6rem;margin-bottom:.6rem}
.v-av{width:2.2rem;height:2.2rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0;background:rgba(0,0,0,.25);border:1.5px solid rgba(255,255,255,.35);color:#fff}
.v-naam{font-weight:700;font-size:.85rem;color:#fff}
.v-tijd{font-size:.62rem;color:rgba(255,255,255,.6)}
.v-tekst{font-size:1rem;line-height:1.6;color:#fff;word-break:break-word;white-space:pre-wrap;font-weight:600}
.v-footer{display:flex;align-items:center;justify-content:space-between;margin-top:.65rem}
.v-verloopt{font-size:.62rem;color:rgba(255,255,255,.55)}
.v-meer{background:none;border:none;color:rgba(255,255,255,.75);font-size:.78rem;font-weight:700;cursor:pointer;padding:.35rem 0;text-decoration:underline}
.v-del{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.25);border-radius:.6rem;color:#fff;font-size:.7rem;padding:.3rem .6rem;cursor:pointer}
.v-follow{background:rgba(0,0,0,.3);border:1.5px solid rgba(255,255,255,.5);border-radius:2rem;color:#fff;font-size:.68rem;font-weight:700;padding:.28rem .7rem;cursor:pointer;flex-shrink:0}
.v-follow.aan{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.75)}

.meld-box{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.6);display:none;align-items:flex-end;justify-content:center}
.meld-box.open{display:flex}
.meld-paneel{width:100%;max-width:520px;background:#0D1240;border:1px solid var(--border);border-radius:1.2rem 1.2rem 0 0;padding:1rem 1rem max(env(safe-area-inset-bottom),1rem);animation:omhoog .2s ease-out}
@keyframes omhoog{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}
.meld-titel{font-family:'Fredoka One',cursive;font-size:.95rem;text-align:center}
.meld-sub{font-size:.72rem;color:var(--muted);text-align:center;margin:.2rem 0 .8rem}
.meld-knop{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:.75rem;color:var(--text);font-family:Inter,sans-serif;font-size:.85rem;font-weight:600;padding:.7rem;margin-bottom:.45rem;cursor:pointer;text-align:left}
.meld-knop:active{background:rgba(255,255,255,.12)}
.meld-knop.blok{color:#F43F5E;border-color:rgba(244,63,94,.3);background:rgba(244,63,94,.08);margin-top:.5rem}
.meld-annuleer{width:100%;background:none;border:none;color:var(--muted);font-family:Inter,sans-serif;font-size:.85rem;font-weight:700;padding:.7rem;cursor:pointer}
.m-menu{background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;padding:.1rem .35rem;line-height:1}
.leeg{text-align:center;padding:3rem 1rem;color:var(--muted)}
#toast{position:fixed;bottom:2.5rem;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff;padding:.45rem 1.1rem;border-radius:2rem;font-size:.82rem;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
</style>
</head>
<body>

<div class="nav">
  <div class="back" onclick="terug()">←</div>
  <div style="flex:1">
    <div class="ttl">📖 Posts</div>
    <div class="sub">Visible to everyone · stays until you delete it</div>
  </div>
</div>

<div class="scroll">
  <div id="composerWrap"></div>
  <div id="feed"><div class="leeg">Laden...</div></div>
</div>

<div class="meld-box" id="meldBox">
  <div class="meld-paneel">
    <div class="meld-titel" id="meldTitel">Report this post</div>
    <div class="meld-sub">Why are you reporting this?</div>
    <button class="meld-knop" onclick="meldAan('Spam or scam')">Spam or scam</button>
    <button class="meld-knop" onclick="meldAan('Inappropriate content')">Inappropriate content</button>
    <button class="meld-knop" onclick="meldAan('Harassment or bullying')">Harassment or bullying</button>
    <button class="meld-knop" onclick="meldAan('False information')">False information</button>
    <button class="meld-knop" onclick="meldAan('Other')">Something else</button>
    <button class="meld-knop blok" onclick="blokkeerNu()">🚫 Block this user</button>
    <button class="meld-annuleer" onclick="sluitMeld()">Cancel</button>
  </div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
var CFG={
  apiKey:'AIzaSyD4o7SprtOMn7F4iFjVmPB37C1Tf7mICDk',
  authDomain:'tolaanfur-5b5f5.firebaseapp.com',
  projectId:'tolaanfur-5b5f5',
  storageBucket:'tolaanfur-5b5f5.firebasestorage.app',
  messagingSenderId:'188890145767',
  appId:'1:188890145767:web:6ec8fe6fae4ddd90891342'
};

var fbApp = firebase.apps.length > 0 ? firebase.apps[0] : firebase.initializeApp(CFG);
var db = fbApp.firestore();
var auth = fbApp.auth();

var me = null;
var myP = null;
var verhalen = [];
var FEED_LIMIET = 100;
var uitgeklapt = {};   // {postId: true} — welke lange posts opengeklapt zijn
var gekozenKleur = 0;
var mijnFollows = {};   // {uid: true} — wie ik volg

var MAX_TEKST = 6000;   // ± twee A4-pagina's

var KLEUREN = ['#1E3A8A','#4C1D95','#065F46','#7C2D12','#831843','#0E7490'];

// Beveiliging: alle gebruikersinvoer escapen voordat het in innerHTML gaat (XSS)
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function terug(){
  // Terug naar het Media-scherm in de hoofdapp
  try{
    if(window.parent&&window.parent!==window){
      window.parent.postMessage({type:'navigate',screen:'media'},'*');
    }
  }catch(e){}
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(window._tt);window._tt=setTimeout(function(){t.classList.remove('show');},2500);
}

function getTs(v){
  if(v&&v.ts&&v.ts.seconds) return v.ts.seconds*1000;
  if(v&&typeof v.ts==='number') return v.ts;
  return 0;
}

function tijdGeleden(ms){
  var diff=Date.now()-ms;
  var min=Math.floor(diff/60000), uur=Math.floor(diff/3600000), dag=Math.floor(diff/86400000);
  if(min<1) return 'Just now';
  if(min<60) return min+'m ago';
  if(uur<24) return uur+'h ago';
  if(dag<7) return dag+'d ago';
  return new Date(ms).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

// ══ COMPOSER ══
function renderComposer(){
  var w=document.getElementById('composerWrap');
  if(!me||me.isAnonymous){
    w.innerHTML='<div class="composer" style="text-align:center;color:var(--muted);font-size:.85rem">🔒 Log in to share a post</div>';
    return;
  }
  var chips='';
  KLEUREN.forEach(function(c,i){
    chips+='<div class="kleur'+(i===gekozenKleur?' on':'')+'" data-kleur="'+i+'" style="background:'+c+'"></div>';
  });
  w.innerHTML='<div class="composer">'
    +'<textarea id="vTekst" maxlength="'+MAX_TEKST+'" placeholder="Share a thought, memory or quote..."></textarea>'
    +'<div class="char-count" id="charCount">0 / '+MAX_TEKST+'</div>'
    +'<div class="kleuren">'+chips+'</div>'
    +'<button class="btn bp" id="plaatsBtn" style="width:100%">✨ Post</button>'
    +'</div>';

  var ta=document.getElementById('vTekst');
  ta.addEventListener('input',function(){
    document.getElementById('charCount').textContent=ta.value.length+' / '+MAX_TEKST;
  });
  w.querySelectorAll('[data-kleur]').forEach(function(el){
    el.addEventListener('click',function(){
      gekozenKleur=parseInt(el.getAttribute('data-kleur'),10)||0;
      w.querySelectorAll('.kleur').forEach(function(k){k.classList.remove('on');});
      el.classList.add('on');
    });
  });
  document.getElementById('plaatsBtn').addEventListener('click',plaatsVerhaal);
}

function plaatsVerhaal(){
  if(!me||me.isAnonymous){showToast('🔒 Login required');return;}
  var ta=document.getElementById('vTekst');
  var tekst=(ta.value||'').trim();
  if(!tekst){showToast('⚠️ Write something first');return;}
  if(tekst.length>MAX_TEKST){showToast('⚠️ Maximum '+MAX_TEKST+' characters');return;}
  var btn=document.getElementById('plaatsBtn');
  btn.disabled=true;
  db.collection('verhalen').add({
    uid:me.uid,
    displayName:(myP&&(myP.displayName||myP.username))||(me.email||'').split('@')[0]||'User',
    avatarColor:(myP&&myP.avatarColor)||0,
    text:tekst,
    bg:gekozenKleur,
    ts:firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){
    ta.value='';
    document.getElementById('charCount').textContent='0 / '+MAX_TEKST;
    btn.disabled=false;
    showToast('✅ Posted!');
  }).catch(function(err){
    btn.disabled=false;
    showToast('❌ Posting failed');
    console.log('Verhaal error:',err&&err.code);
  });
}

// ══ FEED ══
function renderFeed(){
  var f=document.getElementById('feed');
  var actief=verhalen.filter(function(v){return !geblokkeerd[v.uid];});
  if(!actief.length){
    f.innerHTML='<div class="leeg"><img src="img/illus/leeg-posts.jpg" alt="" style="width:150px;height:auto;border-radius:1rem;margin:0 auto .6rem;display:block;opacity:.95"/><div style="font-family:Fredoka One,cursive;font-size:1rem;color:var(--text);margin-top:.5rem">No posts yet</div><div style="font-size:.8rem;margin-top:.25rem">Be the first to share something!</div></div>';
    return;
  }
  var html='';
  actief.forEach(function(v){
    var bg=KLEUREN[v.bg||0]||KLEUREN[0];
    var ini=(v.displayName||'U').substring(0,2).toUpperCase();
    var eigen=me&&v.uid===me.uid;
    html+='<div class="verhaal" style="background:linear-gradient(160deg,'+bg+',rgba(6,8,24,.55)),'+bg+'">';
    html+='<div class="v-top">';
    html+='<div class="v-av">'+esc(ini)+'</div>';
    html+='<div style="flex:1"><div class="v-naam" data-profiel="'+esc(v.uid||'')+'" style="cursor:pointer">'+esc(v.displayName||'User')+'</div>';
    html+='<div class="v-tijd">'+tijdGeleden(getTs(v))+'</div></div>';
    if(me&&!me.isAnonymous&&!eigen){
      var volgIk=!!mijnFollows[v.uid];
      html+='<button class="v-follow'+(volgIk?' aan':'')+'" data-volg="'+esc(v.uid)+'">'+(volgIk?'✓ Following':'+ Follow')+'</button>';
    }
    html+='</div>';
    var tekst=v.text||'';
    if(tekst.length>420&&!uitgeklapt[v.id]){
      html+='<div class="v-tekst">'+esc(tekst.substring(0,400))+'…</div>';
      html+='<button class="v-meer" data-meer="'+esc(v.id)+'">Read more ▾</button>';
    } else {
      html+='<div class="v-tekst">'+esc(tekst)+'</div>';
      if(tekst.length>420) html+='<button class="v-meer" data-meer="'+esc(v.id)+'">Show less ▴</button>';
    }
    html+='<div class="v-footer">';
    html+='<div></div>';
    if(eigen) html+='<button class="v-del" data-del="'+esc(v.id)+'">🗑 Delete</button>';
    if(!eigen) html+='<button class="m-menu" data-menu="'+esc(v.id)+'|'+esc(v.uid||'')+'|'+esc(v.displayName||'')+'">⋯</button>';
    html+='</div></div>';
  });
  if(verhalen.length>=FEED_LIMIET){
    html+='<button data-meerladen="1" style="width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:.85rem;color:var(--muted);font-family:Inter,sans-serif;font-size:.82rem;font-weight:600;padding:.7rem;cursor:pointer;margin-bottom:1rem">⬇ Load more</button>';
  }
  f.innerHTML=html;
  f.querySelectorAll('[data-meerladen]').forEach(function(b){
    b.addEventListener('click',function(){FEED_LIMIET+=100;luisterFeed();});
  });
  f.querySelectorAll('[data-meer]').forEach(function(b){
    b.addEventListener('click',function(){
      var id=b.getAttribute('data-meer');
      uitgeklapt[id]=!uitgeklapt[id];
      renderFeed();
    });
  });
  f.querySelectorAll('[data-menu]').forEach(function(b){
    b.addEventListener('click',function(){
      var d=b.getAttribute('data-menu').split('|');
      openMenu(d[0],d[1],d[2]);
    });
  });
  f.querySelectorAll('[data-profiel]').forEach(function(b){
    b.addEventListener('click',function(){openProfiel(b.getAttribute('data-profiel'));});
  });
  f.querySelectorAll('[data-del]').forEach(function(b){
    b.addEventListener('click',function(){
      if(confirm('Delete this post?')) verwijderVerhaal(b.getAttribute('data-del'));
    });
  });
  f.querySelectorAll('[data-volg]').forEach(function(b){
    b.addEventListener('click',function(){toggleFollow(b.getAttribute('data-volg'));});
  });
}

function verwijderVerhaal(id){
  db.collection('verhalen').doc(id).delete()
    .then(function(){showToast('🗑 Deleted');})
    .catch(function(){showToast('❌ Delete failed');});
}

// ══ FOLLOW ══
function toggleFollow(uid){
  if(!me||me.isAnonymous){showToast('🔒 Login required');return;}
  if(!uid||uid===me.uid)return;
  var ref=db.collection('follows').doc(me.uid+'_'+uid);
  if(mijnFollows[uid]){
    ref.delete().then(function(){showToast('Unfollowed');})
      .catch(function(){showToast('❌ Failed');});
  } else {
    ref.set({from:me.uid,to:uid,ts:firebase.firestore.FieldValue.serverTimestamp()})
      .then(function(){
        showToast('✓ Following');
        stuurMelding(uid,'follow',mijnNaam()+' started following you');
      })
      .catch(function(){showToast('❌ Failed');});
  }
}

var followsUnsub=null;
function luisterFollows(){
  if(followsUnsub){try{followsUnsub();}catch(e){}followsUnsub=null;}
  if(!me||me.isAnonymous){mijnFollows={};return;}
  followsUnsub=db.collection('follows')
    .where('from','==',me.uid)
    .onSnapshot(function(snap){
      mijnFollows={};
      snap.docs.forEach(function(d){var f=d.data();if(f.to)mijnFollows[f.to]=true;});
      renderFeed();
    },function(){});
}

// ══ PROFIEL OPENEN ══
function openProfiel(uid){
  if(!uid)return;
  try{
    if(window.parent&&window.parent!==window){
      window.parent.postMessage({type:'navigate',screen:'userprofile',param:uid},'*');
    }
  }catch(e){}
}

// ══ MELDINGEN ══
function mijnNaam(){return (myP&&(myP.displayName||myP.username))||'Someone';}
function stuurMelding(toUid,type,message){
  if(!me||toUid===me.uid)return;
  db.collection('notifications').add({
    to:toUid, fromUid:me.uid, fromName:mijnNaam(),
    type:type, message:message, read:false,
    ts:Date.now(),
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  }).catch(function(){});
}


// ══ BLOKKEREN & MELDEN ══
var geblokkeerd = {};        // {uid:true} — gebruikers die ik geblokkeerd heb
var blockUnsub = null;
var meldDoel = null;         // waarover het meldpaneel gaat

function luisterBlocks(){
  if(!me||me.isAnonymous) return;
  if(blockUnsub){try{blockUnsub();}catch(e){}}
  blockUnsub = db.collection('blocks').where('from','==',me.uid)
    .onSnapshot(function(snap){
      geblokkeerd = {};
      snap.docs.forEach(function(d){var b=d.data(); if(b.to) geblokkeerd[b.to]=true;});
      renderFeed();
    }, function(){});
}

function openMenu(id, uid, naam){
  if(!me||me.isAnonymous){showToast('🔒 Login required'); return;}
  meldDoel = {id:id, uid:uid, naam:naam};
  var t=document.getElementById('meldTitel');
  if(t) t.textContent = naam ? ('Report or block ' + naam) : 'Report this post';
  document.getElementById('meldBox').classList.add('open');
}

function sluitMeld(){
  document.getElementById('meldBox').classList.remove('open');
  meldDoel = null;
}

function meldAan(reden){
  if(!meldDoel||!me) return;
  db.collection('reports').add({
    reporter: me.uid,
    reporterName: (myP&&(myP.displayName||myP.username))||'User',
    targetType: 'verhalen',
    targetId: meldDoel.id,
    targetUid: meldDoel.uid||'',
    targetName: meldDoel.naam||'',
    reason: reden,
    status: 'open',
    ts: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){
    sluitMeld();
    showToast('🚩 Reported — thank you');
  }).catch(function(err){
    showToast('❌ Could not send report');
    console.log('Report error:', err&&err.code);
  });
}

function blokkeerNu(){
  if(!meldDoel||!me) return;
  var uid = meldDoel.uid, naam = meldDoel.naam||'this user';
  if(!uid||uid===me.uid){sluitMeld();return;}
  if(!confirm('Block '+naam+'?\n\nYou will no longer see their posts, photos and videos.')) return;
  db.collection('blocks').doc(me.uid+'_'+uid)
    .set({from:me.uid, to:uid, ts:firebase.firestore.FieldValue.serverTimestamp()})
    .then(function(){
      sluitMeld();
      showToast('🚫 Blocked');
    }).catch(function(err){
      showToast('❌ Could not block');
      console.log('Block error:', err&&err.code);
    });
}

// ══ DATA ══
var feedUnsub=null;
function luisterFeed(){
  if(feedUnsub){try{feedUnsub();}catch(e){}feedUnsub=null;}
  // Nieuwste boven; verhalen blijven staan tot de eigenaar ze verwijdert.
  feedUnsub=db.collection('verhalen')
    .orderBy('ts','desc')
    .limit(FEED_LIMIET)
    .onSnapshot(function(snap){
      verhalen=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
      renderFeed();
    },function(err){
      document.getElementById('feed').innerHTML='<div class="leeg">❌ Could not load posts</div>';
      console.log('Feed error:',err&&err.code);
    });
}

// Verloop-teksten elke minuut verversen
setInterval(function(){ if(verhalen.length) renderFeed(); },60000);

auth.onAuthStateChanged(function(user){
  me=user;
  if(user&&!user.isAnonymous){
    db.collection('users').doc(user.uid).get().then(function(doc){
      if(doc.exists)myP=doc.data();
      renderComposer();
    }).catch(function(){renderComposer();});
  } else {
    renderComposer();
  }
  luisterFollows();
  luisterFeed();
  luisterBlocks();
});
</script>
</body>
</html>
