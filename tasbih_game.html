<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Tasbih — سبحان الله</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}

:root{
  --night:#04060F;
  --deep:#070B1A;
  --card:rgba(255,255,255,.04);
  --border:rgba(255,255,255,.07);
  --gold:#C9982A;
  --gold2:#E8C97A;
  --text:#EEF0FF;
  --muted:rgba(238,240,255,.4);
}

body{
  background:var(--night);
  color:var(--text);
  font-family:'Inter',sans-serif;
  overflow:hidden;
  height:100vh;width:100vw;
}

/* ── AMBIENT BACKGROUND ── */
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.amb-circle{
  position:absolute;border-radius:50%;filter:blur(80px);opacity:.12;
  animation:ambFloat 8s ease-in-out infinite alternate;
}
.amb1{width:300px;height:300px;background:#4C1D95;top:-80px;left:-80px;animation-delay:0s}
.amb2{width:250px;height:250px;background:#1E3A8A;bottom:-60px;right:-60px;animation-delay:-3s}
.amb3{width:200px;height:200px;background:#064E3B;top:40%;left:60%;animation-delay:-5s}
@keyframes ambFloat{0%{transform:scale(1) translate(0,0)}100%{transform:scale(1.15) translate(15px,-15px)}}

/* Star field */
.starfield{position:fixed;inset:0;pointer-events:none;z-index:0}
.s{position:absolute;background:#fff;border-radius:50%;animation:twink 3s infinite alternate}
@keyframes twink{0%{opacity:.1}100%{opacity:.6}}

/* ── GAME AREA ── */
#gameArea{position:fixed;inset:0;z-index:2;touch-action:none;display:none}

/* ── RING + BALL ── */
#ringWrap{position:fixed;pointer-events:none;z-index:6}

.ring-svg{position:absolute;top:0;left:0}

#ball{
  position:absolute;left:0;top:0;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
#ball.pop .ball-glow{animation:popAnim .18s cubic-bezier(.175,.885,.32,1.275)}
@keyframes popAnim{0%{transform:scale(1)}40%{transform:scale(1.22)}100%{transform:scale(1)}}

.ball-glow{
  width:100%;height:100%;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:background .7s ease,box-shadow .7s ease;
  gap:3px;
}

.ball-ar{
  font-family:'Amiri',serif;
  font-size:1rem;
  color:#fff;
  text-shadow:0 1px 6px rgba(0,0,0,.9);
  text-align:center;
  line-height:1.3;
  letter-spacing:.02em;
  transition:opacity .4s;
}
.ball-lt{
  font-size:.48rem;
  color:rgba(255,255,255,.65);
  text-shadow:0 1px 4px rgba(0,0,0,.8);
  letter-spacing:.04em;
  text-transform:uppercase;
}

/* ── HUD ── */
.hud-top{
  position:fixed;top:0;left:0;right:0;
  padding:max(env(safe-area-inset-top),.9rem) 1.1rem .65rem;
  display:flex;align-items:center;justify-content:space-between;
  z-index:20;
}

.hud-pill{
  background:rgba(255,255,255,.06);
  border:1px solid var(--border);
  backdrop-filter:blur(12px);
  border-radius:2rem;
  padding:.4rem .9rem;
  display:flex;flex-direction:column;align-items:center;
  min-width:58px;
}
.hud-n{font-size:1.35rem;color:var(--gold2);line-height:1;font-weight:600}
.hud-l{font-size:.55rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:.1rem}

.hud-center{
  display:flex;flex-direction:column;align-items:center;gap:.15rem;flex:1;padding:0 .75rem;
}
.hud-dhikr-ar{font-family:'Amiri',serif;font-size:.95rem;color:var(--gold2);transition:all .4s}
.hud-dhikr-lt{font-size:.6rem;color:var(--muted);letter-spacing:.04em}

.hud-bot{
  position:fixed;bottom:0;left:0;right:0;
  padding:.65rem 1.1rem max(env(safe-area-inset-bottom),.75rem);
  display:flex;align-items:center;justify-content:space-between;
  z-index:20;
}

.btn-ghost{
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  border-radius:2rem;
  color:rgba(255,255,255,.5);
  padding:.4rem .9rem;
  font-family:'Inter',sans-serif;
  font-size:.78rem;
  font-weight:500;
  cursor:pointer;
  letter-spacing:.02em;
}
.btn-ghost.danger{color:rgba(244,63,94,.6);border-color:rgba(244,63,94,.2)}

.pace-wrap{
  flex:1;margin:0 .85rem;display:flex;flex-direction:column;align-items:center;gap:.25rem;
}
.pace-track{
  width:100%;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;
}
.pace-fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--gold),var(--gold2));
  transition:width .08s linear;
}
.pace-lbl{font-size:.58rem;color:var(--muted);letter-spacing:.04em}

/* ── RIPPLE ── */
.ripple{
  position:fixed;pointer-events:none;border-radius:50%;
  border:1.5px solid rgba(201,152,42,.5);
  animation:ripOut .55s ease-out forwards;z-index:10;
}
@keyframes ripOut{
  0%{width:0;height:0;opacity:.8;transform:translate(-50%,-50%)}
  100%{width:90px;height:90px;opacity:0;transform:translate(-50%,-50%)}
}

/* ── PARTICLES ── */
.ptcl{position:fixed;pointer-events:none;animation:ptclUp .9s ease-out forwards;z-index:12;font-family:'Amiri',serif;color:var(--gold2)}
@keyframes ptclUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-90px) scale(.2)}}



/* ── SELECT SCREEN ── */
.sel-screen{
  position:fixed;inset:0;z-index:50;
  display:flex;flex-direction:column;align-items:center;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:max(env(safe-area-inset-top),1.5rem) 1.25rem max(env(safe-area-inset-bottom),1.5rem);
}

.sel-header{text-align:center;margin-bottom:1.75rem;margin-top:.5rem}
.sel-title{
  font-family:'Amiri',serif;font-size:2.2rem;
  color:var(--gold2);letter-spacing:.04em;
  text-shadow:0 0 30px rgba(232,201,122,.3);
}
.sel-sub{font-size:.8rem;color:var(--muted);margin-top:.3rem;line-height:1.6;font-weight:300}

/* Dhikr carousel */
.dhikr-scroll{
  display:flex;gap:.6rem;width:100%;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  padding-bottom:.5rem;margin-bottom:1.25rem;
  scrollbar-width:none;
}
.dhikr-scroll::-webkit-scrollbar{display:none}

.dcard{
  flex-shrink:0;width:140px;
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:1.1rem;
  padding:1rem .85rem;
  cursor:pointer;
  transition:all .2s;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.dcard::before{
  content:'';position:absolute;inset:0;border-radius:1.1rem;
  background:linear-gradient(135deg,transparent,rgba(255,255,255,.03));
  opacity:0;transition:opacity .2s;
}
.dcard.on{border-color:var(--gold);background:rgba(201,152,42,.1)}
.dcard.on::before{opacity:1}
.dcard-ar{font-family:'Amiri',serif;font-size:1.3rem;color:var(--gold2);margin-bottom:.4rem;line-height:1.3}
.dcard-lt{font-size:.72rem;color:var(--text);font-weight:500;margin-bottom:.15rem}
.dcard-en{font-size:.6rem;color:var(--muted);line-height:1.4;margin-bottom:.4rem}
.dcard-goal{
  display:inline-block;background:rgba(255,255,255,.07);
  border-radius:2rem;padding:.15rem .55rem;
  font-size:.6rem;color:var(--muted);letter-spacing:.04em;
}
.dcard.on .dcard-goal{background:rgba(201,152,42,.2);color:var(--gold2)}

/* Goal selector */
.goal-row{display:flex;gap:.45rem;width:100%;margin-bottom:1.5rem}
.gbtn{
  flex:1;padding:.55rem;border-radius:.65rem;
  border:1.5px solid var(--border);
  background:var(--card);
  color:var(--muted);
  font-family:'Inter',sans-serif;font-size:.88rem;font-weight:500;
  cursor:pointer;transition:all .15s;
}
.gbtn.on{border-color:var(--gold);background:rgba(201,152,42,.12);color:var(--gold2)}

/* Start button */
.btn-start{
  width:100%;max-width:320px;
  background:linear-gradient(135deg,#92400E,#B45309,var(--gold),#E8C97A);
  background-size:200% 200%;
  animation:goldShift 3s ease infinite alternate;
  border:none;border-radius:1rem;
  color:#1a0a00;
  padding:1rem 2rem;
  font-family:'Amiri',serif;font-size:1.25rem;
  font-weight:700;letter-spacing:.04em;
  cursor:pointer;
  box-shadow:0 4px 24px rgba(201,152,42,.35),0 1px 0 rgba(255,255,255,.15) inset;
}
@keyframes goldShift{0%{background-position:0% 50%}100%{background-position:100% 50%}}

/* ── LEVEL UP ── */
.lvl-ov{
  position:fixed;inset:0;z-index:80;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;
  background:radial-gradient(circle at center,rgba(201,152,42,.15),rgba(4,6,15,.85));
}
.lvl-badge{
  background:linear-gradient(135deg,#1C0F00,#3B1F00);
  border:2px solid var(--gold);
  border-radius:1.5rem;
  padding:1.75rem 2.25rem;
  text-align:center;
  box-shadow:0 0 60px rgba(201,152,42,.4),0 0 120px rgba(201,152,42,.15);
  animation:badgePop .5s cubic-bezier(.175,.885,.32,1.275) forwards;
  max-width:280px;
}
@keyframes badgePop{0%{transform:scale(.4) rotate(-8deg);opacity:0}100%{transform:scale(1) rotate(0deg);opacity:1}}
.lvl-badge.out{animation:badgeOut .4s ease-in forwards}
@keyframes badgeOut{0%{transform:scale(1);opacity:1}100%{transform:scale(.6) translateY(-50px);opacity:0}}
.lvl-ar{font-family:'Amiri',serif;font-size:1.8rem;color:var(--gold2);margin-bottom:.5rem}
.lvl-check{font-size:2.5rem;margin-bottom:.35rem}
.lvl-t{font-size:1rem;color:var(--gold2);font-weight:600;letter-spacing:.04em}
.lvl-sub{font-size:.75rem;color:var(--muted);margin-top:.25rem;line-height:1.5}
.lvl-next{font-size:.7rem;color:rgba(201,152,42,.6);margin-top:.5rem;letter-spacing:.03em}

/* Confetti */
.cf{position:fixed;pointer-events:none;z-index:75;border-radius:50%;animation:cfFall linear forwards}
@keyframes cfFall{0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}100%{opacity:0;transform:translateY(110vh) rotate(540deg) scale(.5)}}

/* ── RESULT ── */
.res-ov{
  position:fixed;inset:0;z-index:70;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(4,6,15,.95);
  backdrop-filter:blur(10px);
  padding:2rem;text-align:center;
}
.res-ar{font-family:'Amiri',serif;font-size:1.4rem;color:var(--gold2);margin-bottom:1rem}
.res-big{font-family:'Amiri',serif;font-size:3rem;color:var(--gold2);line-height:1}
.res-sub{font-size:.8rem;color:var(--muted);margin:.4rem 0 .25rem}
.res-list{font-family:'Amiri',serif;font-size:.95rem;color:var(--text);line-height:2;margin:1rem 0}
.res-row{display:flex;gap:.6rem;width:100%;max-width:300px;margin-top:1rem}
.res-btn{flex:1;padding:.85rem;border-radius:.85rem;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;border:none}
.res-btn.s{background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--text)}
.res-btn.p{background:linear-gradient(135deg,#065F46,#059669);color:#fff}

/* ── PAUSE ── */
.pause-ov{
  position:fixed;inset:0;z-index:70;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(4,6,15,.92);backdrop-filter:blur(8px);
  text-align:center;padding:2rem;
}
</style>
</head>
<body>
<div class="ambient"><div class="amb-circle amb1"></div><div class="amb-circle amb2"></div><div class="amb-circle amb3"></div></div>
<div class="starfield" id="sf"></div>

<!-- ══════════ SELECT ══════════ -->
<div class="sel-screen" id="selScreen">
  <div class="sel-header">
    <div class="sel-title">التسبيح</div>
    <div style="font-size:.72rem;color:var(--gold);letter-spacing:.08em;margin-top:.2rem;text-transform:uppercase">Tasbih Game</div>
    <div class="sel-sub">Tap anywhere — say the Dhikr with every tap<br/>The ball shows what to recite 🤲</div>
  </div>

  <div style="font-size:.6rem;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:.5rem;align-self:flex-start">Choose Dhikr</div>
  <div class="dhikr-scroll" id="dhikrScroll"></div>

  <div style="font-size:.6rem;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:.5rem;align-self:flex-start">Goal</div>
  <div class="goal-row" id="goalRow"></div>

  <button class="btn-start" onclick="startGame()">ابدأ — Begin</button>
</div>

<!-- ══════════ GAME ══════════ -->
<div id="gameArea">
  <div id="ringWrap">
    <!-- Progress ring -->
    <svg class="ring-svg" id="ringSvg" viewBox="0 0 130 130">
      <circle cx="65" cy="65" r="56" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="5"/>
      <circle id="progArc" cx="65" cy="65" r="56" fill="none" stroke="#C9982A" stroke-width="5"
        stroke-linecap="round" stroke-dasharray="351.9" stroke-dashoffset="351.9"
        style="transform:rotate(-90deg);transform-origin:65px 65px;transition:stroke-dashoffset .15s,stroke .4s"/>
    </svg>
    <!-- Cooldown ring -->
    <svg class="ring-svg" id="coolSvg" viewBox="0 0 130 130">
      <circle id="coolArc" cx="65" cy="65" r="56" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="5"
        stroke-linecap="round" stroke-dasharray="351.9" stroke-dashoffset="351.9"
        style="transform:rotate(-90deg);transform-origin:65px 65px"/>
    </svg>
    <!-- Ball -->
    <div id="ball">
      <div class="ball-glow" id="ballGlow">
        <div class="ball-ar" id="ballAr">سُبْحَانَ اللهِ</div>
        
      </div>
    </div>
  </div>

  <!-- HUD top -->
  <div class="hud-top">
    <div class="hud-pill">
      <div class="hud-n" id="cntDisp">0</div>
      <div class="hud-l">Count</div>
    </div>
    <div class="hud-center">
      <div class="hud-dhikr-ar" id="hudAr">سُبْحَانَ اللهِ</div>
      <div class="hud-dhikr-lt" id="hudLt">SubhanAllah · Level 1</div>
    </div>
    <div class="hud-pill" style="border-color:rgba(201,152,42,.3);background:rgba(201,152,42,.08)">
      <div class="hud-n" style="color:var(--gold2)" id="goalDisp">33</div>
      <div class="hud-l">Goal</div>
    </div>
  </div>

 <!-- HUD bottom -->
  <div class="hud-bot">
    <button class="btn-ghost" onclick="pauseGame()">⏸ Pause</button>
    <div class="pace-wrap">
      <div class="pace-track"><div class="pace-fill" id="paceFill" style="width:0%"></div></div>
      <div class="pace-lbl" id="paceLbl">Say & tap 🤲</div>
    </div>
    <button class="btn-ghost danger" onclick="dropBall()">End ✕</button>
  </div>

  <!-- Zikr tap balk -->
  <div style="position:fixed;bottom:65px;left:1rem;right:1rem;z-index:25">
    <div id="tapBtn" style="background:rgba(255,255,255,.06);border:2px solid rgba(201,152,42,.4);border-radius:1.25rem;padding:.85rem 1.5rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:space-between;gap:1rem">
      <div style="flex:1;text-align:center">
        <div id="tapBtnAr" style="font-family:'Amiri',serif;font-size:1.7rem;color:#E8C97A;line-height:1.2;text-shadow:0 0 20px rgba(232,201,122,.3)">سُبْحَانَ اللهِ</div>
      </div>
      <div style="flex-shrink:0;width:2.4rem;height:2.4rem;border-radius:50%;background:rgba(201,152,42,.12);border:1.5px solid rgba(201,152,42,.35);display:flex;align-items:center;justify-content:center;font-size:1rem">☪️</div>
    </div>
  </div>
</div>

<!-- ══════════ LEVEL UP ══════════ -->
<div class="lvl-ov" id="lvlOv">
  <div class="lvl-badge" id="lvlBadge">
    <div class="lvl-check" id="lvlCheck">✅</div>
    <div class="lvl-ar" id="lvlAr"></div>
    <div class="lvl-t" id="lvlT">Level Complete!</div>
    <div class="lvl-sub" id="lvlSub"></div>
    <!-- Quran/Hadith vers -->
    <div id="lvlVerse" style="margin-top:.85rem;padding-top:.85rem;border-top:1px solid rgba(201,152,42,.2)">
      <div id="lvlVerseAr" style="font-family:'Amiri',serif;font-size:1.05rem;color:#E8C97A;line-height:1.8;text-align:center;direction:rtl"></div>
      <div id="lvlVerseSource" style="font-family:'Amiri',serif;font-size:.75rem;color:rgba(201,152,42,.6);text-align:center;margin-top:.2rem"></div>
      <div id="lvlVerseTrans" style="font-size:.65rem;color:rgba(255,255,255,.4);text-align:center;margin-top:.35rem;line-height:1.5;font-family:Inter,sans-serif"></div>
      <div id="lvlTimer" style="margin-top:.75rem;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden">
        <div id="lvlTimerFill" style="height:100%;width:100%;background:linear-gradient(90deg,#C9982A,#E8C97A);border-radius:2px;transition:width 7s linear"></div>
      </div>
    </div>
    <div class="lvl-next" id="lvlNextTxt"></div>
  </div>
</div>

<!-- ══════════ RESULT ══════════ -->
<div class="res-ov" id="resOv">
  <div class="res-ar" id="resAr">الحمد لله</div>
  <div class="res-big" id="resBig">0</div>
  <div class="res-sub">levels completed</div>
  <div class="res-list" id="resList"></div>
  <div class="res-row">
    <button class="res-btn s" onclick="restartGame()">↺ Again</button>
    <button class="res-btn p" onclick="showSel()">← Menu</button>
  </div>
</div>

<!-- ══════════ PAUSE ══════════ -->
<div class="pause-ov" id="pauseOv">
  <div style="font-family:'Amiri',serif;font-size:2rem;color:var(--gold2);margin-bottom:.5rem">⏸</div>
  <div style="font-size:1.3rem;font-weight:600;margin-bottom:.4rem">Paused</div>
  <div style="font-size:.82rem;color:var(--muted);margin-bottom:1.75rem">Take a breath 🤲</div>
  <button class="btn-start" style="font-size:1rem;padding:.85rem 2rem" onclick="resumeGame()">▶ Continue</button>
</div>

<script>
const DHIKRS=[
  {ar:'سُبْحَانَ اللهِ',lt:'SubhanAllah',en:'Glory be to Allah',goal:33,clr:'#A78BFA',bg:'radial-gradient(circle at 38% 32%,#DDD6FE,#7C3AED 45%,#3B0764)',glow:'139,92,246',cd:1200},
  {ar:'الْحَمْدُ لِلَّهِ',lt:'Alhamdulillah',en:'All praise to Allah',goal:33,clr:'#60A5FA',bg:'radial-gradient(circle at 38% 32%,#BAE6FD,#1D4ED8 45%,#1E3A8A)',glow:'59,130,246',cd:1400},
  {ar:'اللهُ أَكْبَرُ',lt:'Allahu Akbar',en:'Allah is Greatest',goal:33,clr:'#FBBF24',bg:'radial-gradient(circle at 38% 32%,#FEF08A,#D97706 45%,#78350F)',glow:'217,119,6',cd:1100},
  {ar:'لَا إِلَهَ إِلَّا اللهُ',lt:'La ilaha illallah',en:'No god but Allah',goal:99,clr:'#34D399',bg:'radial-gradient(circle at 38% 32%,#A7F3D0,#059669 45%,#022C22)',glow:'5,150,105',cd:2000},
  {ar:'صَلِّ عَلَى مُحَمَّدٍ',lt:'Salli ala Muhammad',en:'Blessings on the Prophet ﷺ',goal:100,clr:'#FBBF24',bg:'radial-gradient(circle at 38% 32%,#FDE68A,#B45309 45%,#451A03)',glow:'180,83,9',cd:1800},
  {ar:'أَسْتَغْفِرُ اللهَ',lt:'Astaghfirullah',en:'I seek Allah\'s forgiveness',goal:99,clr:'#F87171',bg:'radial-gradient(circle at 38% 32%,#FECACA,#DC2626 45%,#450A0A)',glow:'220,38,38',cd:1500},
];

const CF=['#C9982A','#A78BFA','#34D399','#60A5FA','#F87171','#FFF','#FBBF24'];

let sD=0,sG=33;
let G={run:false,pause:false,count:0,goal:33,di:0,bx:0,by:0,vx:0,vy:0,
  grav:.33,raf:null,sz:30,lvl:1,done:0,lvling:false,lastTap:0,craf:null,total:0};

// Starfield
(function(){
  const sf=document.getElementById('sf');
  for(let i=0;i<60;i++){
    const s=document.createElement('div');s.className='s';
    s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;width:'+(Math.random()*1.5+.5)+'px;height:'+(Math.random()*1.5+.5)+'px;animation-delay:'+Math.random()*3+'s;animation-duration:'+(Math.random()*3+2)+'s';
    sf.appendChild(s);
  }
})();

// ── BUILD SELECT ──
function buildSelect(){
  const sc=document.getElementById('dhikrScroll');sc.innerHTML='';
  DHIKRS.forEach((d,i)=>{
    const c=document.createElement('div');c.className='dcard'+(i===sD?' on':'');
    c.innerHTML='<div class="dcard-ar">'+d.ar+'</div><div class="dcard-lt">'+d.lt+'</div><div class="dcard-en">'+d.en+'</div><span class="dcard-goal">×'+d.goal+'</span>';
    c.onclick=()=>{sD=i;sG=d.goal;buildSelect();buildGoals();};
    sc.appendChild(c);
  });
  // scroll to selected
  setTimeout(()=>{const cards=sc.querySelectorAll('.dcard');if(cards[sD])cards[sD].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});},100);
}

function buildGoals(){
  const row=document.getElementById('goalRow');row.innerHTML='';
  [33,99,100].forEach(g=>{
    const b=document.createElement('button');b.className='gbtn'+(g===sG?' on':'');
    b.innerHTML=g+'<span style="font-size:.6rem;opacity:.6;margin-left:.2rem">×</span>';
    b.onclick=()=>{sG=g;buildGoals();};
    row.appendChild(b);
  });
}
buildSelect();buildGoals();

// ── TAP ──
document.getElementById('gameArea').addEventListener('touchstart',function(e){
  if(e.target.closest('.btn-ghost'))return; // Pause/End zelf laten werken
  e.preventDefault();if(!G.run||G.pause||G.lvling)return;
  const t=e.changedTouches[0];doTap(t.clientX,t.clientY);
},{passive:false});
document.getElementById('gameArea').addEventListener('mousedown',function(e){
  if(e.target.closest('.btn-ghost'))return;
  if(!G.run||G.pause||G.lvling)return;doTap(e.clientX,e.clientY);
});

function doTap(x,y){
  const now=Date.now();
  const cd=DHIKRS[G.di].cd;

  if(now-G.lastTap<cd){
    // Te snel getikt: zachte boost + duidelijke feedback (rood knipperen + trilling)
    G.vy=Math.min(G.vy,-5);
    const pl=document.getElementById('paceLbl');
    if(pl){pl.style.color='#F87171';clearTimeout(G.plT);G.plT=setTimeout(()=>{pl.style.color='';},500);}
    const tb=document.getElementById('tapBtn');
    if(tb){tb.style.borderColor='rgba(244,63,94,.85)';clearTimeout(G.tbT);G.tbT=setTimeout(()=>{tb.style.borderColor='rgba(201,152,42,.4)';},450);}
    if(navigator.vibrate)navigator.vibrate(30);
    return;
  }
  G.lastTap=now;

  // Ripple
  const r=document.createElement('div');r.className='ripple';
  r.style.left=x+'px';r.style.top=y+'px';
  document.body.appendChild(r);setTimeout(()=>r.remove(),560);

  // Boost
  G.vy=-16-Math.random()*3;
  G.vx+=(Math.random()-.5)*2.2;
  if(Math.abs(G.vx)>5.5)G.vx=5.5*Math.sign(G.vx);
  G.count++;
  G.total++;

  // Groei bal op basis van TOTAAL count
  // Bal groeit continu op basis van totaal zikr - nooit reset
  G.sz = Math.round(30 + Math.sqrt(G.total / 99) * 100);
  G.sz = Math.min(G.sz, 140);
  const ballEl=document.getElementById('ball');
  const glowEl=document.getElementById('ballGlow');
  ballEl.style.width=G.sz+'px'; ballEl.style.height=G.sz+'px';
  glowEl.style.width=G.sz+'px'; glowEl.style.height=G.sz+'px';
  document.getElementById('ballAr').style.fontSize=(G.sz*0.17)+'px';

  // Particle
  const d=DHIKRS[G.di];
  const p=document.createElement('div');p.className='ptcl';
  p.textContent=d.ar.split(' ')[0];
  p.style.left=(G.bx+G.sz/2+(Math.random()-.5)*30)+'px';
  p.style.top=(G.by+G.sz/2-10)+'px';
  p.style.fontSize='.8rem';
  document.body.appendChild(p);setTimeout(()=>p.remove(),900);

  if(navigator.vibrate)navigator.vibrate(14);

  // Pop anim
  const ball=document.getElementById('ball');
  ball.classList.remove('pop');void ball.offsetWidth;ball.classList.add('pop');

  document.getElementById('cntDisp').textContent=G.count;
  updateRing();
  startCoolArc(cd);

  if(G.count>=G.goal){G.lvling=true;G.run=false;cancelAnimationFrame(G.raf);setTimeout(doLevelUp,350);}
}

function startCoolArc(ms){
  cancelAnimationFrame(G.craf);
  const arc=document.getElementById('coolArc');
  const C=351.9,start=Date.now();
  function tick(){
    const p=Math.max(0,1-(Date.now()-start)/ms);
    arc.style.strokeDashoffset=C*p;
    if(p>0)G.craf=requestAnimationFrame(tick);
    else arc.style.strokeDashoffset=C;
  }
  arc.style.strokeDashoffset='0';tick();
}

function updateRing(){
  const p=Math.min(G.count/G.goal,1);
  const C=351.9;
  document.getElementById('progArc').style.strokeDashoffset=C*(1-p);
  document.getElementById('progArc').style.stroke=p>.8?'#34D399':p>.5?'#FBBF24':DHIKRS[G.di].clr;
}

// ── GAME LOOP ──
function loop(){
  if(!G.run||G.pause)return;
  const W=window.innerWidth,H=window.innerHeight;
  const hT=75,hB=65;

  G.vy+=G.grav;G.bx+=G.vx;G.by+=G.vy;

  if(G.bx<0){G.bx=0;G.vx=Math.abs(G.vx);}
  if(G.bx>W-G.sz){G.bx=W-G.sz;G.vx=-Math.abs(G.vx);}
  if(G.by<hT){G.by=hT;G.vy=Math.abs(G.vy)*.5;}
  if(G.by>H-G.sz-hB){G.run=false;cancelAnimationFrame(G.raf);setTimeout(showResult,150);return;}

  posRing();
  updateBallColor();

  // Pace indicator
  const now=Date.now(),since=now-G.lastTap,cd=DHIKRS[G.di].cd;
  const ready=since>=cd;
  const pct=Math.min(since/cd,1)*100;
  document.getElementById('paceFill').style.width=pct+'%';
  document.getElementById('paceLbl').textContent=ready?'Ready — say & tap 🤲':'Recite... ☪️';

  G.grav=.33+(G.count/G.goal)*.18+(G.lvl-1)*.016;
  G.raf=requestAnimationFrame(loop);
}

function posRing(){
  const rw=document.getElementById('ringWrap');
  rw.style.left=G.bx+'px';rw.style.top=G.by+'px';
}

function updateBallColor(){
  const H=window.innerHeight;
  const d=DHIKRS[G.di];
  const glow=document.getElementById('ballGlow');
  if(G.by>H*.68){
    glow.style.background='radial-gradient(circle at 38% 32%,#FCA5A5,#EF4444 45%,#450A0A)';
    glow.style.boxShadow='0 0 35px rgba(239,68,68,.9),inset 0 -10px 20px rgba(0,0,0,.4)';
  } else {
    glow.style.background=d.bg;
    glow.style.boxShadow='0 0 35px rgba('+d.glow+',.8),0 0 70px rgba('+d.glow+',.25),inset 0 -10px 20px rgba(0,0,0,.4)';
  }
}


// Beloningen van Zikr — Quran & Hadith
const VERSES = [
  { // SubhanAllah — 33x
    ar: "مَن قَالَ سُبْحَانَ اللَّهِ وَبِحَمْدِهِ فِي يَوْمٍ مِئَةَ مَرَّةٍ حُطَّتْ خَطَايَاهُ وَإِنْ كَانَتْ مِثْلَ زَبَدِ الْبَحْرِ",
    source: "متفق عليه",
    trans: "Wie SubhanAllahi wa bihamdihi 100x per dag zegt — zijn zonden worden vergeven, ook al zijn ze als het schuim van de zee"
  },
  { // Alhamdulillah — 33x
    ar: "الطُّهُورُ شَطْرُ الْإِيمَانِ وَالْحَمْدُ لِلَّهِ تَمْلَأُ الْمِيزَانَ",
    source: "رواه مسلم",
    trans: "Alhamdulillah vult de weegschaal van goede daden — het is een van de zwaarste daden op de Dag des Oordeels"
  },
  { // Allahu Akbar — 33x
    ar: "كَلِمَتَانِ خَفِيفَتَانِ عَلَى اللِّسَانِ ثَقِيلَتَانِ فِي الْمِيزَانِ حَبِيبَتَانِ إِلَى الرَّحْمَٰنِ سُبْحَانَ اللَّهِ وَبِحَمْدِهِ سُبْحَانَ اللَّهِ الْعَظِيمِ",
    source: "متفق عليه",
    trans: "Twee woorden — licht op de tong, zwaar op de weegschaal, geliefd bij Allah: SubhanAllahi wa bihamdihi, SubhanAllahil Azim"
  },
  { // La ilaha illallah — 99x
    ar: "مَنْ قَالَ لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ — كَانَتْ لَهُ عَدْلَ عَشْرِ رِقَابٍ",
    source: "متفق عليه",
    trans: "Wie dit 100x per dag zegt krijgt de beloning van 10 slaven te bevrijden, 100 goede daden, 100 zonden vergeven — en bescherming tegen Shaytan die dag"
  },
  { // Salawat — 100x
    ar: "مَنْ صَلَّى عَلَيَّ صَلَاةً وَاحِدَةً صَلَّى اللَّهُ عَلَيْهِ بِهَا عَشْرًا",
    source: "رواه مسلم",
    trans: "Wie één keer Salawat over mij zegt — Allah schenkt hem tien zegeningen, vergeeft hem tien zonden en verheft hem tien rangen"
  },
  { // Astaghfirullah — 99x
    ar: "وَمَن يَعْمَلْ سُوءًا أَوْ يَظْلِمْ نَفْسَهُ ثُمَّ يَسْتَغْفِرِ اللَّهَ يَجِدِ اللَّهَ غَفُورًا رَّحِيمًا",
    source: "النساء: ١١٠",
    trans: "Wie ook maar kwaad doet of zichzelf onrecht aandoet en daarna Allah om vergiffenis vraagt — zal Allah Vergevensgezind en Barmhartig vinden"
  },
];

// ── LEVEL UP ──
function doLevelUp(){
  const d=DHIKRS[G.di];
  const ni=(G.di+1)%DHIKRS.length;
  const nd=DHIKRS[ni];
  G.done++;

  if(navigator.vibrate)navigator.vibrate([80,40,80,40,180,40,180]);

  // Confetti
  for(let i=0;i<80;i++){
    setTimeout(()=>{
      const c=document.createElement('div');c.className='cf';
      const sz=Math.random()*9+4;
      c.style.cssText='width:'+sz+'px;height:'+sz+'px;background:'+CF[Math.floor(Math.random()*CF.length)]+';left:'+Math.random()*100+'vw;top:-12px;animation-duration:'+(Math.random()*2+1.8)+'s;animation-delay:'+Math.random()*.4+'s';
      document.body.appendChild(c);setTimeout(()=>c.remove(),4000);
    },i*20);
  }

 // Update badge
  const ov=document.getElementById('lvlOv');
  ov.style.display='flex';
  document.getElementById('lvlCheck').textContent='✅';
  document.getElementById('lvlAr').textContent=d.ar;
  document.getElementById('lvlT').textContent='Level '+G.lvl+' Complete!';
  document.getElementById('lvlSub').textContent=d.lt+' × '+G.goal;
  document.getElementById('lvlNextTxt').textContent='Next → '+nd.lt+' × '+nd.goal+' · tik om door te gaan ▶';
  // Vers van huidige dhikr
  const v=VERSES[G.di];
  document.getElementById('lvlVerseAr').textContent=v.ar;
  document.getElementById('lvlVerseSource').textContent='— '+v.source+' —';
  document.getElementById('lvlVerseTrans').textContent=v.trans;
  // Start countdown timer
  const tf=document.getElementById('lvlTimerFill');
  tf.style.transition='none';tf.style.width='100%';
  setTimeout(()=>{tf.style.transition='width 15s linear';tf.style.width='0%';},50);

  // Pre-update ball to next color
  const glow=document.getElementById('ballGlow');
  glow.style.background=nd.bg;
  glow.style.boxShadow='0 0 35px rgba('+nd.glow+',.8),0 0 70px rgba('+nd.glow+',.25),inset 0 -10px 20px rgba(0,0,0,.4)';
  document.getElementById('ballAr').textContent=nd.ar;
  document.getElementById('hudAr').textContent=nd.ar;
  document.getElementById('tapBtnAr').textContent=nd.ar;

 // 15s leestijd voor het vers — maar een tik op het scherm slaat de wachttijd over
  let lvlDone=false;
  const finishLvl=()=>{
    if(lvlDone)return; lvlDone=true;
    clearTimeout(G.lvlT);
    ov.onclick=null; ov.style.pointerEvents='none';
    document.getElementById('lvlBadge').classList.add('out');
    setTimeout(()=>{
      ov.style.display='none';
      document.getElementById('lvlBadge').classList.remove('out');
      nextLevel(ni);
    },400);
  };
  ov.style.pointerEvents='auto';
  ov.onclick=finishLvl;
  G.lvlT=setTimeout(finishLvl,15000);
}

function nextLevel(ni){
  G.di=ni;G.lvl++;G.count=0;G.goal=DHIKRS[ni].goal;
  G.lvling=false;G.run=true;G.lastTap=0;
  // Bal behoudt grootte - groeit door
  const d=DHIKRS[ni];
  document.getElementById('goalDisp').textContent=G.goal;
  document.getElementById('cntDisp').textContent='0';
  document.getElementById('hudLt').textContent=d.lt+' · Level '+G.lvl;
  document.getElementById('progArc').style.stroke=d.clr;
  document.getElementById('progArc').style.strokeDashoffset='351.9';
  document.getElementById('coolArc').style.strokeDashoffset='351.9';
  G.grav=.33+G.lvl*.016;
  G.vy=-13;G.vx=(Math.random()-.5)*1.5;
  loop();
}

// ── START ──
function startGame(){
  const W=window.innerWidth,H=window.innerHeight;
  G.di=sD;G.goal=sG;G.count=0;G.sz=30;G.lvl=1;G.done=0;G.total=0;
  G.bx=W/2-G.sz/2;G.by=H/2-G.sz/2;
  G.vx=(Math.random()-.5)*1.5;G.vy=-10;
  G.grav=.33;G.run=true;G.pause=false;G.lvling=false;G.lastTap=0;

  document.getElementById('selScreen').style.display='none';
  document.getElementById('gameArea').style.display='block';
  document.getElementById('resOv').style.display='none';
  document.getElementById('lvlOv').style.display='none';

  // Size ring and ball
  const rw=document.getElementById('ringWrap');
  rw.style.position='fixed';rw.style.width=G.sz+'px';rw.style.height=G.sz+'px';
  ['ringSvg','coolSvg'].forEach(id=>{const e=document.getElementById(id);e.style.width=G.sz+'px';e.style.height=G.sz+'px';});
  const ball=document.getElementById('ball');
  ball.style.width='30px';ball.style.height='30px';

  const d=DHIKRS[sD];
  document.getElementById('goalDisp').textContent=G.goal;
  document.getElementById('cntDisp').textContent='0';
  document.getElementById('hudAr').textContent=d.ar;
  document.getElementById('hudLt').textContent=d.lt+' · Level 1';
  document.getElementById('ballAr').textContent=d.ar;
  document.getElementById('tapBtnAr').textContent=d.ar;

  const glow=document.getElementById('ballGlow');
  glow.style.width='30px';glow.style.height='30px';
  glow.style.background=d.bg;
  glow.style.boxShadow='0 0 35px rgba('+d.glow+',.8),0 0 70px rgba('+d.glow+',.25),inset 0 -10px 20px rgba(0,0,0,.4)';

  updateRing();posRing();loop();
}

// ── RESULT ──
function showResult(){
  document.getElementById('resOv').style.display='flex';
  const done=G.done;
  const completedAr=done>0?DHIKRS[(sD+done-1)%DHIKRS.length].ar:'الله';
  document.getElementById('resAr').textContent=done>=3?'مَا شَاءَ اللهُ':done>=1?'الْحَمْدُ لِلَّهِ':'إِنْ شَاءَ اللهُ';
  document.getElementById('resBig').textContent=done;
  let list='';
  for(let i=0;i<Math.min(done,DHIKRS.length);i++)list+=DHIKRS[(sD+i)%DHIKRS.length].ar+' ✓\n';
  document.getElementById('resList').textContent=list.trim()||'Keep practicing 🤲';
}

function restartGame(){document.getElementById('resOv').style.display='none';startGame();}
function showSel(){G.run=false;cancelAnimationFrame(G.raf);cancelAnimationFrame(G.craf);document.getElementById('resOv').style.display='none';document.getElementById('gameArea').style.display='none';document.getElementById('selScreen').style.display='flex';}
function pauseGame(){G.pause=true;cancelAnimationFrame(G.raf);document.getElementById('pauseOv').style.display='flex';}
function resumeGame(){G.pause=false;document.getElementById('pauseOv').style.display='none';loop();}
function dropBall(){G.run=false;cancelAnimationFrame(G.raf);showResult();}
</script>
