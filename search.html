<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Search — Tolaanfur</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#060818;--text:#EEF2FF;--muted:rgba(238,242,255,.45);--border:rgba(100,140,255,.18);--card:rgba(20,30,100,.4);--b3:#00BFFF}
body{background:var(--bg);color:var(--text);font-family:Inter,sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.nav{background:rgba(6,8,24,.98);border-bottom:1px solid var(--border);padding:max(env(safe-area-inset-top),.75rem) 1rem .65rem;display:flex;align-items:center;gap:.65rem;flex-shrink:0}
.back{width:2.2rem;height:2.2rem;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.zoek{flex:1;background:rgba(255,255,255,.07);border:1.5px solid var(--border);border-radius:2rem;padding:.6rem 1rem;color:var(--text);font-size:.92rem;outline:none;font-family:Inter,sans-serif}
.zoek:focus{border-color:var(--b3)}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 1rem 2rem}
.kop{font-family:'Fredoka One',cursive;font-size:.85rem;color:var(--b3);margin:1rem 0 .5rem;text-transform:uppercase;letter-spacing:.05em}

.p-card{background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:.7rem .85rem;display:flex;align-items:center;gap:.65rem;margin-bottom:.5rem}
.p-av{width:2.4rem;height:2.4rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0;background:linear-gradient(135deg,#2563EB,#6B3FFF);color:#fff}
.p-naam{font-weight:700;font-size:.88rem}
.p-sub{font-size:.62rem;color:var(--muted);margin-top:.1rem}
.volg{border-radius:.65rem;font-size:.72rem;font-weight:700;padding:.45rem .8rem;cursor:pointer;flex-shrink:0;font-family:Inter,sans-serif;border:1px solid rgba(0,191,255,.35);background:rgba(0,191,255,.1);color:var(--b3)}
.volg.aan{border-color:rgba(16,185,129,.35);background:rgba(16,185,129,.1);color:#10B981}

.post-card{border-radius:1rem;padding:.85rem;margin-bottom:.55rem;border:1px solid rgba(255,255,255,.12)}
.post-naam{font-weight:700;font-size:.78rem;color:#fff;margin-bottom:.3rem}
.post-tekst{font-size:.85rem;line-height:1.5;color:#fff;word-break:break-word}

.foto-rij{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.4rem}
.foto-cel{border-radius:.6rem;overflow:hidden;aspect-ratio:1;background:#0D1240}
.foto-cel img{width:100%;height:100%;object-fit:cover;display:block}

.vid-card{background:var(--card);border:1px solid var(--border);border-radius:1rem;overflow:hidden;margin-bottom:.6rem}
.vid-card video{width:100%;display:block;background:#000;max-height:240px}
.vid-cap{padding:.5rem .75rem;font-size:.78rem;color:var(--muted)}

.leeg{text-align:center;padding:2.5rem 1rem;color:var(--muted)}
#toast{position:fixed;bottom:2.5rem;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff;padding:.45rem 1.1rem;border-radius:2rem;font-size:.82rem;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
</style>
</head>
<body>

<div class="nav">
  <div class="back" onclick="terug()">←</div>
  <input class="zoek" id="zoekInp" placeholder="🔍 Search people, posts, photos, videos..." autocomplete="off"/>
</div>

<div class="scroll" id="main">
  <div class="leeg"><div style="font-size:2.5rem">🔍</div><div style="margin-top:.5rem;font-size:.85rem">Type at least 2 characters to search</div></div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
var CFG={
  apiKey:'AIzaSyD4o7SprtOMn7F4iFjVmPB37C1Tf7mICDk',
  authDomain:'tolaanfur-5b5f5.firebaseapp.com',
  projectId:'tolaanfur-5b5f5',
  storageBucket:'tolaanfur-5b5f5.firebasestorage.app',
  messagingSenderId:'188890145767',
  appId:'1:188890145767:web:6ec8fe6fae4ddd90891342'
};

var fbApp = firebase.apps.length > 0 ? firebase.apps[0] : firebase.initializeApp(CFG);
var db = fbApp.firestore();
var auth = fbApp.auth();

var me = null;
var myP = null;
var mijnFollows = {};
var contentCache = null;   // {posts, fotos, videos} — één keer opgehaald per bezoek
var zoekTimer = null;

// Beveiliging: alle gebruikersinvoer escapen voordat het in innerHTML gaat (XSS)
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function terug(){
  try{
    if(window.parent&&window.parent!==window){
      window.parent.postMessage({type:'navigate',screen:'home'},'*');
    }
  }catch(e){}
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(window._tt);window._tt=setTimeout(function(){t.classList.remove('show');},2500);
}

// ══ PROFIEL OPENEN ══
function openProfiel(uid){
  if(!uid)return;
  try{
    if(window.parent&&window.parent!==window){
      window.parent.postMessage({type:'navigate',screen:'userprofile',param:uid},'*');
    }
  }catch(e){}
}

// ══ MELDINGEN ══
function mijnNaam(){return (myP&&(myP.displayName||myP.username))||'Someone';}
function stuurMelding(toUid,type,message){
  if(!me||toUid===me.uid)return;
  db.collection('notifications').add({
    to:toUid, fromUid:me.uid, fromName:mijnNaam(),
    type:type, message:message, read:false,
    ts:Date.now(),
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  }).catch(function(){});
}

// ══ VOLGEN ══
function laadFollows(){
  if(!me||me.isAnonymous)return;
  db.collection('follows').where('from','==',me.uid).get().then(function(snap){
    mijnFollows={};
    snap.docs.forEach(function(d){var v=d.data();if(v.to)mijnFollows[v.to]=true;});
  }).catch(function(){});
}

function toggleFollow(uid,btn){
  if(!me||me.isAnonymous){showToast('🔒 Login required');return;}
  if(!uid||uid===me.uid)return;
  var ref=db.collection('follows').doc(me.uid+'_'+uid);
  if(mijnFollows[uid]){
    ref.delete().then(function(){
      delete mijnFollows[uid];
      btn.classList.remove('aan');btn.textContent='+ Follow';
      showToast('Unfollowed');
    }).catch(function(){showToast('❌ Failed');});
  } else {
    ref.set({from:me.uid,to:uid,ts:firebase.firestore.FieldValue.serverTimestamp()})
      .then(function(){
        mijnFollows[uid]=true;
        btn.classList.add('aan');btn.textContent='✓ Following';
        showToast('✓ Following');
        stuurMelding(uid,'follow',mijnNaam()+' started following you');
      }).catch(function(){showToast('❌ Failed');});
  }
}

// ══ CONTENT-CACHE (posts/foto's/video's één keer ophalen, daarna lokaal filteren) ══
function laadContent(){
  if(contentCache) return Promise.resolve(contentCache);
  return Promise.all([
    db.collection('verhalen').orderBy('ts','desc').limit(100).get(),
    db.collection('photos').orderBy('ts','desc').limit(30).get(),
    db.collection('videos').orderBy('ts','desc').limit(20).get()
  ]).then(function(res){
    contentCache={
      posts:res[0].docs.map(function(d){return Object.assign({id:d.id},d.data());}),
      fotos:res[1].docs.map(function(d){return Object.assign({id:d.id},d.data());}),
      videos:res[2].docs.map(function(d){return Object.assign({id:d.id},d.data());})
    };
    return contentCache;
  }).catch(function(){
    contentCache={posts:[],fotos:[],videos:[]};
    return contentCache;
  });
}

// ══ ZOEKEN ══
function zoek(term){
  var t=term.trim();
  if(t.length<2){
    document.getElementById('main').innerHTML='<div class="leeg"><div style="font-size:2.5rem">🔍</div><div style="margin-top:.5rem;font-size:.85rem">Type at least 2 characters to search</div></div>';
    return;
  }
  document.getElementById('main').innerHTML='<div class="leeg">Searching...</div>';

  // Gebruikers via efficiënte prefix-queries (zelfde techniek als het Friends-tabblad)
  var v=t, tl=t.toLowerCase();
  var userQueries=[
    db.collection('users').where('displayName','>=',v).where('displayName','<=',v+'\uf8ff').limit(10).get(),
    db.collection('users').where('username','>=',v).where('username','<=',v+'\uf8ff').limit(10).get()
  ];

  Promise.all([Promise.all(userQueries), laadContent()]).then(function(res){
    var gezien={}, mensen=[];
    res[0].forEach(function(snap){
      snap.docs.forEach(function(d){
        if(!gezien[d.id]){gezien[d.id]=true;mensen.push(Object.assign({uid:d.id},d.data()));}
      });
    });
    var c=res[1];
    var posts=c.posts.filter(function(p){return String(p.text||'').toLowerCase().indexOf(tl)>=0||String(p.displayName||'').toLowerCase().indexOf(tl)>=0;}).slice(0,8);
    var fotos=c.fotos.filter(function(p){return String(p.caption||'').toLowerCase().indexOf(tl)>=0||String(p.displayName||'').toLowerCase().indexOf(tl)>=0;}).slice(0,9);
    var videos=c.videos.filter(function(p){return String(p.caption||'').toLowerCase().indexOf(tl)>=0||String(p.displayName||'').toLowerCase().indexOf(tl)>=0;}).slice(0,4);
    render(mensen,posts,fotos,videos);
  });
}

var KLEUREN=['#1E3A8A','#4C1D95','#065F46','#7C2D12','#831843','#0E7490'];

function render(mensen,posts,fotos,videos){
  var m=document.getElementById('main');
  if(!mensen.length&&!posts.length&&!fotos.length&&!videos.length){
    m.innerHTML='<div class="leeg"><div style="font-size:2.5rem">🤷</div><div style="margin-top:.5rem;font-size:.85rem">No results found</div></div>';
    return;
  }
  var html='';

  if(mensen.length){
    html+='<div class="kop">👥 People</div>';
    mensen.forEach(function(u){
      var ini=(u.displayName||'U').substring(0,2).toUpperCase();
      var ik=me&&u.uid===me.uid;
      var volgIk=!!mijnFollows[u.uid];
      html+='<div class="p-card" data-profiel="'+esc(u.uid)+'" style="cursor:pointer"><div class="p-av">'+esc(ini)+'</div>'
        +'<div style="flex:1;min-width:0"><div class="p-naam">'+esc(u.displayName||'User')+(ik?' <span style="font-size:.65rem;color:var(--muted)">(you)</span>':'')+'</div>'
        +(u.username?'<div class="p-sub">@'+esc(u.username)+'</div>':'')
        +'</div>'
        +(!ik&&me&&!me.isAnonymous?'<button class="volg'+(volgIk?' aan':'')+'" data-volg="'+esc(u.uid)+'">'+(volgIk?'✓ Following':'+ Follow')+'</button>':'')
        +'</div>';
    });
  }

  if(posts.length){
    html+='<div class="kop">📝 Posts</div>';
    posts.forEach(function(p){
      var bg=KLEUREN[p.bg||0]||KLEUREN[0];
      var tekst=String(p.text||'');
      if(tekst.length>200)tekst=tekst.substring(0,200)+'…';
      html+='<div class="post-card" style="background:linear-gradient(160deg,'+bg+',rgba(6,8,24,.55)),'+bg+'">'
        +'<div class="post-naam">'+esc(p.displayName||'User')+'</div>'
        +'<div class="post-tekst">'+esc(tekst)+'</div></div>';
    });
  }

  if(fotos.length){
    html+='<div class="kop">📸 Photos</div><div class="foto-rij">';
    fotos.forEach(function(p){
      html+='<div class="foto-cel"><img src="'+esc(p.img||'')+'" alt="" loading="lazy"/></div>';
    });
    html+='</div>';
  }

  if(videos.length){
    html+='<div class="kop">🎬 Videos</div>';
    videos.forEach(function(p){
      html+='<div class="vid-card"><video src="'+esc(p.url||'')+'" controls playsinline preload="metadata"></video>'
        +(p.caption?'<div class="vid-cap">'+esc(p.caption)+'</div>':'')+'</div>';
    });
  }

  m.innerHTML=html;
  m.querySelectorAll('[data-volg]').forEach(function(b){
    b.addEventListener('click',function(e){e.stopPropagation();toggleFollow(b.getAttribute('data-volg'),b);});
  });
  m.querySelectorAll('[data-profiel]').forEach(function(k){
    k.addEventListener('click',function(){openProfiel(k.getAttribute('data-profiel'));});
  });
}

document.getElementById('zoekInp').addEventListener('input',function(e){
  clearTimeout(zoekTimer);
  zoekTimer=setTimeout(function(){zoek(e.target.value||'');},350);
});

auth.onAuthStateChanged(function(user){
  me=user;
  if(user&&!user.isAnonymous){
    db.collection('users').doc(user.uid).get().then(function(doc){
      if(doc.exists)myP=doc.data();
    }).catch(function(){});
    laadFollows();
  }
});
</script>
</body>
</html>
