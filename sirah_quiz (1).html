<!DOCTYPE html>
<html lang="om">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Sirah Quiz — Tolaanfur</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@400;500;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
:root{--bg:#060818;--text:#EEF2FF;--muted:rgba(238,242,255,.45);--border:rgba(100,140,255,.18);--card:rgba(20,30,100,.4);--gold:#F59E0B}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;overflow:hidden}
.scr{position:fixed;inset:0;z-index:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;flex-direction:column;padding-bottom:2rem}
.scr.on{display:flex}
.nav{background:rgba(6,8,24,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:max(env(safe-area-inset-top),.75rem) 1rem .65rem;display:flex;align-items:center;gap:.65rem;position:sticky;top:0;z-index:10;flex-shrink:0}
.nav-back{width:2.2rem;height:2.2rem;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.9rem;cursor:pointer;flex-shrink:0}
.nav-title{font-family:'Fredoka One',cursive;font-size:1rem;flex:1}
.btn{border:none;border-radius:.85rem;padding:.75rem 1.25rem;font-family:'Fredoka One',cursive;font-size:.95rem;cursor:pointer;width:100%;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#6B3FFF,#9B6FFF);color:#fff}
.btn-secondary{background:var(--card);border:1px solid var(--border);color:var(--text)}
.btn-gold{background:linear-gradient(135deg,#92400E,#C9982A);color:#fff8e1}

/* Prophet list */
.prophet-item{display:flex;align-items:center;gap:.85rem;padding:.85rem 1rem;margin:.4rem 1rem;border-radius:1rem;cursor:pointer;transition:all .2s;border:1px solid var(--border)}
.prophet-item:active{transform:scale(.97)}
.prophet-item.locked{opacity:.55;cursor:default}
.p-avatar{width:3rem;height:3rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:1rem;color:#fff;flex-shrink:0}
.p-num{font-size:.6rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.p-name{font-family:'Fredoka One',cursive;font-size:.95rem;margin:.1rem 0}
.p-status{font-size:.65rem;color:var(--muted)}

/* Level list */
.level-item{display:flex;align-items:center;gap:.85rem;padding:.75rem 1rem;margin:.35rem 1rem;border-radius:.85rem;cursor:pointer;transition:all .2s;border:1px solid var(--border);background:var(--card)}
.level-item:active{transform:scale(.97)}
.level-item.done{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.05)}
.l-num{width:2.4rem;height:2.4rem;border-radius:50%;background:rgba(107,63,255,.2);border:1px solid rgba(107,63,255,.4);display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:.85rem;color:#9B6FFF;flex-shrink:0}
.l-num.done{background:rgba(16,185,129,.2);border-color:rgba(16,185,129,.4);color:#10B981}

/* Quiz */
.quiz-header{padding:.75rem 1rem;flex-shrink:0;border-bottom:1px solid var(--border)}
.quiz-prog-bar{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-bottom:.6rem}
.quiz-prog-fill{height:100%;background:linear-gradient(90deg,#6B3FFF,#9B6FFF);border-radius:3px;transition:width .4s}
.quiz-timer{font-family:'Fredoka One',cursive;font-size:1.1rem;color:#F59E0B}
.quiz-timer.urgent{color:#EF4444;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.quiz-body{flex:1;overflow-y:auto;padding:1rem}
.quiz-q-text{font-size:1rem;font-weight:700;line-height:1.5;margin-bottom:1rem}
.quiz-opts{display:flex;flex-direction:column;gap:.5rem}
.quiz-opt{background:var(--card);border:1.5px solid var(--border);border-radius:.85rem;padding:.8rem 1rem;cursor:pointer;font-size:.88rem;text-align:left;width:100%;color:var(--text);font-family:'Inter',sans-serif;display:flex;align-items:center;gap:.65rem}
.quiz-opt.correct{border-color:#10B981;background:rgba(16,185,129,.12);color:#10B981}
.quiz-opt.wrong{border-color:#EF4444;background:rgba(239,68,68,.08);color:#F87171}
.opt-letter{width:1.8rem;height:1.8rem;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;flex-shrink:0}
.quiz-expl{background:rgba(107,63,255,.08);border:1px solid rgba(107,63,255,.25);border-radius:.85rem;padding:.75rem 1rem;margin-top:.75rem;font-size:.82rem;line-height:1.6;display:none}
.quiz-expl.show{display:block}
.quiz-footer{padding:.85rem 1rem max(env(safe-area-inset-bottom),.85rem);flex-shrink:0;border-top:1px solid var(--border);background:rgba(6,8,24,.9);backdrop-filter:blur(8px)}

/* Result */
.result-ring{width:8rem;height:8rem;border-radius:50%;margin:1rem auto;display:flex;flex-direction:column;align-items:center;justify-content:center;border:4px solid}
.result-pct{font-family:'Fredoka One',cursive;font-size:2rem;line-height:1}
.result-breakdown{margin:0 1rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:1rem}
.result-row{display:flex;align-items:center;justify-content:space-between;padding:.4rem 0;border-bottom:1px solid var(--border);font-size:.82rem}
.result-row:last-child{border-bottom:none}
.cf{position:fixed;pointer-events:none;z-index:100;border-radius:50%;animation:cff linear forwards}
@keyframes cff{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(540deg)}}
.toast-el{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:.45rem 1.1rem;border-radius:2rem;font-size:.8rem;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast-el.show{opacity:1}
</style>
</head>
<body>

<!-- S1: PROFETEN -->
<div class="scr on" id="s-prophets">
  <div class="nav">
    <div class="nav-back" onclick="goBack()">←</div>
    <div>
      <div class="nav-title">🏆 Sirah Quiz</div>
      <div style="font-size:.62rem;color:var(--muted)">Seenaa nabiyyotaa baradhuuti ufqormaati</div>
    </div>
  </div>
  <div style="padding:.6rem 1rem .2rem;text-align:center">
    <div style="font-family:'Amiri',serif;font-size:1.2rem;color:#F59E0B;direction:rtl">سِيرَةُ الأَنْبِيَاءِ</div>
  </div>
  <div id="prophetList" style="padding-bottom:1rem"></div>
</div>

<!-- S2: LEVELS -->
<div class="scr" id="s-levels">
  <div class="nav">
    <div class="nav-back" onclick="showScreen('s-prophets')">←</div>
    <div>
      <div class="nav-title" id="levelNavTitle"></div>
      <div style="font-size:.62rem;color:var(--muted)">Boqonnaa filadhu — gaaffii 20</div>
    </div>
  </div>
  <div id="levelList" style="padding-bottom:1rem"></div>
</div>

<!-- S3: QUIZ -->
<div class="scr" id="s-quiz" style="display:none">
  <div class="nav">
    <div class="nav-back" onclick="showScreen('s-levels')">←</div>
    <div class="nav-title" id="quizNavTitle">Ufqormaata</div>
  </div>
  <div class="quiz-header">
    <div class="quiz-prog-bar"><div class="quiz-prog-fill" id="quizFill" style="width:0%"></div></div>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:.75rem;color:var(--muted)" id="quizCounter">Gaaffii 1/20</div>
      <div class="quiz-timer" id="quizTimer">⏱ 20</div>
      <div style="font-size:.72rem;color:#10B981;font-weight:600" id="quizScore">✓ 0</div>
    </div>
  </div>
  <div class="quiz-body">
    <div style="font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem" id="quizQNum"></div>
    <div class="quiz-q-text" id="quizQText"></div>
    <div class="quiz-opts" id="quizOpts"></div>
    <div class="quiz-expl" id="quizExpl">
      <div style="font-weight:700;color:#9B6FFF;margin-bottom:.3rem;font-size:.8rem">📖 Ibsa</div>
      <div id="quizExplText"></div>
    </div>
  </div>
  <div class="quiz-footer">
    <button class="btn btn-primary" id="quizNextBtn" onclick="quizNext()" style="display:none">Itti fufi →</button>
  </div>
</div>

<!-- S4: FIRII -->
<div class="scr" id="s-result" style="display:none">
  <div class="nav">
    <div class="nav-back" onclick="showScreen('s-levels')">←</div>
    <div class="nav-title">Firii Ufqormaataa</div>
  </div>
  <div style="padding:1.5rem 1rem;text-align:center">
    <div style="font-size:4rem;margin-bottom:.5rem" id="resultEmoji">🎉</div>
    <div style="font-family:'Fredoka One',cursive;font-size:1.4rem;margin-bottom:.3rem" id="resultTitle"></div>
    <div style="font-size:.8rem;color:var(--muted)" id="resultSub"></div>
    <div class="result-ring" id="resultRing">
      <div class="result-pct" id="resultPct">0%</div>
      <div style="font-size:.65rem;margin-top:.2rem" id="resultLbl"></div>
    </div>
  </div>
  <div class="result-breakdown">
    <div class="result-row"><span>✅ Sirrii</span><span id="rCorrect" style="color:#10B981;font-weight:700">0</span></div>
    <div class="result-row"><span>❌ Dogoggora</span><span id="rWrong" style="color:#EF4444;font-weight:700">0</span></div>
    <div class="result-row"><span>⏱ Yeroo</span><span id="rTime" style="color:#F59E0B;font-weight:700">0s</span></div>
    <div class="result-row"><span>⚡ XP argatte</span><span id="rXP" style="color:#9B6FFF;font-weight:700">+0</span></div>
  </div>
  <div style="padding:0 1rem;display:flex;flex-direction:column;gap:.5rem">
    <button class="btn btn-gold" id="retryBtn">↺ Irra deebi'i</button>
    <button class="btn btn-secondary" onclick="showScreen('s-levels')">← Deebi'i</button>
  </div>
</div>

<div class="toast-el" id="toastEl"></div>

<script>
'use strict';

// ══ PROFETEN ══
const PROPHETS = [
  {num:1,  name:"Muhammad ﷺ",    color:"#1E3D2F", unlocked:true},
  {num:2,  name:"Isa (A.S)",      color:"#4A6FA5", unlocked:false},
  {num:3,  name:"Adam (A.S)",     color:"#2A5C91", unlocked:false},
  {num:4,  name:"Idris (A.S)",    color:"#70675B", unlocked:false},
  {num:5,  name:"Nuh (A.S)",      color:"#2D5A47", unlocked:false},
  {num:6,  name:"Hud (A.S)",      color:"#5C6B73", unlocked:false},
  {num:7,  name:"Salih (A.S)",    color:"#E09F67", unlocked:false},
  {num:8,  name:"Ibrahim (A.S)",  color:"#5B7053", unlocked:false},
  {num:9,  name:"Lut (A.S)",      color:"#8C7A6B", unlocked:false},
  {num:10, name:"Isma'il (A.S)",  color:"#4A6B6C", unlocked:false},
  {num:11, name:"Ishaq (A.S)",    color:"#6B5B7B", unlocked:false},
  {num:12, name:"Ya'qub (A.S)",   color:"#34557B", unlocked:false},
  {num:13, name:"Yusuf (A.S)",    color:"#8D5B4C", unlocked:false},
  {num:14, name:"Ayyub (A.S)",    color:"#6C5B7B", unlocked:false},
  {num:15, name:"Shuayb (A.S)",   color:"#D9B46E", unlocked:false},
  {num:16, name:"Musa (A.S)",     color:"#A67A53", unlocked:false},
  {num:17, name:"Harun (A.S)",    color:"#8B9A46", unlocked:false},
  {num:18, name:"Dhul-Kifl (A.S)",color:"#7A53A6", unlocked:false},
  {num:19, name:"Dawud (A.S)",    color:"#2E5B70", unlocked:false},
  {num:20, name:"Sulayman (A.S)", color:"#B38B46", unlocked:false},
  {num:21, name:"Ilyas (A.S)",    color:"#4E7051", unlocked:false},
  {num:22, name:"Al-Yasa (A.S)",  color:"#526E7A", unlocked:false},
  {num:23, name:"Yunus (A.S)",    color:"#3E5F66", unlocked:false},
  {num:24, name:"Zakariya (A.S)", color:"#7A4F51", unlocked:false},
  {num:25, name:"Yahya (A.S)",    color:"#5F4B7A", unlocked:false},
];

// ══ QUIZ DATA ══
// Voeg jouw vragen hier toe per profeet en boqonnaa
// Format: QUIZ_DATA[prophetNum][boqonnaaNum] = {title, questions:[{q,opts,ans,expl}x20]}
const QUIZ_DATA = {};

// Muhammad ﷺ — 30 boqonnaa klaar gezet
QUIZ_DATA[1] = {};
for(let i=1;i<=30;i++){
  QUIZ_DATA[1][i] = {
    title: `Boqonnaa ${i}`,
    questions: [] // ← Jij voegt hier 20 vragen in
    // Format:
    // {q:"Gaaffii?", opts:["A","B","C","D"], ans:0, expl:"Ibsa..."},
  };
}

// ══ STATE ══
let currentProphet=1, currentBoqonnaa=1;
let quizQs=[], quizIdx=0, quizScore=0;
let quizTimer=null, quizTimeLeft=20, quizStartTime=0, quizAnswered=false;
let progress=JSON.parse(localStorage.getItem('tf_sq5_prog')||'{}');

function saveProgress(p,b,done){
  const key=p+'_'+b;
  if(!progress[key]) progress[key]={done:false,score:0};
  if(done) progress[key].done=true;
  localStorage.setItem('tf_sq5_prog',JSON.stringify(progress));
}

function showScreen(id){
  document.querySelectorAll('.scr').forEach(s=>{s.classList.remove('on');s.style.display='';});
  const el=document.getElementById(id);
  el.classList.add('on');
  el.style.display='flex';
}

function goBack(){
  try {
    if(window.parent && window.parent !== window){
      // Stuur bericht naar parent
      window.parent.postMessage('go-home', '*');
    }
  } catch(e){}
  window.history.back();
}

// ══ PROFETEN LIJST ══
function buildProphetList(){
  const list=document.getElementById('prophetList');
  list.innerHTML='';
  PROPHETS.forEach(p=>{
    const locked=!p.unlocked;
    list.innerHTML+=`
      <div class="prophet-item ${locked?'locked':''}"
        style="background:${locked?'var(--card)':'rgba('+hexRgb(p.color)+',.12)'};border-color:${locked?'var(--border)':'rgba('+hexRgb(p.color)+',.35)'}"
        onclick="${locked?`showToast('🔒 Dhihotti ni banama!')`:`openProphet(${p.num})`}">
        <div class="p-avatar" style="background:${p.color}">${p.num}</div>
        <div style="flex:1">
          <div class="p-num">Nabii ${p.num}</div>
          <div class="p-name">${p.name}</div>
          <div class="p-status">${locked?'🔒 Dhihotti ni banama':'📖 Boqonnaa 30 — Jalqabi →'}</div>
        </div>
        <div style="color:var(--muted);font-size:1.1rem">${locked?'🔒':'›'}</div>
      </div>`;
  });
}

function hexRgb(hex){
  return parseInt(hex.slice(1,3),16)+','+parseInt(hex.slice(3,5),16)+','+parseInt(hex.slice(5,7),16);
}

// ══ LEVELS LIJST ══
function openProphet(num){
  currentProphet=num;
  const p=PROPHETS.find(x=>x.num===num);
  document.getElementById('levelNavTitle').textContent=p.name;
  const data=QUIZ_DATA[num]||{};
  const list=document.getElementById('levelList');
  list.innerHTML='';
  for(let i=1;i<=30;i++){
    const boq=data[i]||{title:`Boqonnaa ${i}`,questions:[]};
    const key=num+'_'+i;
    const prog=progress[key]||{};
    const done=prog.done;
    const hasQ=boq.questions&&boq.questions.length>0;
    list.innerHTML+=`
      <div class="level-item ${done?'done':''}"
        onclick="${hasQ?`startQuiz(${num},${i})`:`showToast('⏳ Gaaffiin hin guutamne — dhihotti!')`}">
        <div class="l-num ${done?'done':''}">${done?'✓':String(i).padStart(2,'0')}</div>
        <div style="flex:1">
          <div style="font-weight:600;font-size:.88rem">${boq.title}</div>
          <div style="font-size:.63rem;color:var(--muted);margin-top:.1rem">
            ${done?'✅ Xumurame':hasQ?`📝 Gaaffii ${boq.questions.length}`:'⏳ Dhihotti ni guutamu'}
          </div>
        </div>
        <div style="color:var(--muted)">›</div>
      </div>`;
  }
  showScreen('s-levels');
}

// ══ QUIZ ══
function startQuiz(prophet,boqonnaa){
  const data=QUIZ_DATA[prophet]&&QUIZ_DATA[prophet][boqonnaa];
  if(!data||!data.questions||data.questions.length===0){
    showToast('⏳ Gaaffiin hin guutamne!'); return;
  }
  currentProphet=prophet; currentBoqonnaa=boqonnaa;
  quizQs=[...data.questions].sort(()=>Math.random()-.5).slice(0,20);
  quizIdx=0; quizScore=0; quizStartTime=Date.now();
  document.getElementById('quizNavTitle').textContent=data.title;
  document.getElementById('retryBtn').onclick=()=>startQuiz(prophet,boqonnaa);
  showScreen('s-quiz');
  renderQuestion();
}

function renderQuestion(){
  const q=quizQs[quizIdx]; quizAnswered=false;
  document.getElementById('quizFill').style.width=(quizIdx/quizQs.length*100)+'%';
  document.getElementById('quizCounter').textContent=`Gaaffii ${quizIdx+1}/${quizQs.length}`;
  document.getElementById('quizScore').textContent=`✓ ${quizScore}`;
  document.getElementById('quizQNum').textContent=`Gaaffii ${quizIdx+1}`;
  document.getElementById('quizQText').textContent=q.q;
  document.getElementById('quizNextBtn').style.display='none';
  document.getElementById('quizExpl').classList.remove('show');
  const L=['A','B','C','D'];
  document.getElementById('quizOpts').innerHTML=q.opts.map((o,i)=>`
    <button class="quiz-opt" onclick="selectAnswer(${i})">
      <div class="opt-letter">${L[i]}</div><span>${o}</span>
    </button>`).join('');
  startTimer();
}

function startTimer(){
  clearInterval(quizTimer); quizTimeLeft=20; updateTimer();
  quizTimer=setInterval(()=>{quizTimeLeft--;updateTimer();if(quizTimeLeft<=0){clearInterval(quizTimer);timeUp();}},1000);
}

function updateTimer(){
  const el=document.getElementById('quizTimer');
  el.textContent='⏱ '+quizTimeLeft;
  el.className='quiz-timer'+(quizTimeLeft<=5?' urgent':'');
}

function timeUp(){
  if(quizAnswered)return; quizAnswered=true;
  const q=quizQs[quizIdx];
  document.querySelectorAll('.quiz-opt').forEach((b,i)=>{if(i===q.ans)b.classList.add('correct');});
  if(q.expl){document.getElementById('quizExplText').textContent=q.expl;document.getElementById('quizExpl').classList.add('show');}
  document.getElementById('quizNextBtn').style.display='block';
  document.getElementById('quizNextBtn').textContent=quizIdx+1<quizQs.length?'Itti fufi →':'Firii Ilaali 📊';
}

function selectAnswer(idx){
  if(quizAnswered)return; quizAnswered=true; clearInterval(quizTimer);
  const q=quizQs[quizIdx];
  document.querySelectorAll('.quiz-opt').forEach((b,i)=>{
    if(i===q.ans)b.classList.add('correct');
    else if(i===idx&&idx!==q.ans)b.classList.add('wrong');
  });
  if(idx===q.ans){quizScore++;document.getElementById('quizScore').textContent='✓ '+quizScore;}
  if(q.expl){document.getElementById('quizExplText').textContent=q.expl;document.getElementById('quizExpl').classList.add('show');}
  document.getElementById('quizNextBtn').style.display='block';
  document.getElementById('quizNextBtn').textContent=quizIdx+1<quizQs.length?'Itti fufi →':'Firii Ilaali 📊';
}

function quizNext(){
  quizIdx++;
  if(quizIdx>=quizQs.length){showResult();return;}
  renderQuestion();
}

function showResult(){
  clearInterval(quizTimer);
  const total=quizQs.length, pct=Math.round(quizScore/total*100);
  const timeSpent=Math.round((Date.now()-quizStartTime)/1000);
  const xp=quizScore*10+(pct>=60?20:0);
  saveProgress(currentProphet,currentBoqonnaa,pct>=60);
  document.getElementById('resultPct').textContent=pct+'%';
  document.getElementById('rCorrect').textContent=quizScore;
  document.getElementById('rWrong').textContent=total-quizScore;
  document.getElementById('rTime').textContent=timeSpent+'s';
  document.getElementById('rXP').textContent='+'+xp+' XP';
  let emoji,title,sub,color;
  if(pct>=90){emoji='🏆';title="Baayyee Gaarii!";sub="Ulfaataa! Deebii hundaa beekta!";color='#10B981';}
  else if(pct>=60){emoji='✅';title="Darbe!";sub="Boqonnaa itti aanutti ce'uu dandeessa";color='#9B6FFF';}
  else{emoji='📚';title="Irra deebi'i!";sub="Irra deebi'i baradhu";color='#F59E0B';}
  document.getElementById('resultEmoji').textContent=emoji;
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultSub').textContent=sub;
  document.getElementById('resultRing').style.borderColor=color;
  document.getElementById('resultPct').style.color=color;
  document.getElementById('resultLbl').textContent=`${quizScore}/${total} sirrii`;
  if(pct>=60) spawnConfetti();
  showScreen('s-result');
  openProphet(currentProphet);
}

function spawnConfetti(){
  const C=['#C9982A','#9B6FFF','#10B981','#60A5FA','#F87171'];
  for(let i=0;i<50;i++){setTimeout(()=>{const c=document.createElement('div');c.className='cf';const s=Math.random()*8+4;c.style.cssText=`width:${s}px;height:${s}px;background:${C[Math.floor(Math.random()*C.length)]};left:${Math.random()*100}vw;top:-10px;animation-duration:${Math.random()*2+1.5}s`;document.body.appendChild(c);setTimeout(()=>c.remove(),3500);},i*25);}
}

function showToast(msg){
  const t=document.getElementById('toastEl');t.textContent=msg;t.classList.add('show');
  clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),2000);
}

buildProphetList();
