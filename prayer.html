<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Prayer Times — Tolaanfur</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#060818;--text:#EEF2FF;--muted:rgba(238,242,255,.45);--border:rgba(100,140,255,.18);--card:rgba(20,30,100,.4);--gold:#F59E0B;--gr:#10B981}
body{background:var(--bg);color:var(--text);font-family:Inter,sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.page{display:none;flex-direction:column;height:100vh;overflow:hidden}
.page.on{display:flex}
.nav{background:rgba(6,8,24,.98);border-bottom:1px solid var(--border);padding:max(env(safe-area-inset-top),.75rem) 1rem .65rem;display:flex;align-items:center;gap:.65rem;flex-shrink:0}
.back{width:2.2rem;height:2.2rem;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.ttl{font-family:'Fredoka One',cursive;font-size:1rem;flex:1}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1rem 1rem 2rem}
.btn{border:none;border-radius:.85rem;padding:.7rem 1.2rem;font-family:'Fredoka One',cursive;font-size:.9rem;cursor:pointer;width:100%;margin-top:.5rem}
.btn:active{opacity:.8}
.bp{background:linear-gradient(135deg,#6B3FFF,#9B6FFF);color:#fff}
.bs{background:var(--card);border:1px solid var(--border);color:var(--text)}
.bg{background:linear-gradient(135deg,#065f46,#10B981);color:#fff}
.card{background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:1rem;margin-bottom:.75rem}
.prayer-row{display:flex;align-items:center;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid var(--border)}
.prayer-row:last-child{border-bottom:none}
.prayer-row.next{background:rgba(16,185,129,.08);border-radius:.5rem;padding:.6rem .5rem;margin:0 -.5rem;border-bottom:none}
.prayer-name{font-weight:600;font-size:.9rem}
.prayer-time{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--gold)}
.compass-ring{width:12rem;height:12rem;border-radius:50%;border:3px solid rgba(100,140,255,.3);display:flex;align-items:center;justify-content:center;margin:1rem auto;position:relative;background:rgba(20,30,100,.3)}
#toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff;padding:.45rem 1.1rem;border-radius:2rem;font-size:.82rem;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
</style>
</head>
<body>

<!-- PRAYER TIMES -->
<div class="page on" id="p-prayer">
  <div class="nav">
    <div class="back" onclick="goBack()">←</div>
    <div class="ttl">🕌 Prayer Times</div>
  </div>
  <div class="scroll">
    <!-- Location -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">
        <div>
          <div style="font-family:'Fredoka One',cursive;font-size:.95rem" id="city-name">No location yet</div>
          <div style="font-size:.7rem;color:var(--muted)" id="method-name"></div>
        </div>
        <button class="btn bp" style="width:auto;margin:0;padding:.5rem .85rem;font-size:.8rem" onclick="getLocation()">📍 Get Location</button>
      </div>
    </div>
    <!-- Prayer times -->
    <div class="card" id="prayer-list">
      <div style="text-align:center;padding:1rem;color:var(--muted);font-size:.85rem">
        Tap "Get Location" to load prayer times
      </div>
    </div>
    <!-- Next prayer -->
    <div class="card" id="next-prayer" style="display:none">
      <div style="font-size:.72rem;color:var(--muted);margin-bottom:.3rem">NEXT PRAYER</div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="font-family:'Fredoka One',cursive;font-size:1.1rem" id="next-name"></div>
        <div style="font-family:'Fredoka One',cursive;font-size:1.3rem;color:var(--gr)" id="next-time"></div>
      </div>
      <div style="font-size:.72rem;color:var(--muted);margin-top:.2rem" id="next-countdown"></div>
    </div>
    <!-- Qibla button -->
    <div onclick="goPage('p-qibla')" style="background:linear-gradient(135deg,rgba(217,119,6,.15),rgba(245,158,11,.08));border:1.5px solid rgba(245,158,11,.4);border-radius:1rem;padding:.85rem 1rem;display:flex;align-items:center;gap:.85rem;cursor:pointer;margin-bottom:.75rem">
      <div style="width:2.8rem;height:2.8rem;border-radius:50%;background:linear-gradient(135deg,#92400E,#D97706);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0">🧭</div>
      <div style="flex:1">
        <div style="font-weight:700;font-size:.9rem;color:#FCD34D">Qibla Direction</div>
        <div style="font-size:.68rem;color:rgba(252,211,77,.6);margin-top:.1rem">Find the direction of Ka'bah</div>
      </div>
      <div style="color:#F59E0B">›</div>
    </div>
  </div>
</div>

<!-- QIBLA -->
<div class="page" id="p-qibla">
  <div class="nav">
    <div class="back" onclick="goPage('p-prayer')">←</div>
    <div class="ttl">🧭 Qibla Direction</div>
  </div>
  <div class="scroll" style="text-align:center">
    <div id="qibla-status" style="color:var(--muted);font-size:.85rem;margin-bottom:1rem">
      Getting location and compass...
    </div>
    <div class="compass-ring" id="compass-ring">
      <div id="compass-needle" style="font-size:3rem;transition:transform .3s">🕌</div>
    </div>
    <div style="font-family:'Fredoka One',cursive;font-size:1.1rem;margin:.75rem 0" id="qibla-deg"></div>
    <div style="font-size:.8rem;color:var(--muted);margin-bottom:1rem">Point the 🕌 towards Makkah</div>
    <button class="btn bp" onclick="startQibla()">🔄 Recalibrate</button>
  </div>
</div>

<div id="toast"></div>

<script>
var PS = {};
try { PS = JSON.parse(localStorage.getItem('tf9_ps') || '{}'); } catch(e) {}

var compassWatch = null;
var qiblaAngle = 0;

function goBack(){
  try{ if(window.parent&&window.parent!==window)window.parent.postMessage('go-home','*'); }catch(e){}
}

function goPage(id){
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('on'); });
  document.getElementById(id).classList.add('on');
  if(id === 'p-qibla') startQibla();
}

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._tt);
  window._tt = setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

function savPS(){ try{ localStorage.setItem('tf9_ps', JSON.stringify(PS)); }catch(e){} }

// ══ PRAYER TIMES ══
var PRAYERS = ['Fajr','Sunrise','Dhuhr','Asr','Maghrib','Isha'];

function getLocation(){
  if(!navigator.geolocation){ showToast('GPS not available'); return; }
  showToast('📍 Getting location...');
  navigator.geolocation.getCurrentPosition(function(pos){
    var lat = pos.coords.latitude;
    var lng = pos.coords.longitude;
    PS.loc = {lat:lat, lng:lng};
    
    // Qibla angle
    var kLat = 21.4225 * Math.PI/180;
    var kLng = 39.8262 * Math.PI/180;
    var myLat = lat * Math.PI/180;
    var dLng = kLng - (lng * Math.PI/180);
    qiblaAngle = ((Math.atan2(Math.sin(dLng)*Math.cos(kLat), Math.cos(myLat)*Math.sin(kLat) - Math.sin(myLat)*Math.cos(kLat)*Math.cos(dLng)) * 180/Math.PI) + 360) % 360;
    PS.qiblah = qiblaAngle;
    
    // Get city name
    fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lng)
      .then(function(r){ return r.json(); })
      .then(function(d){
        PS.city = d.address && (d.address.city || d.address.town || d.address.village || d.address.municipality) || 'Your location';
        document.getElementById('city-name').textContent = PS.city;
        savPS();
      }).catch(function(){
        PS.city = 'Your location';
        document.getElementById('city-name').textContent = PS.city;
      });
    
    // Fetch prayer times
    showToast('⏳ Loading prayer times...');
    var today = new Date();
    var ds = today.getDate()+'-'+(today.getMonth()+1)+'-'+today.getFullYear();
    var method = 3;
    var url = 'https://api.aladhan.com/v1/timings/'+ds+'?latitude='+lat+'&longitude='+lng+'&method='+method;
    
    fetch(url)
      .then(function(r){ return r.json(); })
      .then(function(data){
        if(data.data && data.data.timings){
          PS.times = data.data.timings;
          savPS();
          renderPrayerTimes();
          showToast('✅ Prayer times updated!');
        }
      })
      .catch(function(){
        showToast('❌ Could not load prayer times');
      });
      
  }, function(err){
    showToast('❌ Location failed: ' + err.message);
  });
}

function renderPrayerTimes(){
  var times = PS.times;
  if(!times){ return; }
  
  if(PS.city) document.getElementById('city-name').textContent = PS.city;
  
  var now = new Date();
  var nowMin = now.getHours()*60 + now.getMinutes();
  var nextPrayer = null;
  var nextMin = 9999;
  
  var html = '';
  PRAYERS.forEach(function(name){
    var time = times[name];
    if(!time) return;
    var parts = time.split(':');
    var pMin = parseInt(parts[0])*60 + parseInt(parts[1]);
    var isNext = pMin > nowMin && pMin < nextMin;
    if(isNext){ nextMin = pMin; nextPrayer = {name:name, time:time, min:pMin}; }
    
    html += '<div class="prayer-row' + (isNext?' next':'') + '">';
    html += '<div><div class="prayer-name">' + (isNext?'🕌 ':'') + name + '</div></div>';
    html += '<div class="prayer-time">' + time + '</div>';
    html += '</div>';
  });
  
  document.getElementById('prayer-list').innerHTML = html;
  
  if(nextPrayer){
    var diff = nextPrayer.min - nowMin;
    var hrs = Math.floor(diff/60);
    var mins = diff%60;
    document.getElementById('next-name').textContent = nextPrayer.name;
    document.getElementById('next-time').textContent = nextPrayer.time;
    document.getElementById('next-countdown').textContent = 'In ' + (hrs>0?hrs+'h ':'') + mins + ' min';
    document.getElementById('next-prayer').style.display = 'block';
  }
}

// ══ QIBLA ══
function startQibla(){
  var status = document.getElementById('qibla-status');
  
  if(!PS.loc){
    status.textContent = 'Getting location...';
    navigator.geolocation.getCurrentPosition(function(pos){
      var lat = pos.coords.latitude;
      var lng = pos.coords.longitude;
      var kLat = 21.4225 * Math.PI/180;
      var kLng = 39.8262 * Math.PI/180;
      var myLat = lat * Math.PI/180;
      var dLng = kLng - (lng * Math.PI/180);
      qiblaAngle = ((Math.atan2(Math.sin(dLng)*Math.cos(kLat), Math.cos(myLat)*Math.sin(kLat) - Math.sin(myLat)*Math.cos(kLat)*Math.cos(dLng)) * 180/Math.PI) + 360) % 360;
      PS.loc = {lat:lat, lng:lng};
      PS.qiblah = qiblaAngle;
      savPS();
      startCompass();
    }, function(){
      status.textContent = 'Location access denied. Enable GPS.';
    });
  } else {
    qiblaAngle = PS.qiblah || 0;
    startCompass();
  }
}

function startCompass(){
  var status = document.getElementById('qibla-status');
  var deg = document.getElementById('qibla-deg');
  
  if(typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function'){
    DeviceOrientationEvent.requestPermission().then(function(perm){
      if(perm === 'granted'){
        listenCompass();
      } else {
        status.textContent = 'Compass permission denied';
        showStaticQibla();
      }
    }).catch(function(){
      showStaticQibla();
    });
  } else if(window.DeviceOrientationEvent){
    listenCompass();
  } else {
    showStaticQibla();
  }
}

function listenCompass(){
  var status = document.getElementById('qibla-status');
  var needle = document.getElementById('compass-needle');
  var deg = document.getElementById('qibla-deg');
  status.textContent = 'Compass active — point towards Makkah';
  
  window.addEventListener('deviceorientation', function(e){
    var heading = e.webkitCompassHeading || (e.alpha ? (360 - e.alpha) : 0);
    var rotation = qiblaAngle - heading;
    needle.style.transform = 'rotate(' + rotation + 'deg)';
    var diff = ((qiblaAngle - heading) + 360) % 360;
    var dir = diff < 180 ? Math.round(diff) + '° right' : Math.round(360-diff) + '° left';
    deg.textContent = 'Qibla: ' + Math.round(qiblaAngle) + '° | ' + dir;
  });
}

function showStaticQibla(){
  var status = document.getElementById('qibla-status');
  var deg = document.getElementById('qibla-deg');
  status.textContent = 'Compass not available on this device';
  deg.textContent = 'Qibla direction: ' + Math.round(qiblaAngle) + '° from North';
  var needle = document.getElementById('compass-needle');
  needle.style.transform = 'rotate(' + qiblaAngle + 'deg)';
}

// ══ INIT ══
if(PS.times) renderPrayerTimes();
if(PS.city) document.getElementById('city-name').textContent = PS.city;
</script>
</body>
</html>
