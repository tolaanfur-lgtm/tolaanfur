<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Community — Tolaanfur</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#060818;--text:#EEF2FF;--muted:rgba(238,242,255,.45);--border:rgba(100,140,255,.18);--card:rgba(20,30,100,.4);--gold:#F59E0B;--gr:#10B981;--pu:#6B3FFF}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;overflow:hidden}

/* Screens */
.scr{position:fixed;inset:0;display:none;flex-direction:column}
.scr.on{display:flex}

/* Nav */
.nav{background:rgba(6,8,24,.98);border-bottom:1px solid var(--border);padding:max(env(safe-area-inset-top),.75rem) 1rem .65rem;display:flex;align-items:center;gap:.65rem;flex-shrink:0;z-index:10}
.nav-back{width:2.2rem;height:2.2rem;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.9rem;cursor:pointer;flex-shrink:0}
.nav-title{font-family:'Fredoka One',cursive;font-size:1rem;flex:1}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:rgba(6,8,24,.9)}
.tab{flex:1;padding:.65rem;text-align:center;font-size:.78rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
.tab.on{color:var(--text);border-bottom-color:#6B3FFF}

/* Scroll area */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:1rem}

/* Buttons */
.btn{border:none;border-radius:.75rem;padding:.65rem 1rem;font-family:'Fredoka One',cursive;font-size:.85rem;cursor:pointer}
.btn:active{opacity:.8}
.btn-primary{background:linear-gradient(135deg,#6B3FFF,#9B6FFF);color:#fff}
.btn-secondary{background:var(--card);border:1px solid var(--border);color:var(--text)}
.btn-green{background:linear-gradient(135deg,#065f46,#10B981);color:#fff}
.btn-red{background:rgba(244,63,94,.15);border:1px solid rgba(244,63,94,.3);color:#F87171}
.btn-sm{padding:.4rem .75rem;font-size:.75rem;border-radius:.6rem}

/* Group cards */
.group-card{background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:.9rem;margin:.4rem .75rem}
.group-icon{width:2.8rem;height:2.8rem;border-radius:.75rem;background:linear-gradient(135deg,#4C1D95,#6B3FFF);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}

/* Chat */
.chat-messages{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:.75rem;display:flex;flex-direction:column;gap:.6rem}
.chat-bottom{padding:.6rem .75rem max(env(safe-area-inset-bottom),.75rem);border-top:1px solid var(--border);background:rgba(6,8,24,.98);display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.chat-inp{flex:1;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:1.5rem;padding:.6rem 1rem;font-size:.88rem;color:var(--text);font-family:'Inter',sans-serif;outline:none;min-height:2.4rem}
.chat-inp:focus{border-color:#6B3FFF}
.send-btn{width:2.5rem;height:2.5rem;min-width:2.5rem;border-radius:50%;background:linear-gradient(135deg,#6B3FFF,#9B6FFF);border:none;color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.send-btn:active{opacity:.8}

/* Messages */
.msg{display:flex;gap:.5rem;align-items:flex-end;max-width:88%}
.msg.me{align-self:flex-end;flex-direction:row-reverse}
.msg.them{align-self:flex-start}
.avatar{width:1.8rem;height:1.8rem;min-width:1.8rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700}
.bubble{padding:.5rem .8rem;border-radius:1rem;font-size:.85rem;line-height:1.5;word-break:break-word;max-width:100%}
.bubble.me{background:linear-gradient(135deg,#6B3FFF,#9B6FFF);color:#fff;border-bottom-right-radius:.2rem}
.bubble.them{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:.2rem}
.msg-meta{font-size:.6rem;color:var(--muted);margin-top:.2rem;text-align:right}

/* Input form */
.inp{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:.75rem;padding:.65rem .9rem;font-size:.88rem;color:var(--text);font-family:'Inter',sans-serif;outline:none;margin-bottom:.5rem}
.inp:focus{border-color:#6B3FFF}
textarea.inp{resize:none;height:4.5rem}

/* Leaderboard */
.lb-item{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-bottom:1px solid var(--border)}
.lb-item:last-child{border-bottom:none}

/* Toast */
#toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff;padding:.45rem 1.1rem;border-radius:2rem;font-size:.82rem;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
</style>
</head>
<body>

<!-- S1: HOME -->
<div class="scr on" id="s-home">
  <div class="nav">
    <div class="nav-back" onclick="goBack()">←</div>
    <div class="nav-title">🌐 Community</div>
    <button class="btn btn-primary btn-sm" onclick="show('s-create')">+ New</button>
  </div>
  <div class="tabs">
    <div class="tab on" id="tab-groups" onclick="switchTab('groups')">👥 Groups</div>
    <div class="tab" id="tab-lb" onclick="switchTab('lb')">🏆 Leaderboard</div>
  </div>
  <div class="scroll" id="tab-content"></div>
</div>

<!-- S2: CHAT -->
<div class="scr" id="s-chat">
  <div class="nav">
    <div class="nav-back" onclick="show('s-home')">←</div>
    <div style="flex:1">
      <div class="nav-title" id="chat-title">Chat</div>
      <div style="font-size:.62rem;color:var(--muted)" id="chat-sub"></div>
    </div>
  </div>
  <div class="chat-messages" id="chat-msgs">
    <div style="text-align:center;padding:2rem;color:var(--muted);font-size:.82rem">No messages yet 👋</div>
  </div>
  <div class="chat-bottom">
    <input class="chat-inp" id="chat-input" type="text" placeholder="Type a message..." maxlength="500"
      onkeypress="if(event.key==='Enter'){sendMsg();return false;}"/>
    <button class="send-btn" onclick="sendMsg()">➤</button>
  </div>
</div>

<!-- S3: CREATE -->
<div class="scr" id="s-create">
  <div class="nav">
    <div class="nav-back" onclick="show('s-home')">←</div>
    <div class="nav-title">➕ Create Group</div>
  </div>
  <div style="padding:1rem;overflow-y:auto">
    <div style="font-size:.75rem;color:var(--muted);margin-bottom:.25rem">Group Name *</div>
    <input class="inp" id="g-name" placeholder="e.g. Quran Circle" maxlength="50"/>
    <div style="font-size:.75rem;color:var(--muted);margin-bottom:.25rem">Description</div>
    <textarea class="inp" id="g-desc" placeholder="What is this group about?"></textarea>
    <div style="font-size:.75rem;color:var(--muted);margin-bottom:.25rem">Category</div>
    <select class="inp" id="g-cat">
      <option value="quran">📖 Quran</option>
      <option value="hadith">📚 Hadith</option>
      <option value="sirah">🕌 Sirah</option>
      <option value="fiqh">⚖️ Fiqh</option>
      <option value="general">💬 General</option>
    </select>
    <div style="display:flex;gap:.5rem;margin-top:.5rem">
      <button class="btn btn-secondary" style="flex:1" onclick="show('s-home')">Cancel</button>
      <button class="btn btn-primary" style="flex:2" onclick="createGroup()">Create</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
var CFG = {
  apiKey:"AIzaSyD4o7SprtOMn7F4iFjVmPB37C1Tf7mICDk",
  authDomain:"tolaanfur-5b5f5.firebaseapp.com",
  projectId:"tolaanfur-5b5f5",
  storageBucket:"tolaanfur-5b5f5.firebasestorage.app",
  messagingSenderId:"188890145767",
  appId:"1:188890145767:web:6ec8fe6fae4ddd90891342"
};

// Init Firebase veilig
var fbApp = firebase.apps.length > 0 ? firebase.apps[0] : firebase.initializeApp(CFG);
var db = fbApp.firestore();
var auth = fbApp.auth();

var me = null;
var myProfile = null;
var currentTab = 'groups';
var activeGid = null;
var msgUnsub = null;
var groups = [];

var COLORS = ['#6B3FFF','#059669','#2563EB','#DC2626','#D97706','#7C3AED','#0891B2','#BE185D'];
var CAT_ICONS = {quran:'📖',hadith:'📚',sirah:'🕌',fiqh:'⚖️',general:'💬'};

function show(id) {
  document.querySelectorAll('.scr').forEach(function(s){
    s.classList.remove('on');
    s.style.display = '';
  });
  var el = document.getElementById(id);
  el.classList.add('on');
  el.style.display = 'flex';
  if(id === 's-home') renderTab();
}

function goBack() {
  try {
    if(window.parent && window.parent !== window) {
      window.parent.postMessage('go-home','*');
    }
  } catch(e) {}
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._tt);
  window._tt = setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

// ══ TABS ══
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-groups').classList.toggle('on', tab==='groups');
  document.getElementById('tab-lb').classList.toggle('on', tab==='lb');
  renderTab();
}

function renderTab() {
  if(currentTab === 'groups') renderGroups();
  else renderLeaderboard();
}

// ══ GROUPS ══
function renderGroups() {
  var c = document.getElementById('tab-content');
  if(!me) {
    c.innerHTML = '<div style="text-align:center;padding:3rem 1rem;color:var(--muted)"><div style="font-size:2.5rem;margin-bottom:.5rem">🔒</div><div>Please login to see groups</div></div>';
    return;
  }
  if(groups.length === 0) {
    c.innerHTML = '<div style="text-align:center;padding:3rem 1rem;color:var(--muted)"><div style="font-size:2.5rem;margin-bottom:.5rem">👥</div><div style="font-family:Fredoka One,cursive;font-size:1rem;color:var(--text);margin-bottom:.3rem">No groups yet</div><div style="font-size:.8rem">Be the first to create one!</div></div>';
    return;
  }
  c.innerHTML = groups.map(function(g) {
    var isMember = (g.members||[]).indexOf(me.uid) >= 0;
    var count = (g.members||[]).length;
    var icon = CAT_ICONS[g.category] || '💬';
    return '<div class="group-card">'
      + '<div style="display:flex;align-items:flex-start;gap:.75rem">'
      + '<div class="group-icon">' + icon + '</div>'
      + '<div style="flex:1">'
      + '<div style="font-weight:700;font-size:.92rem">' + (g.name||'Group') + '</div>'
      + '<div style="font-size:.72rem;color:var(--muted);margin-top:.15rem">' + (g.description||'') + '</div>'
      + '<div style="font-size:.65rem;color:var(--muted);margin-top:.25rem">👥 ' + count + ' member' + (count!==1?'s':'') + '</div>'
      + '</div></div>'
      + '<div style="display:flex;gap:.5rem;margin-top:.75rem">'
      + (isMember
        ? '<button class="btn btn-primary btn-sm" style="flex:2" onclick="openChat(\'' + g.id + '\')">💬 Chat</button>'
          + '<button class="btn btn-red btn-sm" style="flex:1" onclick="leaveGroup(\'' + g.id + '\')">Leave</button>'
        : '<button class="btn btn-green btn-sm" style="flex:1" onclick="joinGroup(\'' + g.id + '\')">Join</button>'
          + '<button class="btn btn-secondary btn-sm" style="flex:2" onclick="openChat(\'' + g.id + '\')">👁 View</button>'
      )
      + '</div></div>';
  }).join('');
}

// ══ LEADERBOARD ══
function renderLeaderboard() {
  var c = document.getElementById('tab-content');
  c.innerHTML = '<div style="text-align:center;padding:1.5rem;color:var(--muted);font-size:.8rem">Loading...</div>';
  db.collection('users').orderBy('xp','desc').limit(10).get().then(function(snap) {
    if(snap.empty) {
      c.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted)">No data yet</div>';
      return;
    }
    var medals = ['🥇','🥈','🥉'];
    var html = '<div style="background:var(--card);border:1px solid var(--border);border-radius:1rem;margin:.75rem;overflow:hidden">';
    snap.docs.forEach(function(d, i) {
      var u = d.data();
      var isMe = d.id === (me && me.uid);
      var xp = u.xp || 0;
      var lvl = Math.floor(xp/100) + 1;
      var bg = COLORS[u.avatarColor||0] || '#6B3FFF';
      var initials = (u.displayName||u.username||'U').substring(0,2).toUpperCase();
      html += '<div class="lb-item" style="' + (isMe?'background:rgba(107,63,255,.08)':'') + '">'
        + '<div style="width:2rem;text-align:center;font-family:Fredoka One,cursive;font-size:1rem">' + (i<3?medals[i]:'#'+(i+1)) + '</div>'
        + '<div style="width:2.4rem;height:2.4rem;border-radius:50%;background:' + bg + ';display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;flex-shrink:0">' + initials + '</div>'
        + '<div style="flex:1">'
        + '<div style="font-weight:600;font-size:.88rem">' + (u.displayName||u.username||'User') + (isMe?' <span style="font-size:.65rem;color:#9B6FFF">(you)</span>':'') + '</div>'
        + '<div style="font-size:.65rem;color:var(--muted)">Level ' + lvl + '</div>'
        + '</div>'
        + '<div style="font-family:Fredoka One,cursive;color:#F59E0B">' + xp + ' XP</div>'
        + '</div>';
    });
    html += '</div>';
    c.innerHTML = html;
  }).catch(function() {
    c.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted)">Could not load leaderboard</div>';
  });
}

// ══ JOIN / LEAVE ══
function joinGroup(gid) {
  if(!me) { showToast('🔒 Login required'); return; }
  db.collection('groups').doc(gid).update({
    members: firebase.firestore.FieldValue.arrayUnion(me.uid)
  }).then(function() {
    showToast('✅ Joined!');
  }).catch(function() {
    showToast('❌ Failed to join');
  });
}

function leaveGroup(gid) {
  if(!me) return;
  db.collection('groups').doc(gid).update({
    members: firebase.firestore.FieldValue.arrayRemove(me.uid)
  }).then(function() {
    showToast('👋 Left group');
  }).catch(function() {
    showToast('❌ Failed to leave');
  });
}

// ══ CREATE GROUP ══
function createGroup() {
  var name = document.getElementById('g-name').value.trim();
  var desc = document.getElementById('g-desc').value.trim();
  var cat = document.getElementById('g-cat').value;
  if(!name) { showToast('⚠️ Enter a group name'); return; }
  if(!me) { showToast('🔒 Login required'); return; }
  db.collection('groups').add({
    name: name,
    description: desc,
    category: cat,
    createdBy: me.uid,
    createdAt: Date.now(),
    members: [me.uid]
  }).then(function() {
    showToast('🎉 Group created!');
    document.getElementById('g-name').value = '';
    document.getElementById('g-desc').value = '';
    show('s-home');
  }).catch(function() {
    showToast('❌ Failed to create');
  });
}

// ══ CHAT ══
function openChat(gid) {
  var g = groups.find(function(x){ return x.id === gid; });
  if(!g) return;
  activeGid = gid;
  var isMember = (g.members||[]).indexOf(me && me.uid) >= 0;
  document.getElementById('chat-title').textContent = g.name;
  document.getElementById('chat-sub').textContent = (g.members||[]).length + ' members';
  
  // Input
  var inp = document.getElementById('chat-input');
  inp.disabled = !isMember;
  inp.placeholder = isMember ? 'Type a message...' : 'Join to send messages';
  
  show('s-chat');
  loadMsgs(gid);
}

function loadMsgs(gid) {
  if(msgUnsub) { msgUnsub(); msgUnsub = null; }
  var wrap = document.getElementById('chat-msgs');
  wrap.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted);font-size:.82rem">Loading...</div>';
  
  msgUnsub = db.collection('groups').doc(gid)
    .collection('messages')
    .orderBy('ts','asc')
    .limitToLast(50)
    .onSnapshot(function(snap) {
      if(snap.empty) {
        wrap.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted);font-size:.82rem">No messages yet. Say hello! 👋</div>';
        return;
      }
      var html = '';
      snap.docs.forEach(function(d) {
        var m = d.data();
        var isMe = m.uid === (me && me.uid);
        var bg = COLORS[m.avatarColor||0] || '#6B3FFF';
        var initials = (m.displayName||'U').substring(0,2).toUpperCase();
        var ts = m.ts;
        var time = '';
        if(ts) {
          var date = ts.toDate ? ts.toDate() : new Date(ts);
          time = date.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
        }
        html += '<div class="msg ' + (isMe?'me':'them') + '">';
        if(!isMe) html += '<div class="avatar" style="background:' + bg + '">' + initials + '</div>';
        html += '<div>'
          + (isMe ? '' : '<div style="font-size:.62rem;color:var(--muted);margin-bottom:.2rem">' + (m.displayName||'User') + '</div>')
          + '<div class="bubble ' + (isMe?'me':'them') + '">' + m.text + '</div>'
          + '<div class="msg-meta">' + time + '</div>'
          + '</div></div>';
      });
      wrap.innerHTML = html;
      wrap.scrollTop = wrap.scrollHeight;
    }, function() {
      wrap.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted);font-size:.82rem">❌ Could not load messages</div>';
    });
}

function sendMsg() {
  var inp = document.getElementById('chat-input');
  var text = (inp.value||'').trim();
  if(!text || !me || !activeGid) return;
  
  var g = groups.find(function(x){ return x.id === activeGid; });
  if(!g || (g.members||[]).indexOf(me.uid) < 0) {
    showToast('⚠️ Join the group first');
    return;
  }
  
  inp.value = '';
  db.collection('groups').doc(activeGid).collection('messages').add({
    uid: me.uid,
    displayName: (myProfile && (myProfile.displayName||myProfile.username)) || me.email.split('@')[0] || 'User',
    avatarColor: (myProfile && myProfile.avatarColor) || 0,
    text: text,
    ts: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(function() {
    showToast('❌ Failed to send');
    inp.value = text;
  });
}

// ══ INIT ══
auth.onAuthStateChanged(function(user) {
  me = user;
  if(user && !user.isAnonymous) {
    db.collection('users').doc(user.uid).get().then(function(doc) {
      if(doc.exists) myProfile = doc.data();
    });
  }
  // Laad groepen
  db.collection('groups').onSnapshot(function(snap) {
    groups = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
    if(document.getElementById('s-home').classList.contains('on')) renderTab();
  });
});
</script>
</body>
</html>
