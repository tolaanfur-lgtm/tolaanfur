<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Quran — Tolaanfur</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Fredoka+One&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#060818;--text:#EEF2FF;--muted:rgba(238,242,255,.45);--border:rgba(100,140,255,.18);--card:rgba(20,30,100,.4);--groen:#1D8348;--goud:#E8C97A}
body{background:var(--bg);color:var(--text);font-family:Inter,sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.nav{background:rgba(6,8,24,.98);border-bottom:1px solid var(--border);padding:max(env(safe-area-inset-top),.75rem) 1rem .65rem;display:flex;align-items:center;gap:.65rem;flex-shrink:0}
.back{width:2.2rem;height:2.2rem;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.ttl{font-family:'Fredoka One',cursive;font-size:1rem}
.sub{font-size:.62rem;color:var(--muted)}
.tabs2{display:flex;gap:.4rem;padding:.6rem 1rem 0;flex-shrink:0}
.tab2{flex:1;text-align:center;padding:.5rem;border-radius:.75rem;font-size:.8rem;font-weight:700;cursor:pointer;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--border)}
.tab2.on{background:rgba(29,131,72,.2);border-color:rgba(29,131,72,.5);color:#7DCEA0}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 1rem 2rem}
.verder{background:linear-gradient(135deg,rgba(29,131,72,.25),var(--card));border:1px solid rgba(29,131,72,.4);border-radius:1rem;padding:.85rem 1rem;margin:.85rem 0;display:flex;align-items:center;gap:.7rem;cursor:pointer}
.s-item{background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:.7rem .9rem;display:flex;align-items:center;gap:.7rem;margin-bottom:.5rem;cursor:pointer}
.s-item:active{background:rgba(29,131,72,.12)}
.s-num{width:2.2rem;height:2.2rem;border-radius:.7rem;background:rgba(29,131,72,.2);border:1px solid rgba(29,131,72,.4);display:grid;place-items:center;font-size:.8rem;font-weight:700;color:#7DCEA0;flex-shrink:0}
.s-tr{font-weight:700;font-size:.9rem}
.s-info{font-size:.62rem;color:var(--muted);margin-top:.1rem}
.s-ar{font-family:'Amiri',serif;font-size:1.25rem;color:var(--goud);margin-left:auto;flex-shrink:0}

/* Lezer */
#lezer{position:fixed;inset:0;z-index:50;background:#0b0d16;display:none;flex-direction:column}
.l-top{background:rgba(6,8,24,.96);border-bottom:1px solid var(--border);padding:max(env(safe-area-inset-top),.6rem) 1rem .55rem;display:flex;align-items:center;gap:.6rem}
.l-mid{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#0b0d16}
.l-mid img{max-width:100%;max-height:100%;object-fit:contain;background:#faf6ec;border-radius:.35rem}
.zone{position:absolute;top:0;bottom:0;width:34%;cursor:pointer;z-index:5}
.l-bot{background:rgba(6,8,24,.96);border-top:1px solid var(--border);padding:.5rem 1rem max(env(safe-area-inset-bottom),.6rem);display:flex;align-items:center;justify-content:space-between;gap:.6rem}
.pijl{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:.7rem;color:var(--text);font-size:.85rem;font-weight:700;padding:.5rem .95rem;cursor:pointer;font-family:Inter,sans-serif}
.pg{font-size:.78rem;color:var(--muted);font-weight:600}
.laad{position:absolute;inset:0;display:none;place-items:center;color:var(--muted);font-size:.85rem;z-index:4}
</style>
</head>
<body>

<div class="nav">
  <div class="back" onclick="terug()">←</div>
  <div style="flex:1">
    <div class="ttl">📖 Quran</div>
    <div class="sub">Madani Mushaf · 604 pages</div>
  </div>
</div>

<div class="tabs2">
  <div class="tab2 on" id="tabS" onclick="toonTab('s')">Surahs</div>
  <div class="tab2" id="tabJ" onclick="toonTab('j')">Juz</div>
</div>

<div class="scroll" id="lijst"></div>

<!-- Volledige-scherm-lezer -->
<div id="lezer">
  <div class="l-top">
    <div class="back" onclick="sluitLezer()">←</div>
    <div style="flex:1;min-width:0">
      <div class="ttl" id="lSoera" style="font-size:.9rem">Al-Fatihah</div>
      <div class="sub" id="lInfo">Page 1</div>
    </div>
    <div class="s-ar" id="lAr" style="margin-left:0">الفاتحة</div>
  </div>
  <div class="l-mid" id="lMid">
    <div class="zone" style="left:0" onclick="volgende()"></div>
    <div class="zone" style="right:0" onclick="vorige()"></div>
    <div class="laad" id="lLaad">Loading page...</div>
    <img id="lImg" alt="Quran page" draggable="false"/>
  </div>
  <div class="l-bot">
    <button class="pijl" onclick="volgende()">‹ Next</button>
    <div class="pg" id="lPg">1 / 604</div>
    <button class="pijl" onclick="vorige()">Prev ›</button>
  </div>
</div>

<script>
'use strict';
// Ingebedde navigatie-index (Madani-mushaf): [nr, Arabisch, translitteratie, verzen, startpagina]
var SOERAS = [[1,"الفاتحة","Al-Fatihah",7,1],[2,"البقرة","Al-Baqarah",286,2],[3,"آل عمران","Aal Imran",200,50],[4,"النساء","An-Nisa",176,77],[5,"المائدة","Al-Ma'idah",120,106],[6,"الأنعام","Al-An'am",165,128],[7,"الأعراف","Al-A'raf",206,151],[8,"الأنفال","Al-Anfal",75,177],[9,"التوبة","At-Tawbah",129,187],[10,"يونس","Yunus",109,208],[11,"هود","Hud",123,221],[12,"يوسف","Yusuf",111,235],[13,"الرعد","Ar-Ra'd",43,249],[14,"إبراهيم","Ibrahim",52,255],[15,"الحجر","Al-Hijr",99,262],[16,"النحل","An-Nahl",128,267],[17,"الإسراء","Al-Isra",111,282],[18,"الكهف","Al-Kahf",110,293],[19,"مريم","Maryam",98,305],[20,"طه","Taha",135,312],[21,"الأنبياء","Al-Anbiya",112,322],[22,"الحج","Al-Hajj",78,332],[23,"المؤمنون","Al-Mu'minun",118,342],[24,"النور","An-Nur",64,350],[25,"الفرقان","Al-Furqan",77,359],[26,"الشعراء","Ash-Shu'ara",227,367],[27,"النمل","An-Naml",93,377],[28,"القصص","Al-Qasas",88,385],[29,"العنكبوت","Al-Ankabut",69,396],[30,"الروم","Ar-Rum",60,404],[31,"لقمان","Luqman",34,411],[32,"السجدة","As-Sajdah",30,415],[33,"الأحزاب","Al-Ahzab",73,418],[34,"سبأ","Saba",54,428],[35,"فاطر","Fatir",45,434],[36,"يس","Ya-Sin",83,440],[37,"الصافات","As-Saffat",182,446],[38,"ص","Sad",88,453],[39,"الزمر","Az-Zumar",75,458],[40,"غافر","Ghafir",85,467],[41,"فصلت","Fussilat",54,477],[42,"الشورى","Ash-Shura",53,483],[43,"الزخرف","Az-Zukhruf",89,489],[44,"الدخان","Ad-Dukhan",59,496],[45,"الجاثية","Al-Jathiyah",37,499],[46,"الأحقاف","Al-Ahqaf",35,502],[47,"محمد","Muhammad",38,507],[48,"الفتح","Al-Fath",29,511],[49,"الحجرات","Al-Hujurat",18,515],[50,"ق","Qaf",45,518],[51,"الذاريات","Adh-Dhariyat",60,520],[52,"الطور","At-Tur",49,523],[53,"النجم","An-Najm",62,526],[54,"القمر","Al-Qamar",55,528],[55,"الرحمن","Ar-Rahman",78,531],[56,"الواقعة","Al-Waqi'ah",96,534],[57,"الحديد","Al-Hadid",29,537],[58,"المجادلة","Al-Mujadilah",22,542],[59,"الحشر","Al-Hashr",24,545],[60,"الممتحنة","Al-Mumtahanah",13,549],[61,"الصف","As-Saff",14,551],[62,"الجمعة","Al-Jumu'ah",11,553],[63,"المنافقون","Al-Munafiqun",11,554],[64,"التغابن","At-Taghabun",18,556],[65,"الطلاق","At-Talaq",12,558],[66,"التحريم","At-Tahrim",12,560],[67,"الملك","Al-Mulk",30,562],[68,"القلم","Al-Qalam",52,564],[69,"الحاقة","Al-Haqqah",52,566],[70,"المعارج","Al-Ma'arij",44,568],[71,"نوح","Nuh",28,570],[72,"الجن","Al-Jinn",28,572],[73,"المزمل","Al-Muzzammil",20,574],[74,"المدثر","Al-Muddaththir",56,575],[75,"القيامة","Al-Qiyamah",40,577],[76,"الإنسان","Al-Insan",31,578],[77,"المرسلات","Al-Mursalat",50,580],[78,"النبأ","An-Naba",40,582],[79,"النازعات","An-Nazi'at",46,583],[80,"عبس","Abasa",42,585],[81,"التكوير","At-Takwir",29,586],[82,"الانفطار","Al-Infitar",19,587],[83,"المطففين","Al-Mutaffifin",36,587],[84,"الانشقاق","Al-Inshiqaq",25,589],[85,"البروج","Al-Buruj",22,590],[86,"الطارق","At-Tariq",17,591],[87,"الأعلى","Al-A'la",19,591],[88,"الغاشية","Al-Ghashiyah",26,592],[89,"الفجر","Al-Fajr",30,593],[90,"البلد","Al-Balad",20,594],[91,"الشمس","Ash-Shams",15,595],[92,"الليل","Al-Layl",21,595],[93,"الضحى","Ad-Duha",11,596],[94,"الشرح","Ash-Sharh",8,596],[95,"التين","At-Tin",8,597],[96,"العلق","Al-Alaq",19,597],[97,"القدر","Al-Qadr",5,598],[98,"البينة","Al-Bayyinah",8,598],[99,"الزلزلة","Az-Zalzalah",8,599],[100,"العاديات","Al-Adiyat",11,599],[101,"القارعة","Al-Qari'ah",11,600],[102,"التكاثر","At-Takathur",8,600],[103,"العصر","Al-Asr",3,601],[104,"الهمزة","Al-Humazah",9,601],[105,"الفيل","Al-Fil",5,601],[106,"قريش","Quraysh",4,602],[107,"الماعون","Al-Ma'un",7,602],[108,"الكوثر","Al-Kawthar",3,602],[109,"الكافرون","Al-Kafirun",6,603],[110,"النصر","An-Nasr",3,603],[111,"المسد","Al-Masad",5,603],[112,"الإخلاص","Al-Ikhlas",4,604],[113,"الفلق","Al-Falaq",5,604],[114,"الناس","An-Nas",6,604]];
var JUZ = [[1,1],[2,22],[3,42],[4,62],[5,82],[6,102],[7,121],[8,142],[9,162],[10,182],[11,201],[12,222],[13,242],[14,262],[15,282],[16,302],[17,322],[18,342],[19,362],[20,382],[21,402],[22,422],[23,442],[24,462],[25,482],[26,502],[27,522],[28,542],[29,562],[30,582]];   // [nr, startpagina]
var TOTAAL = 604;

var pagina = parseInt(localStorage.getItem('tf_quran_page')||'1',10)||1;
var lezerOpen = false;

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function terug(){
  try{
    if(window.parent&&window.parent!==window){
      window.parent.postMessage('go-home','*');
    }
  }catch(e){}
}

function padNum(n){return ('00'+n).slice(-3);}
function bron(n){return 'quran/images/page_'+padNum(n)+'.webp';}

// Bij welke soera hoort deze pagina?
function soeraBij(p){
  var s=SOERAS[0];
  for(var i=0;i<SOERAS.length;i++){ if(SOERAS[i][4]<=p) s=SOERAS[i]; else break; }
  return s;
}

// ══ LIJSTEN ══
function toonTab(t){
  document.getElementById('tabS').classList.toggle('on',t==='s');
  document.getElementById('tabJ').classList.toggle('on',t==='j');
  renderLijst(t);
}

function renderLijst(t){
  var el=document.getElementById('lijst');
  var s=soeraBij(pagina);
  var html='<div class="verder" onclick="openPagina('+pagina+')">'
    +'<div style="font-size:1.5rem">🔖</div>'
    +'<div style="flex:1"><div style="font-weight:700;font-size:.9rem">Continue reading</div>'
    +'<div style="font-size:.68rem;color:var(--muted)">'+esc(s[2])+' · page '+pagina+'</div></div>'
    +'<div style="color:var(--muted)">›</div></div>';
  if(t==='j'){
    JUZ.forEach(function(j){
      html+='<div class="s-item" onclick="openPagina('+j[1]+')">'
        +'<div class="s-num">'+j[0]+'</div>'
        +'<div style="flex:1"><div class="s-tr">Juz '+j[0]+'</div>'
        +'<div class="s-info">starts at page '+j[1]+'</div></div>'
        +'<div style="color:var(--muted)">›</div></div>';
    });
  } else {
    SOERAS.forEach(function(sa){
      html+='<div class="s-item" onclick="openPagina('+sa[4]+')">'
        +'<div class="s-num">'+sa[0]+'</div>'
        +'<div style="flex:1"><div class="s-tr">'+esc(sa[2])+'</div>'
        +'<div class="s-info">'+sa[3]+' verses · page '+sa[4]+'</div></div>'
        +'<div class="s-ar">'+esc(sa[1])+'</div></div>';
    });
  }
  el.innerHTML=html;
}

// ══ LEZER ══
function openPagina(p){
  pagina=Math.min(Math.max(1,p),TOTAAL);
  lezerOpen=true;
  document.getElementById('lezer').style.display='flex';
  toonPagina();
}

function sluitLezer(){
  lezerOpen=false;
  document.getElementById('lezer').style.display='none';
  renderLijst(document.getElementById('tabJ').classList.contains('on')?'j':'s');
}

function toonPagina(){
  var img=document.getElementById('lImg');
  var laad=document.getElementById('lLaad');
  laad.style.display='grid';
  img.onload=function(){laad.style.display='none';};
  img.onerror=function(){laad.textContent='❌ Page not found — are the Quran images uploaded?';};
  img.src=bron(pagina);
  var s=soeraBij(pagina);
  document.getElementById('lSoera').textContent=s[2];
  document.getElementById('lAr').textContent=s[1];
  document.getElementById('lInfo').textContent='Page '+pagina;
  document.getElementById('lPg').textContent=pagina+' / '+TOTAAL;
  localStorage.setItem('tf_quran_page',String(pagina));
  // Buurpagina's alvast laden voor vloeiend bladeren
  [pagina+1,pagina-1].forEach(function(n){
    if(n>=1&&n<=TOTAAL){var pre=new Image();pre.src=bron(n);}
  });
}

// Mushaf leest van rechts naar links: 'Next' = linkerkant
function volgende(){ if(pagina<TOTAAL){pagina++;toonPagina();} }
function vorige(){ if(pagina>1){pagina--;toonPagina();} }

// Swipe-ondersteuning
(function(){
  var x0=null;
  var mid=document.getElementById('lMid');
  mid.addEventListener('touchstart',function(e){x0=e.changedTouches[0].clientX;},{passive:true});
  mid.addEventListener('touchend',function(e){
    if(x0===null)return;
    var dx=e.changedTouches[0].clientX-x0; x0=null;
    if(Math.abs(dx)<40)return;
    if(dx>0) volgende(); else vorige();
  },{passive:true});
})();

renderLijst('s');
</script>
</body>
</html>
