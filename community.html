<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Community — Tolaanfur</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#060818;--bg2:#0D1240;--text:#EEF2FF;--muted:rgba(238,242,255,.45);--border:rgba(100,140,255,.18);--card:rgba(20,30,100,.4);--gold:#F59E0B;--gr:#10B981;--pu:#6B3FFF;--rd:#F43F5E}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;overflow:hidden}

.scr{position:fixed;inset:0;z-index:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;flex-direction:column}
.scr.on{display:flex}

.nav{background:rgba(6,8,24,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:max(env(safe-area-inset-top),.75rem) 1rem .65rem;display:flex;align-items:center;gap:.65rem;position:sticky;top:0;z-index:10;flex-shrink:0}
.nav-back{width:2.2rem;height:2.2rem;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.9rem;cursor:pointer;flex-shrink:0}
.nav-title{font-family:'Fredoka One',cursive;font-size:1rem;flex:1}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);flex-shrink:0;background:rgba(6,8,24,.9)}
.tab{flex:1;padding:.65rem .5rem;text-align:center;font-size:.75rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.on{color:var(--text);border-bottom-color:#6B3FFF}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:1rem;margin:.4rem 1rem}
.card:active{transform:scale(.98)}

/* Buttons */
.btn{border:none;border-radius:.85rem;padding:.7rem 1.2rem;font-family:'Fredoka One',cursive;font-size:.9rem;cursor:pointer;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#6B3FFF,#9B6FFF);color:#fff}
.btn-secondary{background:var(--card);border:1px solid var(--border);color:var(--text)}
.btn-sm{padding:.45rem .85rem;font-size:.78rem;border-radius:.6rem}
.btn-green{background:linear-gradient(135deg,#065f46,#10B981);color:#fff}
.btn-red{background:rgba(244,63,94,.15);border:1px solid rgba(244,63,94,.3);color:#F87171}

/* Group chat */
.chat-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:.75rem 1rem;display:flex;flex-direction:column;gap:.5rem}
.msg-row{display:flex;gap:.5rem;align-items:flex-end}
.msg-row.mine{flex-direction:row-reverse}
.msg-avatar{width:2rem;height:2rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;font-weight:700}
.msg-bubble{max-width:72%;padding:.55rem .8rem;border-radius:1rem;font-size:.85rem;line-height:1.5;word-break:break-word}
.msg-bubble.them{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:.2rem}
.msg-bubble.mine{background:linear-gradient(135deg,#6B3FFF,#9B6FFF);color:#fff;border-bottom-right-radius:.2rem}
.msg-name{font-size:.62rem;color:var(--muted);margin-bottom:.2rem}
.msg-time{font-size:.58rem;color:var(--muted);margin-top:.2rem;text-align:right}

.chat-input-wrap{padding:.65rem 1rem max(env(safe-area-inset-bottom),.65rem);border-top:1px solid var(--border);background:rgba(6,8,24,.95);display:flex;gap:.5rem;align-items:center;flex-shrink:0}
.chat-input{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:1.5rem;padding:.6rem 1rem;font-size:.88rem;color:var(--text);font-family:'Inter',sans-serif;outline:none}
.chat-input:focus{border-color:#6B3FFF}
.chat-send{width:2.5rem;height:2.5rem;border-radius:50%;background:linear-gradient(135deg,#6B3FFF,#9B6FFF);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:1rem}
.chat-send:active{transform:scale(.93)}

/* Leaderboard */
.lb-row{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-bottom:1px solid var(--border)}
.lb-row:last-child{border-bottom:none}
.lb-rank{width:2rem;text-align:center;font-family:'Fredoka One',cursive;font-size:1.1rem;flex-shrink:0}
.lb-avatar{width:2.4rem;height:2.4rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:700;flex-shrink:0}
.lb-info{flex:1}
.lb-name{font-weight:600;font-size:.88rem}
.lb-sub{font-size:.65rem;color:var(--muted);margin-top:.1rem}
.lb-pts{font-family:'Fredoka One',cursive;font-size:1rem;color:#F59E0B}

/* Toast */
.tf-toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff;padding:.45rem 1.1rem;border-radius:2rem;font-size:.82rem;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.tf-toast.show{opacity:1}

/* Input fields */
.inp{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:.75rem;padding:.7rem 1rem;font-size:.88rem;color:var(--text);font-family:'Inter',sans-serif;outline:none;margin-bottom:.65rem}
.inp:focus{border-color:#6B3FFF}
textarea.inp{resize:none;height:5rem}
</style>
</head>
<body>

<!-- S1: COMMUNITY HOME -->
<div class="scr on" id="s-community">
  <div class="nav">
    <div class="nav-back" onclick="goBack()">←</div>
    <div class="nav-title">🌐 Community</div>
    <button class="btn btn-primary btn-sm" onclick="showScreen('s-create')">+ Create</button>
  </div>
  <div class="tabs">
    <div class="tab on" id="tab-groups" onclick="switchTab('groups')">👥 Groups</div>
    <div class="tab" id="tab-leaderboard" onclick="switchTab('leaderboard')">🏆 Leaderboard</div>
  </div>
  <div id="tab-content" style="padding-bottom:2rem"></div>
</div>

<!-- S2: GROUP CHAT -->
<div class="scr" id="s-chat">
  <div class="nav">
    <div class="nav-back" onclick="showScreen('s-community')">←</div>
    <div style="flex:1">
      <div class="nav-title" id="chatGroupName">Group</div>
      <div style="font-size:.62rem;color:var(--muted)" id="chatMemberCount"></div>
    </div>
    <div id="chatLeaveBtn"></div>
  </div>
  <div class="chat-wrap" id="chatMessages"></div>
  <div class="chat-input-wrap">
    <input class="chat-input" id="chatInput" placeholder="Type a message..." maxlength="500"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"/>
    <button class="chat-send" onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- S3: CREATE GROUP -->
<div class="scr" id="s-create">
  <div class="nav">
    <div class="nav-back" onclick="showScreen('s-community')">←</div>
    <div class="nav-title">➕ Create Group</div>
  </div>
  <div style="padding:1rem">
    <div style="font-size:.75rem;color:var(--muted);margin-bottom:.3rem">Group Name *</div>
    <input class="inp" id="newGroupName" placeholder="e.g. Quran Study Circle" maxlength="50"/>
    <div style="font-size:.75rem;color:var(--muted);margin-bottom:.3rem">Description</div>
    <textarea class="inp" id="newGroupDesc" placeholder="What is this group about?"></textarea>
    <div style="font-size:.75rem;color:var(--muted);margin-bottom:.3rem">Category</div>
    <select class="inp" id="newGroupCat" style="appearance:none">
      <option value="quran">📖 Quran</option>
      <option value="hadith">📚 Hadith</option>
      <option value="fiqh">⚖️ Fiqh</option>
      <option value="sirah">🕌 Sirah</option>
      <option value="general">💬 General</option>
    </select>
    <div style="display:flex;gap:.5rem;margin-top:.5rem">
      <button class="btn btn-secondary" style="flex:1" onclick="showScreen('s-community')">Cancel</button>
      <button class="btn btn-primary" style="flex:2" onclick="createGroup()">Create Group</button>
    </div>
  </div>
</div>

<div class="tf-toast" id="tf-toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
'use strict';

const firebaseConfig = {
  apiKey: "AIzaSyD4o7SprtOMn7F4iFjVmPB37C1Tf7mICDk",
  authDomain: "tolaanfur-5b5f5.firebaseapp.com",
  databaseURL: "https://tolaanfur-5b5f5-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tolaanfur-5b5f5",
  storageBucket: "tolaanfur-5b5f5.firebasestorage.app",
  messagingSenderId: "188890145767",
  appId: "1:188890145767:web:6ec8fe6fae4ddd90891342"
};

const commApp = firebase.apps.find(a=>a.name==='comm') || firebase.initializeApp(firebaseConfig,'comm');
const db = commApp.firestore();
const auth = commApp.auth();
const rtdb = commApp.database();

let currentUser = null;
let profile = null;
let currentTab = 'groups';
let allGroups = [];
let activeGroup = null;
let msgListener = null;

// ══ SCREENS ══
function showScreen(id){
  document.querySelectorAll('.scr').forEach(s=>{s.classList.remove('on');s.style.display='';});
  const el=document.getElementById(id);
  el.classList.add('on');
  el.style.display='flex';
  if(id==='s-community') renderTab();
}

function goBack(){
  try{
    if(window.parent&&window.parent!==window){
      window.parent.postMessage('go-home','*');
    }
  }catch(e){}
}

// ══ TABS ══
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('tab-'+tab).classList.add('on');
  renderTab();
}

function renderTab(){
  const c=document.getElementById('tab-content');
  if(currentTab==='groups') renderGroups(c);
  else renderLeaderboard(c);
}

// ══ GROUPS ══
function renderGroups(c){
  if(!currentUser){
    c.innerHTML='<div style="text-align:center;padding:2rem;color:var(--muted)">🔒 Login to see groups</div>';
    return;
  }
  if(allGroups.length===0){
    c.innerHTML='<div style="text-align:center;padding:2rem"><div style="font-size:2.5rem;margin-bottom:.5rem">👥</div><div style="color:var(--muted);font-size:.85rem">No groups yet</div><div style="font-size:.75rem;color:var(--muted);margin-top:.3rem">Be the first to create one!</div></div>';
    return;
  }
  c.innerHTML = allGroups.map(g=>{
    const isMember = (g.members||[]).includes(currentUser.uid);
    const memberCount = (g.members||[]).length;
    const catIcons = {quran:'📖',hadith:'📚',fiqh:'⚖️',sirah:'🕌',general:'💬'};
    const icon = catIcons[g.category]||'💬';
    return `
      <div class="card" style="cursor:pointer">
        <div style="display:flex;align-items:flex-start;gap:.75rem">
          <div style="width:2.8rem;height:2.8rem;border-radius:.75rem;background:linear-gradient(135deg,#4C1D95,#6B3FFF);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0">${icon}</div>
          <div style="flex:1">
            <div style="font-weight:700;font-size:.92rem">${g.name}</div>
            <div style="font-size:.72rem;color:var(--muted);margin-top:.15rem">${g.description||'No description'}</div>
            <div style="font-size:.65rem;color:var(--muted);margin-top:.3rem">👥 ${memberCount} member${memberCount!==1?'s':''}</div>
          </div>
        </div>
        <div style="display:flex;gap:.5rem;margin-top:.75rem">
          ${isMember
            ? `<button class="btn btn-primary btn-sm" style="flex:2" onclick="openChat('${g.id}')">💬 Open Chat</button>
               <button class="btn btn-red btn-sm" style="flex:1" onclick="leaveGroup('${g.id}')">Leave</button>`
            : `<button class="btn btn-green btn-sm" style="flex:1" onclick="joinGroup('${g.id}')">Join</button>
               <button class="btn btn-secondary btn-sm" style="flex:2" onclick="openChat('${g.id}')">👁 View Chat</button>`
          }
        </div>
      </div>`;
  }).join('');
}

// ══ LEADERBOARD ══
function renderLeaderboard(c){
  c.innerHTML='<div style="text-align:center;padding:1.5rem;color:var(--muted);font-size:.82rem">Loading leaderboard...</div>';
  db.collection('users').orderBy('xp','desc').limit(10).get().then(snap=>{
    const users = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(users.length===0){
      c.innerHTML='<div style="text-align:center;padding:2rem;color:var(--muted)">No data yet</div>';
      return;
    }
    const medals=['🥇','🥈','🥉'];
    const colors=['rgba(201,152,42,.2)','rgba(192,192,192,.15)','rgba(205,127,50,.15)'];
    c.innerHTML=`
      <div style="padding:.75rem 1rem .3rem;font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">🏆 Top Players</div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:1rem;margin:.4rem 1rem;overflow:hidden">
        ${users.map((u,i)=>{
          const isMe = u.id===currentUser?.uid;
          const xp = u.xp||0;
          const lvl = Math.floor(xp/100)+1;
          const avatarColors=['#6B3FFF','#059669','#2563EB','#DC2626','#D97706','#7C3AED','#0891B2','#BE185D'];
          const bg = avatarColors[u.avatarColor||0]||'#6B3FFF';
          const initials = (u.displayName||u.username||'U').substring(0,2).toUpperCase();
          return `
            <div class="lb-row" style="${isMe?'background:rgba(107,63,255,.08)':''}${i<3?';background:'+colors[i]:''}">
              <div class="lb-rank">${i<3?medals[i]:'#'+(i+1)}</div>
              <div class="lb-avatar" style="background:${bg}">${initials}</div>
              <div class="lb-info">
                <div class="lb-name">${u.displayName||u.username||'User'}${isMe?' <span style="font-size:.65rem;color:#9B6FFF">(you)</span>':''}</div>
                <div class="lb-sub">Level ${lvl}</div>
              </div>
              <div class="lb-pts">${xp} XP</div>
            </div>`;
        }).join('')}
      </div>`;
  }).catch(()=>{
    c.innerHTML='<div style="text-align:center;padding:2rem;color:var(--muted)">Could not load leaderboard</div>';
  });
}

// ══ JOIN / LEAVE ══
function joinGroup(gid){
  if(!currentUser){showToast('🔒 Login required');return;}
  db.collection('groups').doc(gid).update({
    members: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
  }).then(()=>{
    showToast('✅ Joined group!');
    loadGroups();
  }).catch(()=>showToast('❌ Failed to join'));
}

function leaveGroup(gid){
  if(!currentUser)return;
  db.collection('groups').doc(gid).update({
    members: firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
  }).then(()=>{
    showToast('👋 Left group');
    loadGroups();
  }).catch(()=>showToast('❌ Failed to leave'));
}

// ══ CREATE GROUP ══
function createGroup(){
  const name=document.getElementById('newGroupName').value.trim();
  const desc=document.getElementById('newGroupDesc').value.trim();
  const cat=document.getElementById('newGroupCat').value;
  if(!name){showToast('⚠️ Enter a group name');return;}
  if(!currentUser){showToast('🔒 Login required');return;}
  db.collection('groups').add({
    name, description:desc, category:cat,
    createdBy: currentUser.uid,
    createdAt: Date.now(),
    members: [currentUser.uid]
  }).then(()=>{
    showToast('🎉 Group created!');
    document.getElementById('newGroupName').value='';
    document.getElementById('newGroupDesc').value='';
    loadGroups();
    showScreen('s-community');
  }).catch(()=>showToast('❌ Failed to create group'));
}

// ══ CHAT ══
function openChat(gid){
  const group = allGroups.find(g=>g.id===gid);
  if(!group)return;
  activeGroup = group;
  const isMember = (group.members||[]).includes(currentUser?.uid);
  document.getElementById('chatGroupName').textContent = group.name;
  document.getElementById('chatMemberCount').textContent = `${(group.members||[]).length} members`;
  document.getElementById('chatLeaveBtn').innerHTML = isMember
    ? `<button class="btn btn-red btn-sm" onclick="leaveGroup('${gid}');showScreen('s-community')">Leave</button>` : '';
  document.getElementById('chatInput').disabled = !isMember;
  document.getElementById('chatInput').placeholder = isMember ? 'Type a message...' : 'Join to send messages';
  showScreen('s-chat');
  loadMessages(gid);
}

function loadMessages(gid){
  if(msgListener) msgListener();
  const wrap=document.getElementById('chatMessages');
  wrap.innerHTML='<div style="text-align:center;padding:1rem;color:var(--muted);font-size:.8rem">Loading messages...</div>';
  
  msgListener = rtdb.ref(`groupChats/${gid}/messages`).limitToLast(50).on('value', snap=>{
    const msgs=[];
    if(snap.val()){
      Object.entries(snap.val()).forEach(([id,m])=>msgs.push({id,...m}));
      msgs.sort((a,b)=>(a.ts||0)-(b.ts||0));
    }
    if(msgs.length===0){
      wrap.innerHTML='<div style="text-align:center;padding:2rem;color:var(--muted);font-size:.82rem">No messages yet. Say hello! 👋</div>';
      return;
    }
    const avatarColors=['#6B3FFF','#059669','#2563EB','#DC2626','#D97706','#7C3AED','#0891B2','#BE185D'];
    wrap.innerHTML = msgs.map(m=>{
      const isMe = m.uid===currentUser?.uid;
      const bg = avatarColors[m.avatarColor||0]||'#6B3FFF';
      const initials = (m.displayName||'U').substring(0,2).toUpperCase();
      const time = m.ts ? new Date(m.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
      return `
        <div class="msg-row ${isMe?'mine':''}">
          ${!isMe?`<div class="msg-avatar" style="background:${bg}">${initials}</div>`:''}
          <div>
            ${!isMe?`<div class="msg-name">${m.displayName||'User'}</div>`:''}
            <div class="msg-bubble ${isMe?'mine':'them'}">${m.text}</div>
            <div class="msg-time">${time}</div>
          </div>
        </div>`;
    }).join('');
    wrap.scrollTop = wrap.scrollHeight;
  });
}

function sendMessage(){
  const input=document.getElementById('chatInput');
  const text=input.value.trim();
  if(!text||!currentUser||!activeGroup)return;
  if(!(activeGroup.members||[]).includes(currentUser.uid)){
    showToast('⚠️ Join the group first');return;
  }
  const gid=activeGroup.id;
  const msg={
    uid: currentUser.uid,
    displayName: profile?.displayName||profile?.username||currentUser.email?.split('@')[0]||'User',
    avatarColor: profile?.avatarColor||0,
    text,
    ts: Date.now()
  };
  input.value='';
  rtdb.ref(`groupChats/${gid}/messages`).push(msg)
    .catch(()=>showToast('❌ Failed to send'));
}

// ══ LOAD DATA ══
function loadGroups(){
  db.collection('groups').onSnapshot(snap=>{
    allGroups = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(document.getElementById('s-community').classList.contains('on')){
      renderTab();
    }
  });
}

// ══ TOAST ══
function showToast(msg){
  const t=document.getElementById('tf-toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(window._tt);
  window._tt=setTimeout(()=>t.classList.remove('show'),2500);
}

// ══ INIT ══
auth.onAuthStateChanged(user=>{
  currentUser=user;
  if(user&&!user.isAnonymous){
    db.collection('users').doc(user.uid).get().then(doc=>{
      if(doc.exists) profile=doc.data();
      loadGroups();
    }).catch(()=>loadGroups());
  } else {
    renderTab();
  }
});
</script>
</body>
</html>
